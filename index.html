<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>🎣 Câu Cá Online 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;--gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
#loading h2{font-family:'Press Start 2P';font-size:12px;color:var(--accent)}
#loadbar{width:200px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));width:0;transition:width .4s}
#loadtxt{font-size:11px;color:var(--sub);margin-top:10px}
.demo-btn{margin-top:15px;padding:12px 24px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:8px;color:#000;font-weight:900;cursor:pointer;font-size:12px}
.auth-box{background:rgba(15,32,53,.95);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;max-width:360px;width:90%;display:none}
.auth-icon{font-size:48px;margin-bottom:10px}
.auth-title{font-family:'Press Start 2P';font-size:11px;color:var(--accent);margin-bottom:12px}
.auth-id{background:rgba(255,255,255,0.05);padding:8px;border-radius:6px;font-family:monospace;font-size:10px;color:var(--gold);word-break:break-all;margin:10px 0}
.auth-input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.3);color:#fff;font-size:11px;margin:10px 0;text-align:center}
.auth-btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;margin:5px 0}
.auth-btn.confirm{background:linear-gradient(135deg,#0058b0,#00c0f0);color:#fff}
.auth-btn.cancel{background:transparent;border:1px solid var(--border);color:var(--sub)}
#game{display:none;width:100%;max-width:900px;margin:0 auto;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P';font-size:10px;color:var(--accent)}
#online-pill{font-size:11px;color:#2ecc71}
#cw{position:relative;width:100%;background:#000;overflow:hidden;aspect-ratio:900/480}
#gc{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:1px}
#xhair::before{width:2px;height:24px;left:11px;top:0}
#xhair::after{width:24px;height:2px;top:11px;left:0}
#st{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:8px;color:#fff;text-shadow:2px 2px 0 #000;pointer-events:none;z-index:5;white-space:nowrap}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto}
.mb{flex:0 0 auto;padding:6px 12px;background:rgba(10,25,45,.8);border:2px solid var(--border);border-radius:12px;color:var(--sub);cursor:pointer;font-size:10px;font-weight:800;white-space:nowrap}
.mb.on{border-color:var(--accent);color:var(--accent)}
#act{display:flex;gap:7px;padding:8px;background:rgba(6,16,31,.98);border-top:1px solid var(--border)}
#cb{flex:1;padding:12px;font-family:'Press Start 2P';font-size:8px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer}
#cb:disabled{opacity:.4;cursor:not-allowed}
#ri{padding:8px 12px;background:rgba(10,25,45,.9);border:1px solid var(--border);border-radius:var(--rad);text-align:center;min-width:70px}
#ri .us{font-weight:900;font-size:18px;color:var(--accent)}
#tabs{display:flex;background:var(--panel);border-top:1px solid var(--border)}
.tb{flex:1;padding:10px;background:none;border:none;border-right:1px solid var(--border);color:var(--sub);cursor:pointer;font-weight:800;font-size:11px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:var(--panel);border-top:1px solid var(--border);padding:10px;min-height:140px;overflow-y:auto}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:16px;padding:8px 16px;font-size:11px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(4,12,28,.95);border:2px solid var(--gold);border-radius:var(--rad);padding:14px 20px;text-align:center;min-width:180px;pointer-events:none;z-index:10;backdrop-filter:blur(8px)}
#result-banner.show{animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0)}100%{transform:translate(-50%,-50%) scale(1)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:48px">🎣</div>
  <h2>CÂU CÁ 3D</h2>
  <div id="loadbar"><div id="loadfill"></div></div>
  <div id="loadtxt">Đang tải đồ họa...</div>
  <button class="demo-btn" onclick="enterDemo()">🎮 VÀO GAME DEMO</button>
</div>

<div id="auth" class="auth-box">
  <div class="auth-icon">🔐</div>
  <div class="auth-title">XÁC THỰC</div>
  <div style="font-size:11px;color:var(--sub);margin-bottom:8px">Link này cho ID:</div>
  <div class="auth-id" id="target-id">...</div>
  <input type="text" id="discord-id" class="auth-input" placeholder="Nhập Discord ID">
  <button class="auth-btn confirm" onclick="verifyId()">XÁC NHẬN</button>
  <button class="auth-btn cancel" onclick="enterDemo()">VÀO DEMO</button>
</div>

<div id="game">
  <div id="hdr">
    <h1>🎣 CÂU CÁ 3D</h1>
    <div style="display:flex;gap:12px;align-items:center">
      <div id="online-pill">🟢 <span id="online-count">1</span> online</div>
      <div>🪙 <span id="coins">0</span></div>
    </div>
  </div>
  <div id="maps">
    <button class="mb on" onclick="selMap(0)">🏡 Hồ Làng</button>
    <button class="mb" onclick="selMap(1)">🌊 Biển</button>
    <button class="mb" onclick="selMap(2)">🏔️ Băng</button>
    <button class="mb" onclick="selMap(3)">🌑 Vực</button>
  </div>
  <div id="cw">
    <canvas id="gc" width="900" height="480"></canvas>
    <div id="xhair"></div>
    <div id="st">Nhấn THẢ CÂU</div>
    <div id="result-banner">
      <div id="res-emoji" style="font-size:40px;margin-bottom:4px"></div>
      <div id="res-name" style="font-weight:900;font-size:13px"></div>
      <div id="res-info" style="font-size:10px;color:var(--sub);margin-top:2px"></div>
      <div id="res-value" style="font-size:12px;color:var(--gold);font-weight:800;margin-top:3px"></div>
    </div>
  </div>
  <div id="act">
    <button id="cb" onclick="handleCast()">⏳ Đang tải...</button>
    <div id="ri"><span class="us" id="rods">0</span> lần</div>
  </div>
  <div id="tabs">
    <button class="tb on" onclick="swTab('bag')">🎒 Túi</button>
    <button class="tb" onclick="swTab('shop')">🏪 Shop</button>
    <button class="tb" onclick="swTab('sell')">💰 Bán</button>
    <button class="tb" onclick="swTab('rates')">📊 Tỉ Lệ</button>
  </div>
  <div id="cp"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const firebaseConfig = { apiKey:"AIzaSyA9Iv98Bcurd6bqXo79BbgEz58a3xrPH8o",authDomain:"fishing-bot-e8d42.firebaseapp.com",databaseURL:"https://fishing-bot-e8d42-default-rtdb.firebaseio.com",projectId:"fishing-bot-e8d42" };
const GAME_SECRET='datBatKyChuan123';
const MAP_DEFS=[
  {id:'ho',name:'🏡 Hồ Làng',pool:['moi','tram','chep','vang'],rates:{miss:45,moi:35,tram:12,chep:6,vang:2},skyColor:0x87ceeb,waterColor:0x3d8fcc},
  {id:'bien',name:'🌊 Biển',pool:['bien','ngua','mattroi','rong'],rates:{miss:42,bien:36,ngua:14,mattroi:6,rong:2},skyColor:0x0077b6,waterColor:0x0096c7},
  {id:'nui',name:'🏔️ Băng',pool:['hoi','tam','bang','thanbang'],rates:{miss:40,hoi:34,tam:16,bang:7,thanbang:3},skyColor:0x1a2040,waterColor:0xa8d8ea},
  {id:'vuc',name:'🌑 Vực',pool:['bachtuoc','cama','caco','thanhailong'],rates:{miss:38,bachtuoc:32,cama:20,caco:8,thanhailong:2},skyColor:0x000008,waterColor:0x001020}
];
const ALL_FISH={
  moi:{id:'moi',name:'Cá Mồi',emoji:'🐟',value:10_000,rar:'Thường',color:0x74b9ff,minW:.1,maxW:.8},
  tram:{id:'tram',name:'Cá Trắm',emoji:'🐠',value:120_000,rar:'Không Thường',color:0xa29bfe,minW:1,maxW:5},
  chep:{id:'chep',name:'Cá Chép Vàng',emoji:'🐡',value:600_000,rar:'Quý Hiếm',color:0xfdcb6e,minW:3,maxW:15},
  vang:{id:'vang',name:'Cá Vàng',emoji:'✨',value:8_000_000,rar:'Huyền Thoại',color:0xffd700,minW:5,maxW:25},
  bien:{id:'bien',name:'Cá Biển',emoji:'🐬',value:15_000,rar:'Thường',color:0x00d4ff,minW:.5,maxW:3},
  ngua:{id:'ngua',name:'Cá Ngựa',emoji:'🦀',value:200_000,rar:'Không Thường',color:0xff6b9d,minW:2,maxW:12},
  mattroi:{id:'mattroi',name:'Cá Mặt Trời',emoji:'🐙',value:1_500_000,rar:'Quý Hiếm',color:0xff9f43,minW:10,maxW:50},
  rong:{id:'rong',name:'Cá Rồng',emoji:'🐲',value:50_000_000,rar:'Thần Thoại',color:0xff3333,minW:50,maxW:300},
  hoi:{id:'hoi',name:'Cá Hồi',emoji:'🦑',value:80_000,rar:'Thường',color:0x74e0ff,minW:.5,maxW:4},
  tam:{id:'tam',name:'Cá Tầm',emoji:'🐋',value:500_000,rar:'Không Thường',color:0x7fb3d3,minW:20,maxW:100},
  bang:{id:'bang',name:'Cá Băng',emoji:'💎',value:5_000_000,rar:'Quý Hiếm',color:0xaef7ff,minW:30,maxW:200},
  thanbang:{id:'thanbang',name:'Thần Băng',emoji:'❄️',value:80_000_000,rar:'Huyền Thoại',color:0xffffff,minW:100,maxW:500},
  bachtuoc:{id:'bachtuoc',name:'Bạch Tuộc',emoji:'🦑',value:30_000,rar:'Thường',color:0x8e44ad,minW:5,maxW:30},
  cama:{id:'cama',name:'Cá Ma',emoji:'👻',value:300_000,rar:'Không Thường',color:0x2ecc71,minW:2,maxW:20},
  caco:{id:'caco',name:'Cá Cổ',emoji:'🦕',value:10_000_000,rar:'Quý Hiếm',color:0x2c3e50,minW:200,maxW:1000},
  thanhailong:{id:'thanhailong',name:'Thần Hải Long',emoji:'🐉',value:500_000_000,rar:'Vô Tiền',color:0xff00ff,minW:1000,maxW:9999}
};

let DB=null, ROD_PRICE=10000, ROD_USES=10, DEMO=false, pendingSave=false, onlineMode=false;
let player={userId:'',username:'',coins:100000,rodUses:10,inventory:{},totalCaught:0};
let gstate='idle', curMap=0, activeTab='bag', wt, bt, resultFish=null, resultWeight=0, waitStart=0, waitDur=4000;
let yaw=0, pitch=0, sessionData=null;

// ═══════════════════════════════════════════════════════════
// THREE.JS SETUP - ĐẦY ĐỦ ĐỒ HỌA 3D
// ═══════════════════════════════════════════════════════════
const cv=document.getElementById('gc');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
renderer.setSize(900,480);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,900/480,0.1,200);
camera.position.set(0,1.5,0);
camera.rotation.order='YXZ';
scene.add(camera);

// LIGHTS
const ambientLight=new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambientLight);

const sunLight=new THREE.DirectionalLight(0xfff4d8,1.2);
sunLight.position.set(8,14,5);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(2048,2048);
scene.add(sunLight);

// WATER - SHADER ANIMATED
const waterGeometry=new THREE.PlaneGeometry(120,120,80,80);
const waterMaterial=new THREE.ShaderMaterial({
  uniforms:{
    uTime:{value:0},
    uDeep:{value:new THREE.Vector3(0.1,0.4,0.7)},
    uShallow:{value:new THREE.Vector3(0.2,0.6,0.9)}
  },
  vertexShader:`
    uniform float uTime;
    varying float vElevation;
    varying vec3 vPosition;
    void main(){
      vec3 pos=position;
      float elevation=sin(pos.x*3.2+uTime*1.6)*0.16+sin(pos.z*2.5-uTime*1.2)*0.12;
      pos.y+=elevation;
      vElevation=elevation;
      vPosition=pos;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
    }
  `,
  fragmentShader:`
    uniform vec3 uDeep;
    uniform vec3 uShallow;
    varying float vElevation;
    void main(){
      float mixStrength=(vElevation+0.32)/0.60;
      vec3 color=mix(uDeep,uShallow,mixStrength);
      gl_FragColor=vec4(color,0.88);
    }
  `,
  transparent:true,
  side:THREE.DoubleSide
});
const water=new THREE.Mesh(waterGeometry,waterMaterial);
water.rotation.x=-Math.PI/2;
water.position.y=0.01;
water.receiveShadow=true;
scene.add(water);

// GROUND
const groundGeometry=new THREE.PlaneGeometry(120,120);
const groundMaterial=new THREE.MeshStandardMaterial({color:0x4a7a2a,roughness:0.9});
const ground=new THREE.Mesh(groundGeometry,groundMaterial);
ground.rotation.x=-Math.PI/2;
ground.position.y=-0.2;
ground.receiveShadow=true;
scene.add(ground);

// FISHING ROD (First Person)
const rodGroup=new THREE.Group();
camera.add(rodGroup);
rodGroup.position.set(0.28,-0.7,-0.6);
rodGroup.rotation.set(0,0,-0.12);

// Rod handle
const handleGeo=new THREE.CylinderGeometry(0.035,0.04,0.5,10);
const handleMat=new THREE.MeshStandardMaterial({color:0x181410,roughness:0.96});
const handle=new THREE.Mesh(handleGeo,handleMat);
handle.position.y=0.25;
rodGroup.add(handle);

// Rod reel
const reelGeo=new THREE.CylinderGeometry(0.055,0.055,0.06,14);
const reelMat=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.3,metalness:0.7});
const reel=new THREE.Mesh(reelGeo,reelMat);
reel.position.y=0.55;
reel.rotation.x=Math.PI/2;
rodGroup.add(reel);

// Rod blank
const blankGeo=new THREE.CylinderGeometry(0.008,0.02,2.5,8);
const blankMat=new THREE.MeshStandardMaterial({color:0xb87333,roughness:0.65});
const blank=new THREE.Mesh(blankGeo,blankMat);
blank.position.y=1.5;
rodGroup.add(blank);

// Rod tip
const rodTip=new THREE.Object3D();
rodTip.position.y=3.0;
rodGroup.add(rodTip);

// BOBBER
const bobberGroup=new THREE.Group();
scene.add(bobberGroup);
bobberGroup.visible=false;

const bobberTopGeo=new THREE.SphereGeometry(0.12,10,8,0,Math.PI*2,0,Math.PI/2);
const bobberTopMat=new THREE.MeshStandardMaterial({color:0xe74c3c,roughness:0.5});
const bobberTop=new THREE.Mesh(bobberTopGeo,bobberTopMat);
bobberGroup.add(bobberTop);

const bobberBottomGeo=new THREE.SphereGeometry(0.12,10,8,0,Math.PI*2,Math.PI/2,Math.PI/2);
const bobberBottomMat=new THREE.MeshStandardMaterial({color:0xecf0f1,roughness:0.6});
const bobberBottom=new THREE.Mesh(bobberBottomGeo,bobberBottomMat);
bobberGroup.add(bobberBottom);

// FISHING LINE
const linePoints=30;
const linePositions=new Float32Array(linePoints*3);
const lineGeometry=new THREE.BufferGeometry();
lineGeometry.setAttribute('position',new THREE.Float32BufferAttribute(linePositions,3));
const lineMaterial=new THREE.LineBasicMaterial({color:0xdddddd,transparent:true,opacity:0.9});
const lineMesh=new THREE.Line(lineGeometry,lineMaterial);
scene.add(lineMesh);
lineMesh.visible=false;

// GIANT FISH MESH
const fishGroup=new THREE.Group();
scene.add(fishGroup);
fishGroup.visible=false;

// Fish body
const fishBodyGeo=new THREE.SphereGeometry(0.5,16,12);
const fishBodyMat=new THREE.MeshStandardMaterial({color:0x74b9ff,roughness:0.4,metalness:0.2});
const fishBody=new THREE.Mesh(fishBodyGeo,fishBodyMat);
fishBody.scale.set(2.5,0.8,0.9);
fishGroup.add(fishBody);

// Fish tail
const fishTailGeo=new THREE.ConeGeometry(0.4,1.2,5);
const fishTailMat=new THREE.MeshStandardMaterial({color:0x74b9ff,roughness:0.4});
const fishTail=new THREE.Mesh(fishTailGeo,fishTailMat);
fishTail.position.x=-1.6;
fishTail.rotation.z=-Math.PI/2;
fishGroup.add(fishTail);

// Fish fin
const fishFinGeo=new THREE.ConeGeometry(0.25,0.5,4);
const fishFin=new THREE.Mesh(fishFinGeo,fishBodyMat);
fishFin.position.set(0.3,0.55,0);
fishGroup.add(fishFin);

// Fish glow light
const fishLight=new THREE.PointLight(0x74b9ff,2,15);
fishGroup.add(fishLight);

// Bubbles
for(let i=0;i<8;i++){
  const bubbleGeo=new THREE.SphereGeometry(0.05+Math.random()*0.05,6,6);
  const bubbleMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.6});
  const bubble=new THREE.Mesh(bubbleGeo,bubbleMat);
  bubble.userData={offset:Math.random()*6.28,speed:1+Math.random()};
  fishGroup.add(bubble);
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let lineLength=10,fishRiseT=0,fishState='none',castT=0;
const bobTarget=new THREE.Vector3();

function updateWater(t){
  waterMaterial.uniforms.uTime.value=t;
}

function updateRod(){
  const targetRot=gstate==='casting'?0.35:gstate==='biting'?0.15+Math.sin(Date.now()*0.008)*0.08:gstate==='reeling'?0.25:0.05;
  rodGroup.rotation.x+=(targetRot-rodGroup.rotation.x)*0.08;
}

function updateBobber(t){
  if(gstate==='casting'){
    castT=Math.min(castT+0.06,1);
    bobberGroup.position.lerpVectors(new THREE.Vector3(camera.position.x,1.2,camera.position.z-3),bobTarget,castT);
    lineLength=castT*8;
  }else if(gstate==='waiting'){
    castT=1;
    bobberGroup.position.x=bobTarget.x+Math.sin(t*0.5)*0.8;
    bobberGroup.position.z=bobTarget.z+Math.cos(t*0.4)*0.5;
    bobberGroup.position.y=Math.sin(t)*0.1;
    lineLength=8;
  }else if(gstate==='biting'){
    bobberGroup.position.y=-0.2;
    lineLength=7.5;
  }else if(gstate==='reeling'){
    lineLength=Math.max(0.5,lineLength-0.15);
    bobberGroup.position.y=Math.sin(t)*0.05;
  }else{
    bobberGroup.visible=false;
    lineMesh.visible=false;
    lineLength=10;
  }
  
  bobberGroup.visible=lineLength>1&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');
  lineMesh.visible=lineLength>1;
}

function updateLine(){
  if(!lineMesh.visible) return;
  
  const tipPos=new THREE.Vector3();
  rodTip.getWorldPosition(tipPos);
  const bobPos=bobberGroup.position;
  const positions=lineMesh.geometry.attributes.position.array;
  
  for(let i=0;i<linePoints;i++){
    const f=i/(linePoints-1);
    const sag=Math.sin(f*Math.PI)*-0.3*(lineLength/8);
    positions[i*3]=tipPos.x+(bobPos.x-tipPos.x)*f;
    positions[i*3+1]=tipPos.y+(bobPos.y-tipPos.y)*f+sag;
    positions[i*3+2]=tipPos.z+(bobPos.z-tipPos.z)*f;
  }
  lineMesh.geometry.attributes.position.needsUpdate=true;
}

function updateFish(t){
  if(fishState==='rising'){
    fishGroup.visible=true;
    fishRiseT+=0.015;
    fishGroup.position.set(0,-1.5+fishRiseT*3.5,0);
    fishGroup.rotation.y+=0.06;
    fishGroup.rotation.z=Math.sin(t*2)*0.15;
    const scale=0.3+fishRiseT*2.5;
    fishGroup.scale.set(scale,scale,scale);
    
    // Animate bubbles
    fishGroup.children.filter(c=>c.userData.speed).forEach((b,i)=>{
      b.position.set(Math.sin(t*2+b.userData.offset)*0.5,fishRiseT*2+i*0.2,Math.cos(t*1.5+b.userData.offset)*0.4);
    });
    
    if(fishRiseT>=1) fishState='holding';
  }else if(fishState==='holding'){
    fishGroup.position.y=0.8+Math.sin(t*1.2)*0.15;
    fishGroup.rotation.y+=0.04;
    fishGroup.rotation.z=Math.sin(t*3)*0.1;
    if(t%4<0.1) fishState='pulling';
  }else if(fishState==='pulling'){
    const pullT=Math.min((t%4)/1.5,1);
    fishGroup.position.lerp(new THREE.Vector3(camera.position.x*0.3,0.5,camera.position.z*0.3+0.8),pullT*0.08);
    fishGroup.rotation.y+=0.08;
    fishGroup.rotation.z=Math.sin(t*5)*0.2;
    if(pullT>=1){
      fishGroup.visible=false;
      fishState='none';
      triggerCatch();
    }
  }
}

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*0.001;
  
  updateWater(t);
  updateRod();
  updateBobber(t);
  updateLine();
  updateFish(t);
  
  renderer.render(scene,camera);
}
animate();

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
let isDrag=false;
cv.addEventListener('mousedown',e=>{isDrag=true;px=e.clientX;py=e.clientY;});
document.addEventListener('mouseup',()=>isDrag=false);
document.addEventListener('mousemove',e=>{
  if(!isDrag) return;
  yaw-=(e.clientX-px)*0.0024;
  pitch=Math.max(-0.8,Math.min(0.8,pitch-(e.clientY-py)*0.0024));
  px=e.clientX;py=e.clientY;
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
});
cv.addEventListener('touchstart',e=>{isDrag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',()=>isDrag=false);
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!isDrag||!e.touches[0]) return;
  yaw-=(e.touches[0].clientX-px)*0.0028;
  pitch=Math.max(-0.8,Math.min(0.8,pitch-(e.touches[0].clientY-py)*0.0028));
  px=e.touches[0].clientX;py=e.touches[0].clientY;
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
},{passive:false});

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════
function rollFish(mapIdx){
  const rates=MAP_DEFS[mapIdx].rates;
  const r=Math.random()*100;
  let c=rates.miss||30;
  if(r<c) return null;
  for(const id of MAP_DEFS[mapIdx].pool){
    c+=rates[id]||0;
    if(r<c) return ALL_FISH[id];
  }
  return null;
}

function rollWeight(fish){
  const w=fish.minW+Math.random()*(fish.maxW-fish.minW);
  return Math.round(w*10)/10;
}

function fmtWeight(w){
  return w>=1000?(w/1000).toFixed(1)+' tấn':w>=1?w.toFixed(1)+' kg':Math.round(w*1000)+' g';
}

function handleCast(){
  if(gstate==='biting'){clearTimeout(bt);doReel();return;}
  if(gstate!=='idle') return;
  if(player.rodUses<=0){showToast('❌ Mua cần!');swTab('shop');return;}
  
  resultFish=null;
  resultWeight=0;
  hideBanner();
  gstate='casting';
  castT=0;
  fishState='none';
  
  setStatus('🎣 Đang quăng...');
  document.getElementById('cb').disabled=true;
  
  // Cast direction
  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y=0;
  fwd.normalize();
  bobTarget.set(camera.position.x+fwd.x*8,0,camera.position.z+fwd.z*8);
  bobberGroup.position.set(camera.position.x,1.2,camera.position.z-3);
  
  setTimeout(()=>{
    gstate='waiting';
    setStatus('⏳ Chờ cá...');
    waitDur=3000+Math.random()*4000;
    waitStart=performance.now();
    wt=setTimeout(startBite,waitDur);
  },800);
}

function startBite(){
  gstate='biting';
  setStatus('🐟 CÁ CẮN! NHẤN KÉO!');
  const b=document.getElementById('cb');
  b.textContent='⚡ KÉO!';
  b.disabled=false;
  bt=setTimeout(escape,3000);
}

function doReel(){
  gstate='reeling';
  setStatus('');
  const b=document.getElementById('cb');
  b.textContent='🎣 THẢ CÂU';
  b.disabled=true;
  
  player.rodUses--;
  updateUI();
  
  resultFish=rollFish(curMap);
  resultWeight=resultFish?rollWeight(resultFish):0;
  
  if(resultFish){
    // Set fish color
    fishBody.material.color.setHex(resultFish.color);
    fishTail.material.color.setHex(resultFish.color);
    fishLight.color.setHex(resultFish.color);
    
    fishState='rising';
    fishRiseT=0;
    setStatus('⚡ Đang kéo...');
  }else{
    setTimeout(escape,1500);
  }
}

function escape(){
  gstate='idle';
  fishState='none';
  fishGroup.visible=false;
  setStatus('😔 Cá thoát!');
  document.getElementById('cb').disabled=false;
  setTimeout(()=>setStatus('Nhấn THẢ CÂU'),2000);
}

function triggerCatch(){
  if(!resultFish) return;
  
  if(!player.inventory[resultFish.id]) player.inventory[resultFish.id]=[];
  player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value});
  player.totalCaught++;
  
  showBanner(resultFish,resultWeight);
  
  setTimeout(()=>{
    gstate='idle';
    hideBanner();
    setStatus('🎉 Bắt thành công!');
    document.getElementById('cb').disabled=false;
    renderContent();
  },2000);
}

function showBanner(fish,weight){
  const b=document.getElementById('result-banner');
  document.getElementById('res-emoji').textContent=fish.emoji;
  document.getElementById('res-name').textContent=fish.name;
  document.getElementById('res-info').textContent=fish.rar+' | ⚖️ '+fmtWeight(weight);
  document.getElementById('res-value').textContent='+'+fish.value.toLocaleString()+' 🪙';
  b.style.borderColor='#'+fish.color.toString(16).padStart(6,'0');
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
}

function hideBanner(){
  document.getElementById('result-banner').classList.remove('show');
}

function setStatus(msg){
  document.getElementById('st').textContent=msg;
}

function updateUI(){
  document.getElementById('coins').textContent=player.coins.toLocaleString();
  document.getElementById('rods').textContent=player.rodUses;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════════════════
// UI TABS
// ═══════════════════════════════════════════════════════════
function selMap(i){
  curMap=i;
  document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('on',j===i));
  
  // Change map colors
  const map=MAP_DEFS[i];
  scene.background=new THREE.Color(map.skyColor);
  waterMaterial.uniforms.uDeep.value.setHex(map.waterColor);
  waterMaterial.uniforms.uShallow.value.setHex(map.waterColor);
  
  showToast('📍 '+map.name);
}

function swTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tb').forEach((b,j)=>{
    const tabs=['bag','shop','sell','rates'];
    b.classList.toggle('on',tabs[j]===tab);
  });
  renderContent();
}

function renderContent(){
  const p=document.getElementById('cp');
  
  if(activeTab==='bag'){
    const keys=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(keys.length===0){
      p.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:10px">🎒</div><p>Túi trống</p></div>';
      return;
    }
    let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">';
    keys.forEach(id=>{
      const fish=ALL_FISH[id];
      const arr=player.inventory[id];
      const total=arr.reduce((s,e)=>s+e.value,0);
      html+=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:32px">${fish.emoji}</div>
        <div style="font-weight:800;font-size:10px;margin:4px 0">${fish.name}</div>
        <div style="font-size:9px;color:var(--sub)">×${arr.length}</div>
        <div style="color:var(--gold);font-size:9px;margin-top:4px">${total.toLocaleString()}🪙</div>
      </div>`;
    });
    html+='</div>';
    p.innerHTML=html;
  }
  else if(activeTab==='shop'){
    p.innerHTML=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:15px;display:flex;align-items:center;gap:15px;margin-bottom:10px">
      <div style="font-size:40px">🎣</div>
      <div style="flex:1">
        <div style="font-weight:900;font-size:13px">Cần Câu Đồng</div>
        <div style="font-size:10px;color:var(--sub);margin:4px 0">${ROD_USES} lần câu</div>
        <div style="color:var(--gold);font-weight:800">${ROD_PRICE.toLocaleString()} 🪙</div>
      </div>
      <button onclick="buyRod()" style="padding:10px 18px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:8px;color:#000;font-weight:900;cursor:pointer">MUA</button>
    </div>`;
  }
  else if(activeTab==='sell'){
    const keys=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(keys.length===0){
      p.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:10px">🐟</div><p>Không có cá để bán</p></div>';
      return;
    }
    let total=0;
    let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">';
    keys.forEach(id=>{
      const fish=ALL_FISH[id];
      const arr=player.inventory[id];
      const val=arr.reduce((s,e)=>s+e.value,0);
      total+=val;
      html+=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:32px">${fish.emoji}</div>
        <div style="font-weight:800;font-size:10px;margin:4px 0">${fish.name}</div>
        <div style="font-size:9px;color:var(--sub)">×${arr.length}</div>
        <div style="color:var(--gold);font-size:9px;margin:6px 0">${val.toLocaleString()}🪙</div>
        <button onclick="sellFish('${id}')" style="width:100%;padding:6px;background:#e74c3c;border:none;border-radius:4px;color:#fff;font-size:9px;cursor:pointer;font-weight:800">BÁN</button>
      </div>`;
    });
    html+=`</div><div style="margin-top:15px;text-align:right;font-weight:800;color:var(--gold);font-size:13px">Tổng: ${total.toLocaleString()} 🪙</div>`;
    p.innerHTML=html;
  }
  else if(activeTab==='rates'){
    const map=MAP_DEFS[curMap];
    let html='<table style="width:100%;font-size:10px;border-collapse:collapse">';
    html+='<tr style="background:rgba(255,255,255,.05)"><th style="padding:8px;text-align:left">Cá</th><th>Hiếm</th><th>Tỉ Lệ</th><th>Giá</th></tr>';
    html+=`<tr><td style="padding:8px">💨 Hụt</td><td>—</td><td>${map.rates.miss}%</td><td>—</td></tr>`;
    map.pool.forEach(id=>{
      const fish=ALL_FISH[id];
      html+=`<tr><td style="padding:8px">${fish.emoji} ${fish.name}</td><td>${fish.rar}</td><td>${map.rates[id]||0}%</td><td style="color:var(--gold)">${fish.value.toLocaleString()}🪙</td></tr>`;
    });
    html+='</table>';
    p.innerHTML=html;
  }
}

function buyRod(){
  if(player.coins<ROD_PRICE){
    showToast('❌ Không đủ xu!');
    return;
  }
  player.coins-=ROD_PRICE;
  player.rodUses+=ROD_USES;
  updateUI();
  showToast(`✅ Mua ${ROD_USES} lần câu!`);
  renderContent();
}

function sellFish(id){
  if(!player.inventory[id]) return;
  const total=player.inventory[id].reduce((s,e)=>s+e.value,0);
  player.coins+=total;
  delete player.inventory[id];
  updateUI();
  showToast(`💰 +${total.toLocaleString()} 🪙`);
  renderContent();
}

document.getElementById('cb').addEventListener('click',()=>{
  if(gstate==='biting') doReel();
});

function enterDemo(){
  DEMO=true;
  player={userId:'demo',username:'Người Chơi',coins:500000,rodUses:20,inventory:{},totalCaught:0};
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('game').style.display='flex';
  updateUI();
  renderContent();
  setStatus('🎮 Chế độ Demo');
  showToast('🎮 Demo: Không lưu dữ liệu');
}

function verifyId(){
  const input=document.getElementById('discord-id').value.trim();
  if(!/^\d{17,19}$/.test(input)){
    showToast('❌ ID phải 17-19 số!');
    return;
  }
  if(input===sessionData.userId){
    document.getElementById('auth').style.display='none';
    document.getElementById('loading').style.display='flex';
    document.getElementById('loadtxt').textContent='Đang vào game...';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('game').style.display='flex';
      player.userId=sessionData.userId;
      player.username=sessionData.username;
      player.coins=sessionData.coins||0;
      player.rodUses=sessionData.rodUses||0;
      updateUI();
      renderContent();
      setStatus('Nhấn THẢ CÂU');
    },1000);
  }else{
    showToast('❌ ID không khớp!');
  }
}
