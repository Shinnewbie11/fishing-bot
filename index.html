<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎣 Câu Cá Online 2D</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ... (giữ nguyên CSS như file gốc) ... */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#04121f;font-family:'Be Vietnam Pro',sans-serif;overflow:hidden;color:#fff;user-select:none;position:fixed;inset:0;touch-action:none;overscroll-behavior:none}
#wrap{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#04121f;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
/* ... CSS còn lại giữ nguyên ... */
.hud{position:absolute;pointer-events:none;z-index:5}
.hud *{pointer-events:auto}
#pinfo{top:10px;left:10px;display:flex;gap:8px;align-items:flex-start}
#avatar{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#2a4d6e,#16344f);border:2px solid #5fd0ff;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
#pstats{font-size:11px;line-height:1.5}
#pstats .nm{font-weight:800;font-size:13px;color:#ffe27a;text-shadow:1px 1px 2px #000}
.bar{width:130px;height:9px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);border-radius:5px;overflow:hidden;margin-top:2px;position:relative}
.bar > i{position:absolute;inset:0;display:block;border-radius:5px}
.bar span{position:absolute;inset:0;font-size:8px;text-align:center;line-height:9px;text-shadow:1px 1px 1px #000;font-weight:700}
#xpfill{background:linear-gradient(90deg,#3a9bff,#73d2ff)}
#stamfill{background:linear-gradient(90deg,#ff8a2a,#ffd23f)}
#pstats small{color:#bcd6ec;font-size:9px}
#topright{top:10px;right:10px;display:flex;align-items:center;gap:8px}
#coins{background:rgba(8,24,40,.85);border:1px solid #ffd23f;border-radius:18px;padding:5px 12px 5px 8px;font-weight:800;color:#ffd23f;font-size:13px;display:flex;align-items:center;gap:5px}
.icobtn{width:34px;height:34px;border-radius:50%;background:rgba(8,24,40,.85);border:1px solid #2f5a7d;color:#bcd6ec;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.icobtn:hover{border-color:#5fd0ff;color:#5fd0ff;transform:scale(1.08)}
#fishhud{top:8px;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:.3s}
#fishhud.show{opacity:1}
#fishhud .ftit{font-weight:800;font-size:13px;color:#ff7a7a;text-shadow:1px 1px 2px #000}
#fishbar{width:230px;height:13px;background:rgba(0,0,0,.6);border:1px solid #ff7a7a;border-radius:7px;overflow:hidden;margin:3px auto 0;position:relative}
#fishbar > i{position:absolute;inset:0;background:linear-gradient(90deg,#c0392b,#ff5a5a);border-radius:7px;transition:width .15s}
#fishbar span{position:absolute;inset:0;font-size:9px;line-height:13px;text-align:center;font-weight:800;text-shadow:1px 1px 1px #000}
#netstat{position:absolute;top:52px;right:10px;font-size:10px;background:rgba(8,24,40,.85);padding:4px 9px;border-radius:12px;border:1px solid #2f5a7d;color:#9fc;display:flex;align-items:center;gap:5px;z-index:5}
#netstat .dot{width:8px;height:8px;border-radius:50%;background:#ffb02a;box-shadow:0 0 6px #ffb02a}
#netstat.live .dot{background:#37e07a;box-shadow:0 0 6px #37e07a}
#chatbox{bottom:88px;left:10px;width:250px;max-width:46%;z-index:5}
#chatlog{max-height:118px;overflow-y:auto;font-size:11px;line-height:1.5;display:flex;flex-direction:column;justify-content:flex-end;mask-image:linear-gradient(to top,#000 70%,transparent)}
#chatlog::-webkit-scrollbar{width:0}
#chatlog div{margin-bottom:1px;text-shadow:1px 1px 2px #000}
#chatlog .who{color:#73d2ff;font-weight:700}
#chatlog .sys{color:#ffd23f}
#chatrow{display:flex;gap:5px;margin-top:5px}
#chatinput{flex:1;background:rgba(4,16,28,.9);border:1px solid #2f5a7d;border-radius:14px;padding:6px 11px;color:#fff;font-size:11px;font-family:inherit;outline:none}
#chatinput:focus{border-color:#5fd0ff}
#chatsend{background:#1f6dad;border:none;border-radius:14px;padding:0 12px;color:#fff;font-size:13px;cursor:pointer}
#reelarea{bottom:14px;right:14px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:6}
#reelbtn{width:92px;height:92px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#3a3f48,#15181d);border:4px solid #4a525c;color:#dfe8f0;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.6);position:relative;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.15;transition:.1s}
#reelbtn:active{transform:scale(.94)}
#reelbtn .spokes{position:absolute;inset:8px;border-radius:50%;border:2px dashed #6a727c}
#reeldepth{font-size:10px;color:#bcd6ec;background:rgba(8,24,40,.8);padding:3px 9px;border-radius:10px;border:1px solid #2f5a7d}
#castbtn{bottom:24px;left:50%;transform:translateX(-50%);padding:15px 40px;border:none;border-radius:30px;background:linear-gradient(135deg,#0f7ad4,#2cc6ff);color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 6px 22px rgba(44,198,255,.55);z-index:6;letter-spacing:.5px;transition:.12s}
#castbtn:active{transform:translateX(-50%) scale(.95)}
#castbtn.charging{background:linear-gradient(135deg,#c08400,#ffc400)}
#castbtn:disabled{opacity:.45;cursor:default}
#power{bottom:74px;left:50%;transform:translateX(-50%);width:200px;height:11px;background:rgba(0,0,0,.6);border:1px solid #2cc6ff;border-radius:7px;overflow:hidden;opacity:0;transition:opacity .2s;z-index:6}
#power.show{opacity:1}
#power > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#37e07a,#ffd23f,#ff5a5a)}
#hint{top:50%;left:50%;transform:translate(-50%,-50%);font-weight:800;font-size:15px;color:#fff;text-shadow:2px 2px 4px #000,0 0 14px rgba(44,198,255,.7);background:rgba(4,16,28,.5);padding:10px 22px;border-radius:20px;text-align:center;z-index:5;transition:.3s;pointer-events:none}
#cfgbtn{position:absolute;bottom:14px;left:14px;z-index:7;background:rgba(8,24,40,.85);border:1px solid #2f5a7d;color:#9fc;font-size:10px;padding:7px 11px;border-radius:12px;cursor:pointer}
#cfgbtn:hover{border-color:#5fd0ff}
#login{position:absolute;inset:0;background:rgba(2,8,16,.95);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
#login.show{display:flex}
#loginbox{background:#0a1c30;border:1px solid #2f5a7d;border-radius:14px;padding:24px;max-width:340px;width:100%;text-align:center}
#loginbox h3{color:#5fd0ff;margin-bottom:10px;font-size:18px}
#loginbox p{font-size:12px;color:#bcd6ec;line-height:1.6;margin-bottom:14px}
#loginbox input{width:100%;background:#04121f;border:1px solid #2f5a7d;border-radius:8px;color:#fff;padding:12px;font-size:14px;outline:none;font-family:inherit}
#loginbox input:focus{border-color:#5fd0ff}
#loginerr{display:block;margin-top:10px;color:#ff7a7a;font-size:12px;min-height:16px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1;padding:13px;border:none;border-radius:8px;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit}
#loginbtn{background:linear-gradient(135deg,#0f7ad4,#2cc6ff);color:#fff}
#toast{position:absolute;top:90px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(10,28,50,.96);border:1px solid #5fd0ff;border-radius:14px;padding:9px 18px;font-size:13px;font-weight:800;z-index:40;opacity:0;transition:.35s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:760px){
  #castbtn{padding:18px 44px;font-size:17px;bottom:20px}
  #reelbtn{width:104px;height:104px;font-size:14px}
  #reelarea{bottom:18px;right:16px}
  #avatar{width:40px;height:40px;font-size:20px}
  .bar{width:108px}
  #chatbox{width:55%;bottom:96px}
  #chatlog{max-height:90px}
  #coins{font-size:12px;padding:5px 10px}
  .icobtn{width:38px;height:38px;font-size:16px}
  #fishbar{width:min(60vw,260px)}
  #hint{font-size:14px;width:min(80vw,360px)}
}
@media (max-width:480px) and (orientation:portrait){
  #chatbox{width:62%;bottom:160px}
  #chatlog{max-height:70px}
}
@media (hover:none){
  #castbtn,#reelbtn,.icobtn,#chatsend{touch-action:manipulation}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>

  <!-- info người chơi -->
  <div class="hud" id="pinfo">
    <div id="avatar">🧑‍🎣</div>
    <div id="pstats">
      <div class="nm" id="myname">Bạn</div>
      <div><small>Lv <b id="mylv">1</b></small></div>
      <div class="bar"><i id="xpfill" style="width:20%"></i><span id="xptxt">XP</span></div>
      <div class="bar"><i id="stamfill" style="width:100%"></i><span id="stamtxt">Thể lực</span></div>
      <div><small id="rankline">Cá nặng nhất: — • Hạng: #—</small></div>
    </div>
  </div>

  <!-- xu + nút -->
  <div class="hud" id="topright">
    <div id="coins">🪙 <span id="coinval">100,000</span></div>
    <button class="icobtn" id="btnRank" title="Xếp hạng">🏆</button>
    <button class="icobtn" id="btnChat" title="Chat">💬</button>
  </div>

  <div id="netstat"><span class="dot"></span><span id="netlabel">Demo (chưa nối Firebase)</span></div>

  <!-- thông tin cá đang câu -->
  <div class="hud" id="fishhud">
    <div class="ftit" id="ftit">Cá</div>
    <div id="fishbar"><i></i><span id="fishbartxt"></span></div>
  </div>

  <!-- chat -->
  <div class="hud" id="chatbox">
    <div id="chatlog"></div>
    <div id="chatrow">
      <input id="chatinput" maxlength="80" placeholder="Nhập tin nhắn...">
      <button id="chatsend">➤</button>
    </div>
  </div>

  <!-- hint giữa -->
  <div id="hint">Nhấn giữ THẢ CÂU để lấy lực!</div>

  <!-- reel -->
  <div class="hud" id="reelarea">
    <button id="reelbtn"><span class="spokes"></span>CO LẠI<br>DÂY</button>
    <div id="reeldepth">Chiều dài cáp: <b id="depthval">0.0</b>m</div>
  </div>

  <!-- power + cast -->
  <div id="power"><i></i></div>
  <button id="castbtn">🎣 THẢ CÂU</button>

  <!-- màn đăng nhập -->
  <div id="login"><div id="loginbox">
    <h3>🎣 Đăng Nhập Câu Cá</h3>
    <p id="logininfo">Nhập mật khẩu đã gửi vào DM Discord của bạn.</p>
    <input id="loginpw" maxlength="8" placeholder="Mật khẩu 6 ký tự" autocomplete="off" style="text-transform:uppercase;text-align:center;letter-spacing:4px;font-size:18px;font-weight:800">
    <div class="mbtns">
      <button id="loginbtn">Vào Game</button>
    </div>
    <small id="loginerr"></small>
  </div></div>

  <div id="toast"></div>

  <div id="rotate">
    <div class="ph">📱</div>
    <p>Xoay ngang điện thoại<br>để chơi tốt hơn nhé!</p>
    <small>(hoặc bấm bên dưới để chơi dọc)</small>
    <button id="playportrait">Vẫn chơi màn dọc</button>
  </div>
</div>
<script>
'use strict';

// ── Dữ liệu cá (KHỚP fishing.js) ──
const MAX_PAYOUT = 100_000_000;
const FISH=[
  {id:'moi', name:'Cá Mồi',      emoji:'🐟', base:10_000,      rar:'Thường',       col:'#74b9ff', minW:.1, maxW:.8,  power:1,  rate:35,  boss:false},
  {id:'tram',name:'Cá Trắm',     emoji:'🐠', base:100_000,     rar:'Không Thường', col:'#a29bfe', minW:1,  maxW:8,   power:2,  rate:20,  boss:false},
  {id:'chep',name:'Cá Chép Vàng',emoji:'🐡', base:500_000,     rar:'Quý Hiếm',     col:'#fdcb6e', minW:5,  maxW:30,  power:3.2,rate:10,  boss:true},
  {id:'hoi', name:'Cá Hồi',      emoji:'🦑', base:5_000_000,   rar:'Huyền Thoại',  col:'#e17055', minW:20, maxW:120, power:5,  rate:4.99,boss:true},
  {id:'rong',name:'Cá Rồng',     emoji:'🐲', base:100_000_000, rar:'Thần Thoại',   col:'#ffd700', minW:500,maxW:3000,power:9,  rate:0.01,boss:true},
];
const MISS_RATE=30;
function rollFish(){
  let x=Math.random()*100, c=MISS_RATE;
  if(x<c) return null;
  for(const f of FISH){ c+=f.rate; if(x<c) return f; }
  return FISH[0];
}
function rollWeight(f){ return Math.round((f.minW+Math.random()**2*(f.maxW-f.minW))*10)/10; }
function fmtW(w){ return w>=1000?(w/1000).toFixed(1)+' tấn':w>=1?w.toFixed(1)+' kg':Math.round(w*1000)+' g'; }
function fmtN(n){ return Math.round(n).toLocaleString('vi-VN'); }
function lvFromXp(xp){ return Math.floor(Math.sqrt(xp/50))+1; }
function xpForLv(lv){ return 50*(lv-1)*(lv-1); }

// ── Trạng thái người chơi ──
const me={
  id:'me', name:'Bạn', lv:1, xp:0, coins:100000,
  x:0.18, state:'idle', lineDepth:0, stamina:1700, staminaMax:1700,
  best:0, rodUses:999, inventory:{}, totalCaught:0, totalEarned:0,
};
let lobbyId='ho-lang';
const RAND_NAMES=['Hồng Hải Nhi','Tiểu Ngư','Lão Câu','Phong Vân','Hắc Long','Bạch Tuyết','Mèo Lười','Ngư Phủ','Sóng Biển','Kẻ Lữ Hành','A Phú','Thần Câu'];

// ╔══════════════════════════════════════════════════════════╗
// ║  🔧 DÁN FIREBASE CLIENT CONFIG CỦA BẠN VÀO ĐÂY            ║
// ║  Lấy từ: Firebase Console → Project settings → Web app   ║
// ╚══════════════════════════════════════════════════════════╝
const FIREBASE_CONFIG = {
  // ⚠️ Thay bằng config thật của bạn:
  // apiKey: "AIza...",
  // authDomain: "fishing-bot-e8d42.firebaseapp.com",
  databaseURL: "https://fishing-bot-e8d42-default-rtdb.firebaseio.com",
  // projectId: "fishing-bot-e8d42",
  // appId: "1:...:web:..."
};
const GAME_SECRET = 'datBatKyChuan123'; // 🔐 Phải khớp fishing.js

// ════════════════════════════════════════════════════════════
// NET LAYER
// ════════════════════════════════════════════════════════════
const net={ mode:'demo', players:{}, onChat:null, onPlayersChange:null, _fb:null, session:null };

function startDemo(){
  net.mode='demo'; net.players={};
  const n=3+Math.floor(Math.random()*3);
  const used=new Set();
  for(let i=0;i<n;i++){
    let nm; do{ nm=RAND_NAMES[Math.floor(Math.random()*RAND_NAMES.length)]; }while(used.has(nm)); used.add(nm);
    const id='bot'+i;
    net.players[id]={ id, name:nm, lv:5+Math.floor(Math.random()*40), x:0.28+i*0.16+Math.random()*0.05, state:'waiting', lineDepth:1+Math.random()*2, best:Math.round(Math.random()*Math.random()*900), _t:Math.random()*4, _bot:true };
  }
  net.players['me']=publicMe();
  setNet(false,'Demo (chưa nối Firebase)');
  net.onPlayersChange&&net.onPlayersChange();
  if(net._demoTimer)clearInterval(net._demoTimer);
  net._demoTimer=setInterval(demoTick,500);
  if(net._chatTimer)clearInterval(net._chatTimer);
  net._chatTimer=setInterval(()=>{
    const ids=Object.keys(net.players).filter(k=>net.players[k]._bot);
    if(!ids.length)return;
    if(Math.random()<0.5){
      const b=net.players[ids[Math.floor(Math.random()*ids.length)]];
      const lines=['câu được con bự rồi 😎','hồ này cá đẹp ghê','ai cho mượn cần xịn 🙏','quào con đó mấy tấn vậy','đói quá nghỉ chút','chúc mọi người câu trúng!','vô coi bảng xếp hạng đi'];
      net.onChat&&net.onChat({who:b.name, text:lines[Math.floor(Math.random()*lines.length)]});
    }
  },6000);
}
function demoTick(){
  let changed=false;
  for(const id in net.players){ const p=net.players[id]; if(!p._bot)continue; p._t-=0.5; if(p._t<=0){ const states=['waiting','reeling','casting','idle']; p.state=states[Math.floor(Math.random()*states.length)]; p._t=2+Math.random()*4; if(p.state==='reeling'&&Math.random()<0.4){ p.best=Math.max(p.best,Math.round(Math.random()*1500)); } changed=true; } p.lineDepth=p.state==='idle'?0:1+Math.sin(Date.now()/700+id.length)*0.8+1.5; }
  if(changed)net.onPlayersChange&&net.onPlayersChange();
}

// ---------- FIREBASE THẬT ----------
let FB=null;
async function initFirebase(){
  if(FB) return FB;
  if(!FIREBASE_CONFIG.databaseURL) throw new Error('Chưa điền FIREBASE_CONFIG');
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const dbm=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  const authm=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const app=initializeApp(FIREBASE_CONFIG);
  const auth=authm.getAuth(app);
  await authm.signInAnonymously(auth);
  FB={app, db:dbm.getDatabase(app), m:dbm, auth};
  return FB;
}

async function fetchSession(token){
  const {db,m}=await initFirebase();
  const snap=await m.get(m.ref(db,`sessions/${token}`));
  if(!snap.exists()) throw new Error('Phiên không tồn tại hoặc đã hết hạn');
  const s=snap.val();
  if(s.secret!==GAME_SECRET) throw new Error('Sai secret');
  if(s.expiresAt && Date.now()>s.expiresAt) throw new Error('Phiên đã hết hạn (10 phút)');
  return s;
}

async function startOnline(token, session){
  const {db,m}=FB;
  net.mode='fb'; net.session={token,...session};
  me.id=session.userId;
  me.name=session.username||('Người chơi');
  me.coins=session.coins||0;
  me.rodUses=session.rodUses||0;
  me.inventory=normInv(session.inventory||{});
  me.best=bestWeight(me.inventory);

  net.players={};
  net._fb={db,m,base:`lobby/${lobbyId}`};

  const meRef=m.ref(db,`${net._fb.base}/presence/${me.id}`);
  m.onDisconnect(meRef).remove();
  await m.set(meRef, publicMe());

  m.onValue(m.ref(db,`${net._fb.base}/presence`), snap=>{
    net.players=snap.val()||{};
    if(!net.players[me.id]) net.players[me.id]=publicMe();
    net.onPlayersChange&&net.onPlayersChange();
  });
  const chatRef=m.ref(db,`${net._fb.base}/chat`);
  m.onValue(chatRef, snap=>{
    const arr=Object.values(snap.val()||{}).sort((a,b)=>(a.t||0)-(b.t||0)).slice(-20);
    if(net._chatSeen===undefined){ net._chatSeen=arr.length; redrawChat(arr); return; }
    if(arr.length>net._chatSeen){ for(let i=net._chatSeen;i<arr.length;i++) net.onChat&&net.onChat(arr[i]); net._chatSeen=arr.length; }
  });
  m.onValue(m.ref(db,`players/${me.id}`), snap=>{
    const d=snap.val(); if(!d)return;
    const botTs=d.botUpdatedAt||0, webTs=d.webUpdatedAt||0;
    if(botTs>webTs){ if(typeof d.coins==='number') me.coins=d.coins; if(typeof d.rodUses==='number') me.rodUses=d.rodUses; updateHUD&&updateHUD(); }
  });

  setNet(true, `Online — ${me.name}`);
  toast(`✅ Vào hồ! 🎣 ${me.rodUses} lần • 🪙 ${fmtN(me.coins)}`);
}

function normInv(inv){
  const out={};
  for(const [fid,arr] of Object.entries(inv||{})){
    if(Array.isArray(arr)) out[fid]=arr.filter(e=>e&&e.value!=null).map(e=>({weight:e.weight||0,value:e.value||0,map:e.map||0,caughtAt:e.caughtAt||Date.now()}));
  }
  return out;
}
function bestWeight(inv){ let b=0; for(const arr of Object.values(inv||{})) for(const e of arr) b=Math.max(b,e.weight||0); return b; }

let _writeT=0;
async function writePlayer(force){
  if(net.mode!=='fb'||!FB) return;
  const now=Date.now();
  if(!force && now-_writeT<400) return;
  _writeT=now;
  try{
    await FB.m.update(FB.m.ref(FB.db,`players/${me.id}`), {

// ════════════════════════════════════════════════════════════
let lastT=performance.now();
function loop(now){ requestAnimationFrame(loop); let dt=(now-lastT)/1000; lastT=now; dt=Math.min(dt,0.05); const t=now*0.001; updateFishing(dt,t); if(me.state==='idle'||me.state==='waiting'){ me.stamina=Math.min(me.staminaMax, me.stamina+90*dt); } drawScene(t); drawBgMonsters(dt,t); const ids=Object.keys(net.players); ids.sort((a,b)=>anglerPos(net.players[a].x||0.5).py - anglerPos(net.players[b].x||0.5).py); for(const id of ids){ const p=net.players[id]; if(!p)continue; const isMe=(id===me.id); const info=isMe?{lv:me.lv,name:me.name,state:me.state}:{lv:p.lv||1,name:p.name||'?',state:p.state||'idle'}; const mp=anglerPos(isMe?me.x:(p.x||0.5)); const sc=0.9+(isMe?me.x:(p.x||0.5))*0.5; const tip=drawAngler(mp.px,mp.py,sc,info,isMe,t); if(isMe){ myTip=tip; } if(!isMe && (info.state==='waiting'||info.state==='biting'||info.state==='reeling')){ const depth=(p.lineDepth||1.5); const hx=mp.px+60*sc+depth*14, hy=mp.py-20*sc+depth*22; drawLine(tip.rx,tip.ry,hx,hy,0.35,t,info.state==='biting'); ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(hx,hy,3.5*sc,0,7); ctx.fill(); } } drawMyTackle(t); if(bigFish) drawBigFish(dt,t); drawSplash(dt); drawCatchBanner(dt); }
function updateFishing(dt,t){ if(me.state==='casting'){ castProg=Math.min(castProg+dt*1.6,1); const e=1-Math.pow(1-castProg,3); hookX=lerp(hookX,castTargetX,e*0.5); hookY=lerp(hookY,castTargetY,e*0.5); me.lineDepth=castProg*((castTargetY-WATER_TOP)*30); if(castProg>=1){ me.state='waiting'; setHint('⏳ Chờ cá cắn...'); emitSplash(hookX*W,hookY*H,14,3); publishSelf(true); waitTimer=setTimeout(startBite, 1800+Math.random()*4000); } } else if(me.state==='waiting'){ hookY=castTargetY+Math.sin(t*1.5)*0.004; me.lineDepth=(hookY-WATER_TOP)*30; } else if(me.state==='biting'){ hookY=castTargetY+0.02+Math.max(0,Math.sin(t*16))*0.012; if(Math.random()<0.2) emitSplash(hookX*W,hookY*H,2,1.5); } else if(me.state==='reeling'){ const freq=2.2+curFish.power*0.35; const amp=curFish.boss?1.0:0.7; fishStruggle=Math.max(0, Math.sin(t*freq-curFish.power*0.5))*amp; const struggling=fishStruggle>0.35; const pull=curFish.power*0.25; if(reelHeld && me.stamina>0){ fishDist=Math.max(0, fishDist-dt*0.32/Math.max(1,curFish.power*0.4)); me.stamina-=(20+curFish.power*8)*dt; tension+=(struggling?(0.55+pull*0.1):0.12)*dt-0.1*dt; }else{ tension-=0.5*dt; fishDist=Math.min(1, fishDist+(struggling?0.06:0.015)*dt*pull); } tension=clamp(tension,0,1); me.stamina=Math.max(0,me.stamina); reelFrames++; if(reelHeld && tension>0.25 && tension<0.85) reelGood++; myReelJerk=struggling?fishStruggle:myReelJerk*0.9; myReelBoss=curFish.boss; const mp=anglerPos(me.x); const baseX=mp.px/W, baseY=mp.py/H; hookX=lerp(baseX+0.06, castTargetX, fishDist); hookY=lerp(baseY-0.02, castTargetY+0.03, fishDist); me.lineDepth=fishDist*((castTargetY-WATER_TOP)*30); $('fishbar').firstElementChild.style.width=((1-fishDist)*100)+'%'; $('fishbartxt').textContent=`${Math.round((1-fishDist)*100)}% • Căng: ${Math.round(tension*100)}%`; $('fishbar').style.borderColor=tension>0.8?'#ff2a2a':tension>0.55?'#ffae42':'#ff7a7a'; if(struggling) shake(tension*(curFish.boss?6:3)+fishStruggle*(curFish.boss?4:1.5)); if(tension>=1){ failCatch('💥 Đứt dây! Cá quá khoẻ!'); shake(10); myReelJerk=0; return; } if(me.stamina<200 && reelHeld){ setHint('😫 Sắp hết thể lực! Nhả tay cho cá nghỉ rồi kéo tiếp.'); } else if(curFish.boss && struggling){ setHint('🐉 QUÁI VẬT ĐANG GIẬT MẠNH! Nhả bớt kẻo đứt!'); } else { setHint(tension>0.7?'⚠️ Dây căng quá! Nhả bớt!':'⚡ Giữ CO DÂY để kéo, nhả khi cá giật mạnh!'); } if(fishDist<=0.02 && !bigFish){ myReelJerk=0; spawnBigFish(); } publishSelf(); } else { myReelJerk*=0.85; } }
let myReelJerk=0, myReelBoss=false;
function spawnBigFish(){ const mp=anglerPos(me.x); const wf=Math.min(1, Math.log10(curWeight+1)/3.4); const baseLen=Math.min(W,H); const len=baseLen*(0.12+wf*0.42); const isBoss=curFish.power>=3; bigFish={ prog:0, x:hookX, y:hookY, targetX:mp.px/W, targetY:mp.py/H-0.06, len, col:curFish.col, done:false, boss:isBoss, shownBanner:false }; setHint(isBoss?'🌊🐉 QUÁI VẬT KHỔNG LỒ TRỒI LÊN!':'🌊 Cá đang trồi lên!'); fishHud(false); emitSplash(hookX*W,hookY*H, isBoss?40:24, isBoss?7:5); shake(isBoss?7:4); }
function drawBigFish(dt,t){ const b=bigFish; b.prog+=dt*(b.boss?0.42:0.62); if(b.prog<1){ const e=1-Math.pow(1-Math.min(b.prog/0.7,1),2.2); const surfaceY=WATER_TOP+0.18; b.curY=lerp(hookY+0.3, surfaceY, e); b.curX=hookX; const len=b.len*(0.45+e*0.75); drawFishShape(b.curX*W,b.curY*H,len,-1,b.col,1,t,b.boss); if(b.prog>0.35 && Math.random()<0.5) emitSplash(b.curX*W,(WATER_TOP+0.04)*H, b.boss?8:4, 5); if(b.boss) shake(1.5+e*2); } else if(b.prog<2.0){ const p=b.prog-1; b.curX=lerp(hookX,0.5,Math.min(p*2,1)*0.6); b.curY=WATER_TOP+0.2+Math.sin(t*3)*0.02; const len=b.len*(1.2+Math.sin(t*4)*0.04); drawFishShape(b.curX*W,b.curY*H,len,-1,b.col,1,t*1.4,b.boss); if(Math.random()<0.4) emitSplash(b.curX*W,b.curY*H,4,3); if(b.boss && Math.sin(t*8)>0.5) shake(2); if(!b.shownBanner){ b.shownBanner=true; setHint(`${curFish.emoji} ${curFish.name} ${fmtW(curWeight)} — kéo vào bờ!`); } } else if(b.prog<2.8){ const p=(b.prog-2)/0.8, e=p*p; b.curX=lerp(0.5*0.6+hookX*0.4,b.targetX,e); b.curY=lerp(WATER_TOP+0.2,b.targetY,e); const len=b.len*(1.3+e*2.4); const dir=b.targetX>b.curX?1:-1; drawFishShape(b.curX*W,b.curY*H,len,dir,b.col,1,t*1.8,b.boss); shake(2+e*6); if(Math.random()<0.5) emitSplash(b.curX*W,b.curY*H,5,3); } else if(!b.done){ b.done=true; emitSplash(b.targetX*W,b.targetY*H,28,6); shake(b.boss?9:6); succeedCatch(); } }
let catchBanner=null; function showCatchBanner(f,w,payout,grade,pull){ catchBanner={f,w,payout,grade,pull:pull||0,life:1.3}; }
function drawCatchBanner(dt){ if(!catchBanner)return; const b=catchBanner; b.life-=dt*0.45; if(b.life<=0){ catchBanner=null; return; } const a=Math.min(1,b.life*2.5); const pop=b.life>1.15?(1-(b.life-1.15)/0.15):1; ctx.save(); ctx.globalAlpha=a; ctx.translate(W*0.5, H*0.16); ctx.scale(pop,pop); const txt=`${b.f.emoji} ${b.f.name}`; const sub=`${fmtW(b.w)} • ${b.f.rar}`; const money=`+${fmtN(b.payout||0)} 🪙  •  Lực kéo: ${b.grade||''}`; ctx.font=`900 ${Math.min(W*0.05,30)}px 'Be Vietnam Pro'`; ctx.textAlign='center'; ctx.textBaseline='middle'; const tw=Math.max(ctx.measureText(txt).width, ctx.measureText(money).width)+50; ctx.fillStyle='rgba(8,16,30,0.85)'; ctx.strokeStyle=b.f.col; ctx.lineWidth=3; roundRect(-tw/2,-46,tw,92,14); ctx.fill(); ctx.stroke(); ctx.shadowColor='#000'; ctx.shadowBlur=6; ctx.fillStyle=b.f.col; ctx.fillText(txt,0,-24); ctx.font=`800 ${Math.min(W*0.03,17)}px 'Be Vietnam Pro'`; ctx.fillStyle='#cfe6f7'; ctx.fillText(sub,0,2); ctx.font=`900 ${Math.min(W*0.034,20)}px 'Be Vietnam Pro'`; ctx.fillStyle='#ffd23f'; ctx.fillText(money,0,26); ctx.restore(); }
function drawLine(x1,y1,x2,y2,alpha,t,wobble){ ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#eaf6ff'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(x1,y1); const sag=(wobble?6+Math.sin(t*14)*3:14); ctx.quadraticCurveTo((x1+x2)/2,(y1+y2)/2+sag,x2,y2); ctx.stroke(); ctx.restore(); }
let myTip={rx:0,ry:0}; function drawMyTackle(t){ if(me.state==='idle'||me.state==='charging')return; const tipx=myTip.rx||0, tipy=myTip.ry||0; const wobble=me.state==='biting' || (me.state==='reeling'&&myReelJerk>0.3); drawLine(tipx,tipy,hookX*W,hookY*H,0.85,t,wobble); ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(hookX*W,hookY*H,5,0,7); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(hookX*W,hookY*H+5,4,0,Math.PI); ctx.fill(); }
const sparks=[]; function emitSplash(x,y,n,p){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2; sparks.push({x,y,vx:Math.cos(a)*p*30*(0.5+Math.random()),vy:-Math.abs(Math.random())*p*60-20,life:1}); } }
function drawSplash(dt){ ctx.save(); ctx.fillStyle='rgba(220,245,255,0.85)'; for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.life-=dt*1.4; s.vy+=600*dt; s.x+=s.vx*dt; s.y+=s.vy*dt; if(s.life<=0){ sparks.splice(i,1); continue; } ctx.globalAlpha=s.life; ctx.beginPath(); ctx.arc(s.x,s.y,2.5*s.life+1,0,7); ctx.fill(); } ctx.restore(); }
let shakeAmt=0; function shake(a){ shakeAmt=Math.max(shakeAmt,a); }
function lerp(a,b,k){return a+(b-a)*k;} function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function applyShake(){ if(shakeAmt>0.2){ const ox=(Math.random()-0.5)*shakeAmt, oy=(Math.random()-0.5)*shakeAmt; ctx.setTransform(DPR,0,0,DPR,ox*DPR,oy*DPR); shakeAmt*=0.85; } else { ctx.setTransform(DPR,0,0,DPR,0,0); shakeAmt=0; } }
const _drawScene=drawScene; drawScene=function(t){ applyShake(); _drawScene(t); };

// ════════════════════════════════════════════════════════════
// CHAT UI
// ════════════════════════════════════════════════════════════
const chatlog=$('chatlog'); function addChatLine(who,text,sys){ const d=document.createElement('div'); if(sys){ d.className='sys'; d.textContent='⚙️ '+text; } else d.innerHTML=`<span class="who">${esc(who)}:</span> ${esc(text)}`; chatlog.appendChild(d); while(chatlog.children.length>40) chatlog.removeChild(chatlog.firstChild); chatlog.scrollTop=chatlog.scrollHeight; }
function redrawChat(arr){ chatlog.innerHTML=''; arr.forEach(m=>addChatLine(m.who,m.text)); }
function esc(s){ return (s+'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
net.onChat=m=>addChatLine(m.who,m.text); net.onPlayersChange=()=>updateHUD();
$('chatsend').addEventListener('click',doSendChat); $('chatinput').addEventListener('keydown',e=>{ if(e.key==='Enter')doSendChat(); });
function doSendChat(){ const v=$('chatinput').value.trim(); if(!v)return; $('chatinput').value=''; sendChatNet(v); }

// ════════════════════════════════════════════════════════════
// NÚT & INIT
// ════════════════════════════════════════════════════════════
castBtn.addEventListener('mousedown',pressStart); castBtn.addEventListener('mouseup',pressEnd); castBtn.addEventListener('mouseleave',()=>{ if(me.state==='charging')pressEnd(); }); castBtn.addEventListener('touchstart',e=>{e.preventDefault();pressStart();},{passive:false}); castBtn.addEventListener('touchend',e=>{e.preventDefault();pressEnd();},{passive:false});
$('btnRank').addEventListener('click',()=>{ const all=Object.values(net.players).slice().sort((a,b)=>(b.best||0)-(a.best||0)).slice(0,5); let s='🏆 BẢNG XẾP HẠNG (cá nặng nhất):\n'+all.map((p,i)=>`${i+1}. ${p.id===me.id?'★ ':''}${p.name} — ${p.best?fmtW(p.best):'chưa có'}`).join('\n'); toast('Xem bảng xếp hạng ở chat 👇'); addChatLine('',s.replace(/\n/g,' | '),true); });
$('btnChat').addEventListener('click',()=>$('chatinput').focus());

// ════════════════════════════════════════════════════════════
// ĐĂNG NHẬP: token + password
// ════════════════════════════════════════════════════════════
let _pendingToken=null, _pendingSession=null;
async function tryLogin(){ const pw=($('loginpw').value||'').trim().toUpperCase(); $('loginerr').textContent=''; if(!_pendingSession){ $('loginerr').textContent='Phiên không hợp lệ.'; return; } if(pw!==String(_pendingSession.password||'').toUpperCase()){ $('loginerr').textContent='❌ Sai mật khẩu!'; return; } $('loginbtn').disabled=true; $('loginbtn').textContent='Đang vào...'; try{ await startOnline(_pendingToken,_pendingSession); $('login').classList.remove('show'); if(net._demoTimer)clearInterval(net._demoTimer); if(net._chatTimer)clearInterval(net._chatTimer); Object.keys(net.players).forEach(k=>{ if(net.players[k]&&net.players[k]._bot) delete net.players[k]; }); addChatLine('','Đã vào hồ! Câu cá sẽ đồng bộ với Discord.',true); setHint('Nhấn giữ THẢ CÂU để lấy lực!'); updateHUD(); }catch(e){ $('loginerr').textContent='❌ '+(e.message||e); $('loginbtn').disabled=false; $('loginbtn').textContent='Vào Game'; } }
$('loginbtn').addEventListener('click',tryLogin); $('loginpw').addEventListener('keydown',e=>{ if(e.key==='Enter')tryLogin(); });

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
me.name='Bạn'+Math.floor(Math.random()*900+100); resize();
const _pp=document.getElementById('playportrait'); if(_pp) _pp.addEventListener('click',()=>{ allowPortrait=true; checkOrientation(); });
const _token=new URLSearchParams(location.search).get('t');
if(_token && FIREBASE_CONFIG.databaseURL){
  setNet(false,'Đang tải phiên...');
  fetchSession(_token).then(s=>{ _pendingToken=_token; _pendingSession=s; me.name=s.username||me.name; $('logininfo').textContent=`Xin chào ${s.username||'bạn'}! Nhập mật khẩu trong DM Discord.`; $('login').classList.add('show'); $('loginpw').focus(); updateHUD(); }).catch(e=>{ setNet(false,'Lỗi phiên — chơi thử'); toast('⚠️ '+(e.message||e)); startDemo(); });
}else{ startDemo(); addChatLine('','Chế độ chơi thử (Demo). Vào game thật bằng lệnh tcauonline trên Discord.',true); }
updateHUD(); setHint('Nhấn giữ THẢ CÂU để lấy lực!'); requestAnimationFrame(loop);
setInterval(()=>{ if(net.mode==='fb') publishSelf(); }, 1000);
</script>
