<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;--gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px}

.auth-box{background:rgba(15,32,53,.95);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;max-width:360px;width:90%;display:none}

.auth-desc{font-size:11px;color:var(--sub);margin-bottom:15px;line-height:1.6}
.auth-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.3);color:#fff;font-size:14px;margin:10px 0;text-align:center;letter-spacing:4px;font-family:'Press Start 2P',monospace;text-transform:uppercase}
.auth-btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;margin:5px 0}
.auth-btn.confirm{background:linear-gradient(135deg,#0058b0,#00c0f0);color:#fff}
.auth-btn.cancel{background:transparent;border:1px solid var(--border);color:var(--sub)}
#pw-error{color:#e74c3c;font-size:10px;margin-top:8px;display:none}
#game{display:none;width:100%;max-width:900px;margin:0 auto;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P';font-size:10px;color:var(--accent)}
#online-pill{font-size:11px;color:#2ecc71}
#cw{position:relative;width:100%;background:#000;overflow:hidden;aspect-ratio:900/480}
#gc{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:1px}
#xhair::before{width:2px;height:24px;left:11px;top:0}
#xhair::after{width:24px;height:2px;top:11px;left:0}
#st{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:8px;color:#fff;text-shadow:2px 2px 0 #000;pointer-events:none;z-index:5;white-space:nowrap}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto}
.mb{flex:0 0 auto;padding:6px 12px;background:rgba(10,25,45,.8);border:2px solid var(--border);border-radius:12px;color:var(--sub);cursor:pointer;font-size:10px;font-weight:800;white-space:nowrap}

#cb{flex:1;padding:12px;font-family:'Press Start 2P';font-size:8px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer}

.tb{flex:1;padding:10px;background:none;border:none;border-right:1px solid var(--border);color:var(--sub);cursor:pointer;font-weight:800;font-size:11px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:var(--panel);border-top:1px solid var(--border);padding:10px;min-height:140px;overflow-y:auto}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:16px;padding:8px 16px;font-size:11px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}

#result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(4,12,28,.95);border:2px solid var(--gold);border-radius:var(--rad);padding:14px 20px;text-align:center;min-width:180px;pointer-events:none;z-index:10;backdrop-filter:blur(8px)}
#result-banner.show{animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0)}100%{transform:translate(-50%,-50%) scale(1)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    </div>
  </div>
  <div id="act">
    <button id="cb" onclick="handleCast()">⏳ Đang tải...</button>
    <div id="ri"><span class="us" id="rods">0</span> lần</div>
  </div>
  <div id="tabs">
    <button class="tb on" onclick="swTab('bag')">🎒 Túi</button>
    <button class="tb" onclick="swTab('shop')">🏪 Shop</button>
    <button class="tb" onclick="swTab('sell')">💰 Bán</button>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const firebaseConfig = { apiKey:"AIzaSyA9Iv98Bcurd6bqXo79BbgEz58a3xrPH8o",authDomain:"fishing-bot-e8d42.firebaseapp.com",databaseURL:"https://fishing-bot-e8d42-default-rtdb.firebaseio.com",projectId:"fishing-bot-e8d42" };
const MAP_DEFS=[
  {id:'ho',name:'🏡 Hồ Làng',pool:['moi','tram','chep','vang'],rates:{miss:45,moi:35,tram:12,chep:6,vang:2},sky:0x87ceeb,water:0x3d8fcc},
  {id:'bien',name:'🌊 Biển',pool:['bien','ngua','mattroi','rong'],rates:{miss:42,bien:36,ngua:14,mattroi:6,rong:2},sky:0x0077b6,water:0x0096c7},
  {id:'nui',name:'🏔️ Băng',pool:['hoi','tam','bang','thanbang'],rates:{miss:40,hoi:34,tam:16,bang:7,thanbang:3},sky:0x1a2040,water:0xa8d8ea},

  moi:{id:'moi',name:'Cá Mồi',emoji:'🐟',value:10_000,rar:'Thường',color:0x74b9ff,minW:.1,maxW:.8},
  tram:{id:'tram',name:'Cá Trắm',emoji:'🐠',value:120_000,rar:'Không Thường',color:0xa29bfe,minW:1,maxW:5},
  chep:{id:'chep',name:'Cá Chép Vàng',emoji:'🐡',value:600_000,rar:'Quý Hiếm',color:0xfdcb6e,minW:3,maxW:15},
  vang:{id:'vang',name:'Cá Vàng',emoji:'✨',value:8_000_000,rar:'Huyền Thoại',color:0xffd700,minW:5,maxW:25},
  bien:{id:'bien',name:'Cá Biển',emoji:'🐬',value:15_000,rar:'Thường',color:0x00d4ff,minW:.5,maxW:3},
  ngua:{id:'ngua',name:'Cá Ngựa',emoji:'🦀',value:200_000,rar:'Không Thường',color:0xff6b9d,minW:2,maxW:12},
  mattroi:{id:'mattroi',name:'Cá Mặt Trời',emoji:'🐙',value:1_500_000,rar:'Quý Hiếm',color:0xff9f43,minW:10,maxW:50},
  rong:{id:'rong',name:'Cá Rồng',emoji:'🐲',value:50_000_000,rar:'Thần Thoại',color:0xff3333,minW:50,maxW:300},
  hoi:{id:'hoi',name:'Cá Hồi',emoji:'🦑',value:80_000,rar:'Thường',color:0x74e0ff,minW:.5,maxW:4},
  tam:{id:'tam',name:'Cá Tầm',emoji:'🐋',value:500_000,rar:'Không Thường',color:0x7fb3d3,minW:20,maxW:100},
  bang:{id:'bang',name:'Cá Băng',emoji:'💎',value:5_000_000,rar:'Quý Hiếm',color:0xaef7ff,minW:30,maxW:200},
  thanbang:{id:'thanbang',name:'Thần Băng',emoji:'❄️',value:80_000_000,rar:'Huyền Thoại',color:0xffffff,minW:100,maxW:500},
  bachtuoc:{id:'bachtuoc',name:'Bạch Tuộc',emoji:'🦑',value:30_000,rar:'Thường',color:0x8e44ad,minW:5,maxW:30},
  cama:{id:'cama',name:'Cá Ma',emoji:'👻',value:300_000,rar:'Không Thường',color:0x2ecc71,minW:2,maxW:20},
  caco:{id:'caco',name:'Cá Cổ',emoji:'🦕',value:10_000_000,rar:'Quý Hiếm',color:0x2c3e50,minW:200,maxW:1000},
  thanhailong:{id:'thanhailong',name:'Thần Hải Long',emoji:'🐉',value:500_000_000,rar:'Vô Tiền',color:0xff00ff,minW:1000,maxW:9999}
};

let DB=null, ROD_PRICE=10000, ROD_USES=10, DEMO=false, pendingSave=false, onlineMode=false;
let player={userId:'',username:'',coins:100000,rodUses:10,inventory:{},totalCaught:0};
let gstate='idle', curMap=0, activeTab='bag', wt, bt, resultFish=null, resultWeight=0, waitStart=0, waitDur=4000;
let yaw=0, pitch=0, sessionData=null;
const URL_TOKEN=new URLSearchParams(window.location.search).get('t');

// ═══════════════════════════════════════════════════════════
// FIREBASE & AUTH
// ═══════════════════════════════════════════════════════════
function loadScript(s){return new Promise((r,j)=>{const e=document.createElement('script');e.src=s;e.async=false;e.onload=()=>r();e.onerror=()=>j(new Error('Load failed'));document.head.appendChild(e);});}
async function bootFirebase(){
  setLoad('Kết nối Firebase...',15);
  try{
    await Promise.race([loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js'), new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),5000))]);
    await Promise.race([loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js'), new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),5000))]);
    firebase.initializeApp(firebaseConfig); DB=firebase.database(); onlineMode=true;
  }catch(e){ onlineMode=false; document.querySelector('.demo-btn').style.display='block'; setLoad('Firebase lỗi. Dùng Demo.',100); }
  if(URL_TOKEN) document.getElementById('auth').style.display='block';
  else document.querySelector('.demo-btn').style.display='block';
}

function setLoad(t,p){const lt=document.getElementById('loadtxt');if(lt)lt.textContent=t;const lf=document.getElementById('loadfill');if(lf)lf.style.width=p+'%';}

async function verifyPassword(){
  const input=document.getElementById('game-password').value.trim().toUpperCase();
  const errEl=document.getElementById('pw-error');
  if(input.length!==6){errEl.textContent='❌ Mật khẩu phải đủ 6 ký tự!';errEl.style.display='block';return;}
  if(!DB||!onlineMode){errEl.textContent='❌ Không kết nối máy chủ!';errEl.style.display='block';return;}
  
  try{
    const snap=await Promise.race([DB.ref(`sessions/${URL_TOKEN}`).once('value'), new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),4000))]);
    const session=snap.val();
    if(!session||Date.now()>session.expiresAt||session.password!==input){errEl.style.display='block';return;}
    
    sessionData=session;
    document.getElementById('auth').style.display='none';
    document.getElementById('loading').style.display='flex';
    setLoad('Đang vào game...',80);
    setTimeout(()=>startGame(true),800);
  }catch(e){errEl.textContent='❌ Lỗi xác thực! Thử lại.';errEl.style.display='block';}
}

function enterDemo(){
  DEMO=true; onlineMode=false;
  player={userId:'demo',username:'Người Chơi',coins:500000,rodUses:20,inventory:{},totalCaught:0};
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  startGame(false);
  showToast('🎮 Demo: Không lưu dữ liệu');
}

function startGame(online){
  if(online && sessionData){
    player.userId=sessionData.userId;player.username=sessionData.username;
    player.coins=sessionData.coins||0;player.rodUses=sessionData.rodUses||0;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('game').style.display='flex';
  initThree(); updateUI(); renderContent();
  const cb=document.getElementById('cb');cb.disabled=false;cb.textContent=player.rodUses>0?'🎣 THẢ CÂU':'🏪 MUA CẦN';
  setStatus(player.rodUses>0?'Nhấn THẢ CÂU':'Mua cần ở Shop');
}

function updateUI(){document.getElementById('coins').textContent=player.coins.toLocaleString();document.getElementById('rods').textContent=player.rodUses;}
function setStatus(m){document.getElementById('st').textContent=m;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fmtWeight(w){return w>=1000?(w/1000).toFixed(1)+' tấn':w>=1?w.toFixed(1)+' kg':Math.round(w*1000)+' g';}

// ═══════════════════════════════════════════════════════════
// THREE.JS & 3D GRAPHICS
// ═══════════════════════════════════════════════════════════
const cv=document.getElementById('gc');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
renderer.setSize(900,480);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;
const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,900/480,0.1,200);
camera.position.set(0,1.5,0);camera.rotation.order='YXZ';scene.add(camera);
let isDrag=false,px=0,py=0;
cv.addEventListener('mousedown',e=>{isDrag=true;px=e.clientX;py=e.clientY;});document.addEventListener('mouseup',()=>isDrag=false);
document.addEventListener('mousemove',e=>{if(!isDrag)return;yaw-=(e.clientX-px)*.0024;pitch=Math.max(-.8,Math.min(.8,pitch-(e.clientY-py)*.0024));px=e.clientX;py=e.clientY;camera.rotation.y=yaw;camera.rotation.x=pitch;});
cv.addEventListener('touchstart',e=>{isDrag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',()=>isDrag=false);
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrag||!e.touches[0])return;yaw-=(e.touches[0].clientX-px)*.0028;pitch=Math.max(-.8,Math.min(.8,pitch-(e.touches[0].clientY-py)*.0028));px=e.touches[0].clientX;py=e.touches[0].clientY;camera.rotation.y=yaw;camera.rotation.x=pitch;},{passive:false});

function stdMat(c,r=.8,m=0){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});}
scene.add(new THREE.AmbientLight(0xffffff,.5));
const sun=new THREE.DirectionalLight(0xfff4d8,1.2);sun.position.set(8,14,5);sun.castShadow=true;scene.add(sun);

const waterGeo=new THREE.PlaneGeometry(120,120,80,80);
const waterMat=new THREE.ShaderMaterial({uniforms:{uT:{value:0},uD:{value:new THREE.Vector3(.1,.4,.7)},uS:{value:new THREE.Vector3(.2,.6,.9)}},
  vertexShader:`uniform float uT;varying float vE;varying vec3 vP;void main(){vec3 p=position;float e=sin(p.x*3.2+uT*1.6)*.16+sin(p.z*2.5-uT*1.2)*.12;p.y+=e;vE=e;vP=p;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);}`,
  fragmentShader:`uniform vec3 uD,uS;varying float vE;void main(){float m=(vE+.32)/.60;vec3 c=mix(uD,uS,m);gl_FragColor=vec4(c,.88);}`,transparent:true,side:THREE.DoubleSide});
const water=new THREE.Mesh(waterGeo,waterMat);water.rotation.x=-Math.PI/2;scene.add(water);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(120,120),stdMat(0x4a7a2a));ground.rotation.x=-Math.PI/2;ground.position.y=-.2;scene.add(ground);

const rodGrp=new THREE.Group();camera.add(rodGrp);rodGrp.position.set(.28,-.7,-.6);
rodGrp.add(new THREE.Mesh(new THREE.CylinderGeometry(.035,.04,.5,10),stdMat(0x181410,.96)).translateY(.25));
rodGrp.add(new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,.06,14),stdMat(0x2a2a2a,.3)).translateY(.55).rotateX(Math.PI/2));
const rodTip=new THREE.Object3D();rodTip.position.y=3.0;rodGrp.add(new THREE.Mesh(new THREE.CylinderGeometry(.008,.02,2.5,8),stdMat(0xb87333)).translateY(1.5));rodGrp.add(rodTip);

const bobGrp=new THREE.Group();scene.add(bobGrp);bobGrp.visible=false;
bobGrp.add(new THREE.Mesh(new THREE.SphereGeometry(.12,10,8,0,Math.PI*2,0,Math.PI/2),stdMat(0xe74c3c)));
bobGrp.add(new THREE.Mesh(new THREE.SphereGeometry(.12,10,8,0,Math.PI*2,Math.PI/2,Math.PI/2),stdMat(0xecf0f1)));

const linePts=30,lineArr=new Float32Array(linePts*3),lineGeo=new THREE.BufferGeometry();lineGeo.setAttribute('position',new THREE.Float32BufferAttribute(lineArr,3));
const lineMesh=new THREE.Line(lineGeo,new THREE.LineBasicMaterial({color:0xdddddd,transparent:true,opacity:.9}));scene.add(lineMesh);

const fishGrp=new THREE.Group();scene.add(fishGrp);fishGrp.visible=false;
fishGrp.add(new THREE.Mesh(new THREE.SphereGeometry(.5,16,12),stdMat(0x74b9ff,.4)).scale.set(2.5,.8,.9));
fishGrp.add(new THREE.Mesh(new THREE.ConeGeometry(.4,1.2,5),stdMat(0x74b9ff,.4)).translateX(-1.6).rotateZ(-Math.PI/2));
fishGrp.add(new THREE.Mesh(new THREE.ConeGeometry(.25,.5,4),stdMat(0x74b9ff,.4)).translateY(.55));
const fishLight=new THREE.PointLight(0x74b9ff,2,15);fishGrp.add(fishLight);
for(let i=0;i<8;i++){const b=new THREE.Mesh(new THREE.SphereGeometry(.05+Math.random()*.05,6,6),new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:.6}));b.userData={off:Math.random()*6.28,speed:1+Math.random()};fishGrp.add(b);}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let lineLen=10, fishRiseT=0, fishState='none', castT=0;
const bobTarget=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;
  waterMat.uniforms.uT.value=t;
  
  const tRot=gstate==='casting'?.35:gstate==='biting'?.15+Math.sin(t*8)*.08:gstate==='reeling'?.25:.05;
  rodGrp.rotation.x+=(tRot-rodGrp.rotation.x)*.08;

  if(gstate==='casting'){castT=Math.min(castT+.06,1);bobGrp.position.lerpVectors(new THREE.Vector3(camera.position.x,1.2,camera.position.z-3),bobTarget,castT);lineLen=castT*8;}
  else if(gstate==='waiting'){castT=1;bobGrp.position.x=bobTarget.x+Math.sin(t*.5)*.8;bobGrp.position.z=bobTarget.z+Math.cos(t*.4)*.5;bobGrp.position.y=Math.sin(t)*.1;lineLen=8;}
  else if(gstate==='biting'){bobGrp.position.y=-.15;lineLen=7.5;}
  else if(gstate==='reeling'){lineLen=Math.max(.5,lineLen-.15);bobGrp.position.y=Math.sin(t)*.05;}
  else{bobGrp.visible=false;lineMesh.visible=false;lineLen=10;}
  bobGrp.visible=lineLen>1&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');
  lineMesh.visible=lineLen>1;

  if(lineMesh.visible){
    const tip=new THREE.Vector3();rodTip.getWorldPosition(tip);const bp=bobGrp.position;const p=lineMesh.geometry.attributes.position.array;
    for(let i=0;i<linePts;i++){const f=i/(linePts-1);p[i*3]=tip.x+(bp.x-tip.x)*f;p[i*3+1]=tip.y+(bp.y-tip.y)*f+Math.sin(f*Math.PI)*-.3;p[i*3+2]=tip.z+(bp.z-tip.z)*f;}
    lineMesh.geometry.attributes.position.needsUpdate=true;
  }

  if(fishState==='rising'){
    fishGrp.visible=true;fishRiseT+=.015;
    fishGrp.position.set(0,-1.5+fishRiseT*3.5,0);fishGrp.rotation.y+=.06;fishGrp.rotation.z=Math.sin(t*2)*.15;
    const s=.3+fishRiseT*2.5;fishGrp.scale.set(s,s,s);
    fishGrp.children.filter(c=>c.userData.speed).forEach((b,i)=>{b.position.set(Math.sin(t*2+b.userData.off)*.5,fishRiseT*2+i*.2,Math.cos(t*1.5+b.userData.off)*.4);});
    if(fishRiseT>=1)fishState='holding';
  }else if(fishState==='holding'){
    fishGrp.position.y=.8+Math.sin(t*1.2)*.15;fishGrp.rotation.y+=.04;fishGrp.rotation.z=Math.sin(t*3)*.1;
    if(t%4<.1)fishState='pulling';
  }else if(fishState==='pulling'){
    const pt=Math.min((t%4)/1.5,1);
    fishGrp.position.lerp(new THREE.Vector3(camera.position.x*.3,.5,camera.position.z*.3+.8),pt*.08);
    fishGrp.rotation.y+=.08;fishGrp.rotation.z=Math.sin(t*5)*.2;
    if(pt>=1){fishGrp.visible=false;fishState='none';triggerCatch();}
  }
  renderer.render(scene,camera);
}
animate();

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════
function rollFish(i){const r=MAP_DEFS[i].rates,x=Math.random()*100;let c=r.miss||30;if(x<c)return null;for(const id of MAP_DEFS[i].pool){c+=r[id]||0;if(x<c)return ALL_FISH[id];}return null;}
function rollWeight(f){return Math.round((f.minW+Math.random()*(f.maxW-f.minW))*10)/10;}

function handleCast(){
  if(gstate==='biting'){clearTimeout(bt);doReel();return;}
  if(gstate!=='idle')return;
  if(player.rodUses<=0){showToast('❌ Mua cần!');swTab('shop');return;}
  resultFish=null;resultWeight=0;hideBanner();gstate='casting';castT=0;fishState='none';
  setStatus('🎣 Đang quăng...');document.getElementById('cb').disabled=true;
  const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
  bobTarget.set(camera.position.x+fwd.x*8,0,camera.position.z+fwd.z*8);
  bobGrp.position.set(camera.position.x,1.2,camera.position.z-3);
  setTimeout(()=>{gstate='waiting';setStatus('⏳ Chờ cá...');waitDur=3000+Math.random()*4000;waitStart=performance.now();wt=setTimeout(startBite,waitDur);},800);
}
function startBite(){gstate='biting';setStatus('🐟 CÁ CẮN! NHẤN KÉO!');const b=document.getElementById('cb');b.textContent='⚡ KÉO!';b.disabled=false;bt=setTimeout(escape,3000);}
function doReel(){
  gstate='reeling';setStatus('');const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.disabled=true;
  player.rodUses--;updateUI();
  resultFish=rollFish(curMap);resultWeight=resultFish?rollWeight(resultFish):0;
  if(resultFish){
    fishGrp.children[0].material.color.setHex(resultFish.color);
    fishGrp.children[1].material.color.setHex(resultFish.color);
    fishGrp.children[2].material.color.setHex(resultFish.color);
    fishLight.color.setHex(resultFish.color);
    fishState='rising';fishRiseT=0;setStatus('⚡ Đang kéo...');
  }else setTimeout(escape,1500);
}
function escape(){gstate='idle';fishState='none';fishGrp.visible=false;setStatus('😔 Cá thoát!');document.getElementById('cb').disabled=false;setTimeout(()=>setStatus('Nhấn THẢ CÂU'),2000);}
function triggerCatch(){
  if(!resultFish)return;
  if(!player.inventory[resultFish.id])player.inventory[resultFish.id]=[];
  player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value});
  player.totalCaught++;
  showBanner(resultFish,resultWeight);
  setTimeout(()=>{gstate='idle';hideBanner();setStatus('🎉 Bắt thành công!');document.getElementById('cb').disabled=false;renderContent();},2000);
}
function showBanner(f,w){
  const b=document.getElementById('result-banner');
  document.getElementById('res-emoji').textContent=f.emoji;
  document.getElementById('res-name').textContent=f.name;
  document.getElementById('res-info').textContent=f.rar+' | ⚖️ '+fmtWeight(w);
  document.getElementById('res-value').textContent='+'+f.value.toLocaleString()+' 🪙';
  b.style.borderColor='#'+f.color.toString(16).padStart(6,'0');
  b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
}
function hideBanner(){document.getElementById('result-banner').classList.remove('show');}

function selMap(i){
  curMap=i;document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('on',j===i));
  const m=MAP_DEFS[i];scene.background=new THREE.Color(m.sky);
  waterMat.uniforms.uD.value.setHex(m.water);waterMat.uniforms.uS.value.setHex(m.water);
  showToast('📍 '+m.name);
}
function swTab(tab){activeTab=tab;document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',['bag','shop','sell','rates'][j]===tab));renderContent();}

function renderContent(){
  const p=document.getElementById('cp');
  if(activeTab==='bag'){
    const k=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(!k.length){p.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:10px">🎒</div><p>Túi trống</p></div>';return;}
    let h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">';
    k.forEach(id=>{const f=ALL_FISH[id],arr=player.inventory[id],tv=arr.reduce((s,e)=>s+e.value,0);
      h+=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:32px">${f.emoji}</div><div style="font-weight:800;font-size:10px;margin:4px 0">${f.name}</div><div style="font-size:9px;color:var(--sub)">×${arr.length}</div><div style="color:var(--gold);font-size:9px;margin-top:4px">${tv.toLocaleString()}🪙</div></div>`;});
    p.innerHTML=h+'</div>';
  }else if(activeTab==='shop'){
    p.innerHTML=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:15px;display:flex;align-items:center;gap:15px;margin-bottom:10px">
      <div style="font-size:40px">🎣</div><div style="flex:1"><div style="font-weight:900;font-size:13px">Cần Câu Đồng</div><div style="font-size:10px;color:var(--sub);margin:4px 0">${ROD_USES} lần câu</div><div style="color:var(--gold);font-weight:800">${ROD_PRICE.toLocaleString()} 🪙</div></div>
      <button onclick="buyRod()" style="padding:10px 18px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:8px;color:#000;font-weight:900;cursor:pointer">MUA</button></div>`;
  }else if(activeTab==='sell'){
    const k=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(!k.length){p.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:10px">🐟</div><p>Không có cá</p></div>';return;}
    let total=0,h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">';
    k.forEach(id=>{const f=ALL_FISH[id],arr=player.inventory[id],val=arr.reduce((s,e)=>s+e.value,0);total+=val;
      h+=`<div style="background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:32px">${f.emoji}</div><div style="font-weight:800;font-size:10px;margin:4px 0">${f.name}</div><div style="font-size:9px;color:var(--sub)">×${arr.length}</div><div style="color:var(--gold);font-size:9px;margin:6px 0">${val.toLocaleString()}🪙</div><button onclick="sellFish('${id}')" style="width:100%;padding:6px;background:#e74c3c;border:none;border-radius:4px;color:#fff;font-size:9px;cursor:pointer;font-weight:800">BÁN</button></div>`;});
    p.innerHTML=h+`</div><div style="margin-top:15px;text-align:right;font-weight:800;color:var(--gold);font-size:13px">Tổng: ${total.toLocaleString()} 🪙</div>`;
  }else if(activeTab==='rates'){
    const m=MAP_DEFS[curMap];let h='<table style="width:100%;font-size:10px;border-collapse:collapse"><tr style="background:rgba(255,255,255,.05)"><th style="padding:8px;text-align:left">Cá</th><th>Hiếm</th><th>Tỉ Lệ</th><th>Giá</th></tr>';
    h+=`<tr><td style="padding:8px">💨 Hụt</td><td>—</td><td>${m.rates.miss}%</td><td>—</td></tr>`;
    m.pool.forEach(id=>{const f=ALL_FISH[id];h+=`<tr><td style="padding:8px">${f.emoji} ${f.name}</td><td>${f.rar}</td><td>${m.rates[id]||0}%</td><td style="color:var(--gold)">${f.value.toLocaleString()}🪙</td></tr>`;});
    p.innerHTML=h+'</table>';
  }
}

function buyRod(){if(player.coins<ROD_PRICE){showToast('❌ Thiếu xu!');return;}player.coins-=ROD_PRICE;player.rodUses+=ROD_USES;updateUI();showToast('✅ Mua cần!');renderContent();}
function sellFish(id){if(!player.inventory[id])return;const tv=player.inventory[id].reduce((s,e)=>s+e.value,0);player.coins+=tv;delete player.inventory[id];updateUI();showToast('💰 +'+tv.toLocaleString()+'🪙');renderContent();}

document.getElementById('cb').addEventListener('click',()=>{if(gstate==='biting')doReel();});

// INIT
bootFirebase();
</script>
</body>
</html>
