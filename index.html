<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>🎣 Câu Cá Online 3D</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;--gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px;--rsm:7px;--online:#2ecc71}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden;-webkit-user-select:none;user-select:none}
#game{width:100%;max-width:900px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.4)}
#hdr-right{display:flex;align-items:center;gap:8px}
#cd{display:flex;align-items:center;gap:4px;font-weight:900;font-size:15px;color:var(--gold)}
#online-pill{display:flex;align-items:center;gap:4px;background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--online)}
#online-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--online);box-shadow:0 0 6px var(--online);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto;scrollbar-width:none}
#maps::-webkit-scrollbar{display:none}
.mb{flex:0 0 auto;padding:6px 13px;background:rgba(10,25,45,.8);border:2px solid var(--border);border-radius:16px;color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;transition:all .2s;white-space:nowrap}
.mb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
#cw{position:relative;width:100%;background:#000;overflow:hidden;aspect-ratio:900/480}
#gc{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
#gc:active{cursor:grabbing}
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:2}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4;width:24px;height:24px}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:1px}
#xhair::before{width:2px;height:24px;left:11px;top:0}
#xhair::after{width:24px;height:2px;top:11px;left:0}
#xhair .dot{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;top:10px;left:10px;box-shadow:0 0 6px #fff}
#st{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000;pointer-events:none;z-index:5;white-space:nowrap;text-align:center;line-height:1.6}
#snd{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:800;cursor:pointer;z-index:6;color:rgba(255,255,255,.7)}
#bf{position:absolute;inset:0;background:rgba(255,60,0,.15);pointer-events:none;opacity:0;z-index:3}
#bf.on{animation:bflash .28s infinite}
@keyframes bflash{0%,100%{opacity:.1}50%{opacity:.55}}
#map-name{position:absolute;top:10px;left:10px;font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;pointer-events:none;z-index:5;background:rgba(0,0,0,.4);border-radius:6px;padding:4px 8px;border:1px solid rgba(255,255,255,.15)}
#map-fish-hint{position:absolute;top:36px;left:10px;font-size:9px;font-weight:800;pointer-events:none;z-index:5;background:rgba(0,0,0,.5);border-radius:6px;padding:3px 8px;border:1px solid rgba(255,255,255,.1);color:var(--sub);max-width:160px}
#wb{position:absolute;bottom:0;left:0;right:0;height:4px;pointer-events:none;z-index:5}
#wbf{height:100%;width:100%;box-shadow:0 0 8px rgba(0,212,255,.5);transition:none}
#players-overlay{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:7;pointer-events:none;max-width:155px}
.po{display:flex;align-items:center;gap:5px;background:rgba(4,12,28,.78);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 8px;backdrop-filter:blur(4px)}
.po img{width:18px;height:18px;border-radius:50%}
.po .pn{font-size:9px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.po .ps{font-size:8px;margin-left:2px}
.ps-idle{color:#5a7a9a}.ps-casting{color:#f39c12}.ps-waiting{color:#00d4ff}.ps-biting{color:#e74c3c;animation:blink .4s infinite}.ps-reeling{color:#2ecc71}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#notifs{position:absolute;bottom:60px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:8;pointer-events:none}
.notif{background:rgba(4,12,28,.88);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:6px 10px;font-size:10px;font-weight:800;animation:slideIn .3s ease,fadeOut .4s 3.6s forwards;backdrop-filter:blur(4px)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}
#chatbox{position:absolute;bottom:50px;left:8px;width:200px;z-index:7}
#chatlog{display:flex;flex-direction:column;gap:3px;max-height:70px;overflow:hidden;justify-content:flex-end}
.chatmsg{background:rgba(4,12,28,.75);border-radius:8px;padding:4px 8px;font-size:9px;animation:fadeMsg 9s forwards}
.chatmsg strong{color:var(--accent)}
@keyframes fadeMsg{0%,80%{opacity:1}100%{opacity:0}}
#chatinput-row{display:flex;gap:4px;margin-top:4px}
#chatinput{flex:1;background:rgba(8,20,36,.9);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:9px;font-weight:700;color:var(--text);outline:none;font-family:'Nunito',sans-serif}
#chatinput:focus{border-color:var(--accent)}
#chatsend{padding:4px 8px;background:rgba(0,212,255,.2);border:1px solid var(--accent);border-radius:8px;font-size:9px;font-weight:800;color:var(--accent);cursor:pointer}
#act{display:flex;gap:7px;padding:8px;background:rgba(6,16,31,.98);border-top:1px solid var(--border)}
#cb{flex:1;padding:12px;font-family:'Press Start 2P',monospace;font-size:8px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 3px 18px rgba(0,180,255,.35);min-height:46px}
#cb:hover:not(:disabled){transform:translateY(-1px)}
#cb:disabled{opacity:.4;cursor:not-allowed;transform:none}
#cb.bite{background:linear-gradient(135deg,#8a0000,#dd0000);animation:bp .22s infinite;box-shadow:0 3px 22px rgba(200,0,0,.7)}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
#ri{padding:8px 12px;background:rgba(10,25,45,.9);border:1px solid var(--border);border-radius:var(--rad);font-size:10px;color:var(--sub);text-align:center;min-width:70px;display:flex;flex-direction:column;justify-content:center}
#ri .us{font-weight:900;font-size:20px;color:var(--accent);display:block;line-height:1.2}
#tabs{display:flex;background:rgba(8,20,36,.98);border-top:1px solid var(--border)}
.tb{flex:1;padding:10px 5px;background:none;border:none;border-right:1px solid var(--border);color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;transition:all .2s;min-height:42px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:rgba(8,20,36,.98);border-top:1px solid var(--border);padding:10px;min-height:140px}
.stl{font-size:8px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.ii{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:8px;text-align:center}
.ii .fe{font-size:32px;line-height:1}.ii .fn{font-size:11px;font-weight:800;margin:2px 0}.ii .fc{font-size:9px;color:var(--sub)}.ii .fv{font-size:9px;margin-top:2px}.ii .fsz{font-size:8px;color:#88aacc;margin-top:1px}
.shoprow{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.shoprow .si{flex:1}.shoprow .sn{font-weight:900;font-size:12px}.shoprow .sd{font-size:10px;color:var(--sub);margin-top:2px}.shoprow .sp{font-size:12px;font-weight:800;color:var(--gold);margin-top:3px}
.buybtn{padding:8px 14px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:var(--rsm);color:#000;font-weight:900;font-size:11px;cursor:pointer;min-height:40px;white-space:nowrap}
.buybtn.dis{background:#223;color:var(--sub);cursor:not-allowed}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:7px}
.si2{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:8px;text-align:center}
.sb{width:100%;margin-top:4px;padding:6px 0;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:4px;color:#fff;font-weight:800;font-size:10px;cursor:pointer;min-height:32px}
#sab{width:100%;padding:10px;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:var(--rsm);color:#fff;font-weight:900;font-size:12px;cursor:pointer;min-height:40px}
.rt{width:100%;border-collapse:collapse;font-size:10px}
.rt td,.rt th{padding:5px 6px;border-bottom:1px solid var(--border)}
.rt tr:last-child td{border-bottom:none}.rt tr:nth-child(odd){background:rgba(255,255,255,.02)}
.es{text-align:center;padding:20px 15px;color:var(--sub)}.es .ei{font-size:32px;margin-bottom:8px}.es p{font-size:11px;line-height:1.6}
.r1{color:#88aacc}.r2{color:#a29bfe}.r3{color:#fdcb6e}.r4{color:#e17055}.r5{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6)}.r6{color:#ff6fff;text-shadow:0 0 10px rgba(255,0,255,.7);animation:rainbow .8s infinite}
@keyframes rainbow{0%{color:#ff6fff}25%{color:#ffff00}50%{color:#00ffff}75%{color:#ff8800}100%{color:#ff6fff}}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;overflow-y:auto}
#loading h2{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);margin-bottom:15px}
#loadbar{width:200px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;width:0;transition:width .4s ease}
#loadtxt{font-size:10px;color:var(--sub);font-weight:700;margin-bottom:15px}
#autherr{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;padding:20px}
#autherr h2{font-family:'Press Start 2P',monospace;font-size:10px;color:#e74c3c;text-align:center}
#autherr .ae-reason{font-size:13px;font-weight:900;color:var(--gold);text-align:center}
#autherr p{font-size:11px;color:var(--sub);text-align:center;max-width:320px;line-height:1.6}
#ae-detail{font-family:monospace;font-size:9px;color:#7a90a8;background:rgba(15,32,53,.7);border:1px solid var(--border);border-radius:8px;padding:8px 10px;max-width:340px;word-break:break-all;line-height:1.5;text-align:left;white-space:pre-wrap}
#autherr .ae-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.ae-btn{padding:9px 16px;border:none;border-radius:var(--rsm);font-weight:900;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif}
.ae-btn.demo{background:linear-gradient(135deg,#1a8f4a,#00e676);color:#000}
.ae-btn.retry{background:rgba(0,212,255,.18);border:1px solid var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:16px;padding:8px 16px;font-size:11px;font-weight:800;color:var(--text);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#demo-badge{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.2);border:1px solid var(--online);border-radius:12px;padding:2px 8px;font-size:8px;font-weight:800;color:var(--online);z-index:6;display:none}
#sync-status{position:absolute;bottom:6px;right:8px;font-size:8px;font-weight:800;z-index:5;padding:2px 6px;border-radius:8px;background:rgba(0,0,0,.5);color:#2ecc71}
#result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(4,12,28,.95);border:2px solid var(--gold);border-radius:var(--rad);padding:14px 20px;text-align:center;min-width:180px;pointer-events:none;z-index:10;backdrop-filter:blur(8px);box-shadow:0 0 30px rgba(0,0,0,.7)}
#result-banner.show{animation:rpop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rpop{0%{transform:translate(-50%,-50%) scale(0) rotate(-6deg)}70%{transform:translate(-50%,-50%) scale(1.06) rotate(1.5deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}

/* 🔐 AUTH UI */
.auth-box{background:rgba(15,32,53,.95);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;max-width:360px;width:90%;box-shadow:0 0 40px rgba(0,212,255,0.2)}
.auth-icon{font-size:48px;margin-bottom:10px}
.auth-title{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent);margin-bottom:15px}

.auth-id{background:rgba(255,255,255,0.05);padding:8px;border-radius:6px;font-family:monospace;font-size:10px;color:var(--gold);word-break:break-all;margin-bottom:15px}
.auth-input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.3);color:#fff;font-size:11px;margin-bottom:12px;text-align:center}
.auth-input:focus{border-color:var(--accent);outline:none}
.auth-btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:900;font-size:11px;cursor:pointer;margin-bottom:8px}
.auth-btn.confirm{background:linear-gradient(135deg,#0058b0,#00c0f0);color:#fff}
.auth-btn.cancel{background:transparent;border:1px solid var(--border);color:var(--sub)}

@media(max-width:520px){#hdr h1{font-size:8px}#cd{font-size:12px}.mb{font-size:9px;padding:4px 9px}#cb{font-size:7px;padding:10px}#chatbox{width:140px;bottom:42px}}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

// Hàm đọc session có Timeout để tránh treo
function readSessionWithTimeout(token, maxRetries=3, timeoutPerReq=4000) {
  return new Promise(async (resolve, reject) => {
    for (let i = 0; i < maxRetries; i++) {
      try {
        const result = await Promise.race([
          DB.ref(`sessions/${token}`).once('value'),
          new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), timeoutPerReq))
        ]);
        if (result.val()) return resolve({ session: result.val(), error: null });
        await new Promise(r => setTimeout(r, 500));
      } catch (err) {
        await new Promise(r => setTimeout(r, 500));
      }
    }
    resolve({ session: null, error: new Error('Timeout') });
  });
}

async function initAuth(){

    document.getElementById('demo-btn-container').style.display='block';

  if(error||!session){
    document.getElementById('demo-btn-container').style.display='block';
    showAuthError('Lỗi phiên','Không tìm thấy phiên hoặc hết hạn.', 'Vui lòng dùng lệnh tcauonline để lấy link mới.');

  }
  if(Date.now()>session.expiresAt||session.secret!==GAME_SECRET){
    document.getElementById('demo-btn-container').style.display='block';
    showAuthError('Phiên hết hạn/Sai secret','','');

}

  const eye2=eye.clone();eye2.position.z=-.3;grp.add(eye2);

function waveY(x,z,t){return Math.sin(x*3.2+t*1.6)*.16+Math.sin(z*2.5-t*1.2)*.12+Math.sin((x+z)*1.8+t*.9)*.06;}
function updLine(t){const tw=new THREE.Vector3();rodTipObj.getWorldPosition(tw);const bp=bobGrp.position;const p=lineMesh.geometry.attributes.position.array;
  for(let i=0;i<LPTS;i++){const f=i/(LPTS-1);const sag=Math.sin(f*Math.PI)*-.3*(lineLen/8);p[i*3]=tw.x+(bp.x-tw.x)*f;p[i*3+1]=tw.y+(bp.y-tw.y)*f+sag;p[i*3+2]=tw.z+(bp.z-tw.z)*f;}
  lineMesh.geometry.attributes.position.needsUpdate=true;
  for(const[,e]of otherPlayers){const m=e.mesh;if(!m.oBob.visible)continue;m.rod.children[0].getWorldPosition(tw);const ob=m.oBob.position;const ln=m.rod.children[0].geometry.attributes.position.array;if(ln){for(let i=0;i<LPTS;i++){const f=i/(LPTS-1);ln[i*3]=tw.x+(ob.x-tw.x)*f;ln[i*3+1]=tw.y+(ob.y-tw.y)*f+Math.sin(f*Math.PI)*-.3;ln[i*3+2]=tw.z+(ob.z-tw.z)*f;}m.rod.geometry.attributes.position.needsUpdate=true;}}}

function animate(ts){requestAnimationFrame(animate);const t=ts*.001;waterMat.uniforms.uT.value=t;
  // Xoay cần mượt theo trạng thái
  const targetRot=gstate==='casting'?.35:gstate==='biting'?.15+Math.sin(t*9)*.08:gstate==='reeling'?.25: .05;
  rodGrp.rotation.x+=(targetRot-rodGrp.rotation.x)*.08;

  // Xử lý phao & dây
  if(gstate==='casting'){castT=Math.min(castT+.06,1);bobGrp.position.lerpVectors(new THREE.Vector3(camera.position.x,1.2,camera.position.z-3),bobTarget,castT);lineLen=castT*8;}
  else if(gstate==='waiting'){
    castT=1;
    // Phao trôi nhẹ theo sóng
    bobGrp.position.x=bobTarget.x+Math.sin(t*.5)*.8;
    bobGrp.position.z=bobTarget.z+Math.cos(t*.4)*.5;
    bobGrp.position.y=waveY(bobGrp.position.x,bobGrp.position.z,t)+.12;
    lineLen=8;
  }
  else if(gstate==='biting'){
    // Phao chìm xuống khi cắn câu
    bobGrp.position.y=waveY(bobGrp.position.x,bobGrp.position.z,t)-.15;
    lineLen=7.5;
    bobLight.position.copy(bobGrp.position).addY(.4);bobLight.intensity=1+Math.sin(t*8)*.4;
  }
  else if(gstate==='reeling'){
    lineLen=Math.max(.5, lineLen-.15);
    bobGrp.position.lerp(new THREE.Vector3(camera.position.x, waveY(camera.position.x,camera.position.z,t)+.2, camera.position.z-2), .05);
  }
  else{castT=0;bobGrp.visible=false;lineMesh.visible=false;lineLen=10;bobLight.intensity=0;}

  // THỦY QUẢI TRỒI LÊN & KÉO VỀ
  if(fishAnimState==='rising'){
    fishRiseT+=.012;giantFish.visible=true;
    // Trồi từ dưới nước lên
    giantFish.position.set(bobGrp.position.x, -1.5+fishRiseT*3.5, bobGrp.position.z);
    giantFish.rotation.y+=.06;giantFish.rotation.z=Math.sin(t*2)*.15;
    // Scale theo cân nặng
    const s=.3+fishRiseT*fishScale;giantFish.scale.set(s,s,s);
    // Bong bóng bay
    fishMesh.children.filter(c=>c.geometry?.type==='SphereGeometry'&&c.userData.speed).forEach((b,i)=>{
      b.position.set(Math.sin(t*2+b.userData.off)*.5, fishRiseT*2+i*.2, Math.cos(t*1.5+b.userData.off)*.4);
    });
    if(fishRiseT>=1)fishAnimState='holding';
  }
  else if(fishAnimState==='holding'){
    giantFish.position.y=.8+Math.sin(t*1.2)*.15;giantFish.rotation.y+=.04;
    giantFish.rotation.z=Math.sin(t*3)*.1;
    // Giữ 2s rồi kéo về
    if(t-fishAnimT>2)fishAnimState='pulling';
  }
  else if(fishAnimState==='pulling'){
    const pullT=Math.min((t-fishAnimT-2)/1.5,1);
    giantFish.position.lerp(new THREE.Vector3(camera.position.x*.3, .5, camera.position.z+.8), pullT*.08);
    giantFish.rotation.y+=.08;giantFish.rotation.z=Math.sin(t*5)*.2;
    if(pullT>=1){giantFish.visible=false;fishAnimState='none';triggerCatchResult();}
  }

  bobGrp.visible=lineLen>1&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');lineMesh.visible=lineLen>1;updLine(t);

  if(gstate==='waiting'&&waitStart>0){const f=Math.min((performance.now()-waitStart)/waitDur,1);const wbf=document.getElementById('wbf');wbf.style.width=(100-f*100)+'%';wbf.style.background=f>.7?'#ff5252':f>.4?'#ffd660':'#00d4ff';}else document.getElementById('wbf').style.width='100%';
  renderer.render(scene,camera);}

window._applyMap=applyMap;window._bobGrp=bobGrp;window._bobTarget=bobTarget;
requestAnimationFrame(animate);}

// GAME LOGIC (IN-GAME SEQUENCE)
// ═══════════════════════════════════════════════════════════
function handleCast(){
  if(gstate==='biting'){clearTimeout(bt);doReelIn();return;}
  if(gstate!=='idle'||!player.userId)return;
  if(player.rodUses<=0){showToast('❌ Mua cần câu!');swTab('shop');return;}
  resultFish=null;resultWeight=0;hideBanner();gstate='casting';castT=0;fishAnimState='none';
  setStatus('🎣 Đang quăng câu...');document.getElementById('cb').disabled=true;
  
  // Hướng quăng câu theo tâm ngắm
  const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
  bobTarget.set(camera.position.x+fwd.x*8, 0, camera.position.z+fwd.z*8);
  bobGrp.position.set(camera.position.x,1.2,camera.position.z-3);
  updatePresence('casting');

  setTimeout(()=>{gstate='waiting';setStatus('⏳ Chờ cá cắn...');waitDur=3000+Math.random()*5000;waitStart=performance.now();updatePresence('waiting');wt=setTimeout(startBite,waitDur);},800);
}
function startBite(){gstate='biting';setStatus('🐟 CÁ CẮN! NHẤN KÉO!');const b=document.getElementById('cb');b.textContent='⚡ KÉO!';b.classList.add('bite');b.disabled=false;document.getElementById('bf').classList.add('on');updatePresence('biting');bt=setTimeout(fishEscape,3000);}

function doReelIn(){
  gstate='reeling';setStatus('');const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=true;document.getElementById('bf').classList.remove('on');
  player.rodUses--;updateUI();pendingSave=true;
  resultFish=rollFishForMap(curMap);resultWeight=resultFish?rollWeight(resultFish):0;updatePresence('reeling');

  // Nếu dính cá -> kích hoạt animation thủy quái 3D
  if(resultFish){
    fishScale=resultWeight*0.02+0.5; // Scale theo cân nặng
    fishMesh=createFishMesh(resultFish.color);
    giantFish.remove(giantFish.children[0]);giantFish.add(fishMesh);
    fishAnimState='rising';fishRiseT=0;fishAnimT=performance.now()*.001;
    setStatus('⚡ Đang kéo thủy quái lên!');
    broadcastCatch(resultFish);
    if(soundOn&&audioCtx)playFishCatchSound(resultFish.rar);
    if(resultWeight>50)shakeScreen(.04,300);
  } else {
    // Không dính -> về idle ngay
    gstate='idle';setStatus('😅 Cá thoát!');updatePresence('idle');
    document.getElementById('cb').disabled=false;document.getElementById('cb').textContent='🎣 THẢ CÂU';
    showToast('😅 Không câu được gì...');
  }
}

// Callback khi animation kéo cá xong
function triggerCatchResult(){
  if(!resultFish)return;
  // Cộng vào kho
  if(!player.inventory[resultFish.id])player.inventory[resultFish.id]=[];
  player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value,map:curMap,caughtAt:Date.now()});
  player.totalCaught++;
  pendingSave=false;
  writePlayerImmediate().then(()=>{updateUI();renderContent();});
  showBanner(resultFish,resultWeight);
  setTimeout(()=>{gstate='idle';hideBanner();updatePresence('idle');setStatus('🎉 Bắt thành công!');const btn=document.getElementById('cb');btn.disabled=false;btn.textContent='🎣 THẢ CÂU';},2000);
}

function fishEscape(){gstate='idle';setStatus('😔 Cá thoát! Kéo nhanh hơn!');const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=false;document.getElementById('bf').classList.remove('on');updatePresence('idle');showToast('😔 Cá trốn mất!');}
function shakeScreen(i=.02,d=200){const cw=document.getElementById('cw'),ot=cw.style.transform;let c=0;const iv=setInterval(()=>{if(c>=d/16){clearInterval(iv);cw.style.transform=ot;return;}cw.style.transform=`translate(${(Math.random()-.5)*i*100}%,${(Math.random()-.5)*i*100}%)`;c++;},16);}
function playFishCatchSound(r){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(masterGain);const f={Thường:440,'Không Thường':523,'Quý Hiếm':659,'Huyền Thoại':784,'Thần Thoại':1047,'Vô Tiền Khoáng Hậu':1319};o.frequency.value=f[r]||440;o.type=r==='Thần Thoại'||r==='Vô Tiền Khoáng Hậu'?'sine':'triangle';g.gain.setValueAtTime(.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);o.start();o.stop(audioCtx.currentTime+.4);}

async function buyRod(q){q=Math.min(parseInt(q)||1,100);const c=ROD_PRICE*q;if(player.coins<c){showToast('❌ Không đủ xu!');return;}player.coins-=c;player.rodUses+=ROD_USES*q;updateUI();renderContent();showToast(`✅ Mua ${q} cần!`);await writePlayerImmediate();if(gstate==='idle'){document.getElementById('cb').textContent='🎣 THẢ CÂU';}}
async function sellFish(id,idx){const arr=player.inventory[id];if(!arr?.length)return;const f=ALL_FISH[id];let g=0;if(idx==='all'){g=arr.reduce((s,e)=>s+e.value,0);player.coins+=g;player.totalEarned+=g;delete player.inventory[id];}else{const e=arr[idx];if(!e)return;g=e.value;player.coins+=g;player.totalEarned+=g;arr.splice(idx,1);if(!arr.length)delete player.inventory[id];}updateUI();renderContent();showToast(`💰 +${fmt(g)} 🪙`);await writePlayerImmediate();}
async function sellAll(){const k=Object.keys(player.inventory);if(!k.length){showToast('❌ Túi trống!');return;}let t=0;for(const[,a]of Object.entries(player.inventory))t+=a.reduce((s,e)=>s+e.value,0);player.coins+=t;player.totalEarned+=t;player.inventory={};updateUI();renderContent();showToast(`💰 Bán tất → +${fmt(t)} 🪙`);await writePlayerImmediate();}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function fmt(n){return n>=1e9?(n/1e9).toFixed(1).replace(/\.0$/,'')+'B':n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,'')+'M':n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,'')+'K':n.toLocaleString('vi-VN');}
function setStatus(m){document.getElementById('st').textContent=m;}
function updateUI(){document.getElementById('ct').textContent=fmt(player.coins);document.getElementById('ut').textContent=player.rodUses>0?player.rodUses:'0';}
function updateMapUI(){document.getElementById('map-name').textContent=MAP_DEFS[curMap].name;document.getElementById('map-fish-hint').textContent='🐟 '+MAP_DEFS[curMap].hint;}
function selMap(i){curMap=i;window._applyMap(i);document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('on',j===i));updatePresence(gstate);updateMapUI();showToast(`📍 ${MAP_DEFS[i].name}`);renderContent();setStatus(player.rodUses>0?`🎣 Câu tại ${MAP_DEFS[i].name}!`:'🏪 Mua cần!');}
function swTab(tab){activeTab=tab;const k=['bag','shop','sell','rates'];document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',k[i]===tab));renderContent();}
function showBanner(f,w){const b=document.getElementById('result-banner');document.getElementById('res-emoji').textContent=f.emoji;document.getElementById('res-name').textContent=f.name;document.getElementById('res-info').textContent=`${f.rar} | ⚖️ ${fmtWeight(w)}`;document.getElementById('res-value').textContent=`+${fmt(f.value)} 🪙`;b.style.borderColor='#'+f.color.toString(16).padStart(6,'0');b.classList.remove('show');void b.offsetWidth;b.classList.add('show');}
function hideBanner(){document.getElementById('result-banner').classList.remove('show');}
let toastT=null;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3200);}
function renderOtherPlayersList(others){const el=document.getElementById('players-overlay');let h='';const SL={idle:'💤',casting:'🎣',waiting:'⏳',biting:'🐟!',reeling:'⚡'};for(const[id,p]of others){const av=p.avatar?`https://cdn.discordapp.com/avatars/${id}/${p.avatar}.webp?size=32`:`https://cdn.discordapp.com/embed/avatars/0.png`;h+=`<div class="po"><img src="${av}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"><span class="pn">${p.username.slice(0,10)}</span><span class="ps ps-${p.state||'idle'}">${SL[p.state||'idle']||''}</span></div>`;}el.innerHTML=h;}
function addNotif(html){const el=document.getElementById('notifs');const d=document.createElement('div');d.className='notif';d.innerHTML=html;el.appendChild(d);setTimeout(()=>d.remove(),4000);if(el.children.length>5)el.removeChild(el.children[0]);}
function addChatMsg(u,t,is=false){const el=document.getElementById('chatlog');const d=document.createElement('div');d.className='chatmsg';d.innerHTML=`<strong style="color:${is?'var(--gold)':'var(--accent)'}">${u}:</strong> ${t}`;el.appendChild(d);el.scrollTop=el.scrollHeight;setTimeout(()=>d.remove(),9000);if(el.children.length>8)el.removeChild(el.children[0]);}
function invValue(inv){let t=0;for(const a of Object.values(inv))t+=a.reduce((s,e)=>s+(e.value||0),0);return t;}
function invCount(inv){let t=0;for(const a of Object.values(inv))t+=a.length;return t;}

function renderContent(){const p=document.getElementById('cp');
if(activeTab==='bag'){const inv=player.inventory,k=Object.keys(inv).filter(k=>inv[k]?.length>0);if(!k.length){p.innerHTML=`<div class="stl">🎒 TÚI CÁ</div><div class="es"><div class="ei">🎣</div><p>Túi trống. Hãy đi câu!</p></div>`;return;}let h=`<div class="stl">🎒 TÚI CÁ — ${invCount(inv)} con</div><div class="ig">`;for(const id of k){const f=ALL_FISH[id];if(!f)continue;const arr=inv[id],hc='#'+f.color.toString(16).padStart(6,'0'),tv=arr.reduce((s,e)=>s+e.value,0);h+=`<div class="ii" style="border-color:${hc}40"><div class="fe">${f.emoji}</div><div class="fn">${f.name}</div><div class="fc">×${arr.length} con</div><div class="fv"><span class="${f.rc}">${f.rar}</span></div><div class="fv" style="color:var(--gold)">${fmt(tv)}🪙</div></div>`;}p.innerHTML=h+'</div>';return;}
if(activeTab==='shop'){const ok=player.coins>=ROD_PRICE;p.innerHTML=`<div class="stl">🏪 CỬA HÀNG</div><div class="shoprow"><div style="font-size:36px">🎣</div><div class="si"><div class="sn">Cần Câu Đồng</div><div class="sd">${ROD_USES} lần câu</div><div class="sp">${fmt(ROD_PRICE)} 🪙</div></div><button class="buybtn ${ok?'':'dis'}" onclick="${ok?'buyRod(1)':'void(0)'}">${ok?'MUA 1':'THIẾU XU'}</button></div><div style="padding:8px;background:rgba(15,32,53,.8);border-radius:var(--rsm);margin-top:8px">💰 <strong style="color:var(--gold)">${fmt(player.coins)} 🪙</strong> | 🎣 <strong style="color:var(--accent)">${player.rodUses}</strong> lần</div>`;return;}
if(activeTab==='sell'){const inv=player.inventory,k=Object.keys(inv).filter(k=>inv[k]?.length>0);if(!k.length){p.innerHTML=`<div class="stl">💰 BÁN CÁ</div><div class="es"><div class="ei">🐟</div><p>Không có cá để bán.</p></div>`;return;}const t=invValue(inv),tc=invCount(inv);let h=`<div class="stl">💰 BÁN CÁ — ${tc} con</div><div class="sg">`;for(const id of k){const f=ALL_FISH[id];if(!f)continue;const arr=inv[id],hc='#'+f.color.toString(16).padStart(6,'0'),tv=arr.reduce((s,e)=>s+e.value,0);h+=`<div class="si2" style="border-color:${hc}40"><div style="font-size:32px">${f.emoji}</div><div style="font-weight:800;margin:3px 0">${f.name}</div><div style="font-size:9px;color:var(--sub)">×${arr.length} con</div><div style="font-size:10px;color:var(--gold);font-weight:800;margin:2px 0">${fmt(tv)}🪙</div><button class="sb" onclick="sellFish('${id}','all')">BÁN TẤT CẢ</button></div>`;}h+=`</div><div style="text-align:right;font-weight:800;color:var(--gold);margin-bottom:6px">Tổng: +${fmt(t)} 🪙</div><button id="sab" onclick="sellAll()">💰 BÁN TẤT CẢ</button>`;p.innerHTML=h;return;}
if(activeTab==='rates'){const m=MAP_DEFS[curMap];let h=`<div class="stl">📊 TỈ LỆ — ${m.name}</div><table class="rt"><tr><th>Cá</th><th>Hiếm</th><th>Tỉ Lệ</th><th>Giá</th></tr><tr><td>💨 Hụt</td><td>—</td><td>${m.rates.miss}%</td><td>—</td></tr>`;for(const id of m.pool){const f=ALL_FISH[id];h+=`<tr><td>${f.emoji} ${f.name}</td><td><span class="${f.rc}">${f.rar}</span></td><td>${m.rates[id]||0}%</td><td style="color:var(--gold)">${fmt(f.value)}🪙</td></tr>`;}h+=`</table>`;p.innerHTML=h;return;}}

let audioCtx=null,soundOn=false,masterGain=null;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.15;masterGain.connect(audioCtx.destination);soundOn=true;document.getElementById('snd').textContent='🔊';}
function toggleSound(){if(!audioCtx){initAudio();return;}soundOn=!soundOn;masterGain.gain.value=soundOn?.15:0;document.getElementById('snd').textContent=soundOn?'🔊':'';}
document.addEventListener('click',()=>{if(!audioCtx)initAudio();},{once:true});

// Khởi động
bootFirebase();
</script>
</body>
