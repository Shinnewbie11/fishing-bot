<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎣 Câu Cá 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06101f;--panel:rgba(8,20,36,.95);--border:#1a3550;--accent:#00d4ff;--gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .4s}
#loading.hidden{opacity:0;pointer-events:none}
#loading h2{font-family:'Press Start 2P';font-size:14px;color:var(--accent);margin-bottom:15px}
#loadbar{width:180px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));width:0;animation:load 1.2s ease-out forwards}
@keyframes load{0%{width:0}100%{width:100%}}
#game{width:100%;max-width:900px;margin:0 auto;flex-direction:column;min-height:100vh;display:none;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--panel);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10}
#hdr h1{font-family:'Press Start 2P';font-size:11px;color:var(--accent)}
#coins-display{color:var(--gold);font-weight:800;font-size:15px;background:rgba(255,214,96,.15);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,214,96,.3)}
#cw{position:relative;width:100%;background:linear-gradient(to bottom,#001133,#000);overflow:hidden;aspect-ratio:900/480}
#gc{width:100%;height:100%;display:block;cursor:grab}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.95);border-radius:1px;box-shadow:0 0 8px rgba(0,212,255,.8)}
#xhair::before{width:2px;height:28px;left:13px;top:0}
#xhair::after{width:28px;height:2px;top:13px;left:0}
#st{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:8px;color:#fff;text-shadow:2px 2px 0 #000,0 0 15px rgba(0,212,255,.8);pointer-events:none;z-index:5;background:rgba(0,0,0,.7);padding:8px 16px;border-radius:25px;border:2px solid rgba(0,212,255,.5);white-space:nowrap;letter-spacing:1px}
#maps{display:flex;gap:8px;padding:10px;background:rgba(6,16,31,.98);overflow-x:auto;border-bottom:2px solid var(--border)}
.mb{flex:0 0 auto;padding:10px 16px;background:rgba(10,25,45,.9);border:2px solid var(--border);border-radius:16px;color:var(--sub);cursor:pointer;font-size:11px;font-weight:800;white-space:nowrap;transition:all .3s}
.mb:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,212,255,.3)}
.mb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.2);box-shadow:0 0 15px rgba(0,212,255,.5)}
#act{display:flex;gap:8px;padding:12px;background:rgba(6,16,31,.98);border-top:2px solid var(--border)}
#cb{flex:1;padding:16px;font-family:'Press Start 2P';font-size:10px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer;box-shadow:0 4px 15px rgba(0,192,240,.5);transition:all .3s;text-transform:uppercase}
#cb:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,192,240,.7)}
#cb:disabled{opacity:.4;cursor:not-allowed;transform:none}
#ri{padding:12px 16px;background:rgba(10,25,45,.9);border:2px solid var(--border);border-radius:var(--rad);text-align:center;min-width:90px}
#ri .us{font-weight:900;font-size:22px;color:var(--accent);display:block}
#tabs{display:flex;background:var(--panel);border-top:2px solid var(--border);position:sticky;bottom:0;z-index:10}
.tb{flex:1;padding:14px;background:none;border:none;border-right:2px solid var(--border);color:var(--sub);cursor:pointer;font-weight:800;font-size:11px;transition:all .3s;text-transform:uppercase}
.tb:last-child{border-right:none}.tb:hover{background:rgba(0,212,255,.1)}.tb.on{background:rgba(0,212,255,.2);color:var(--accent);box-shadow:inset 0 2px 10px rgba(0,212,255,.3)}
#cp{background:var(--panel);border-top:2px solid var(--border);padding:15px;min-height:200px;max-height:300px;overflow-y:auto}
#cp::-webkit-scrollbar{width:8px}#cp::-webkit-scrollbar-track{background:rgba(0,0,0,.3);border-radius:4px}#cp::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}#cp::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.98);border:2px solid var(--accent);border-radius:16px;padding:14px 24px;font-size:13px;font-weight:800;z-index:9999;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 8px 30px rgba(0,212,255,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(4,12,28,.98);border:3px solid var(--gold);border-radius:var(--rad);padding:20px 28px;text-align:center;min-width:220px;pointer-events:none;z-index:10;backdrop-filter:blur(15px);box-shadow:0 0 50px rgba(255,214,96,.6)}
#result-banner.show{animation:pop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0) rotate(-12deg)}50%{transform:translate(-50%,-50%) scale(1.15) rotate(4deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
.grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.card{background:rgba(15,32,53,.9);border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center;transition:all .3s}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,212,255,.3)}
.card .emoji{font-size:40px;margin-bottom:8px;display:block}
.card .name{font-weight:800;font-size:11px;margin:6px 0;color:var(--text)}
.card .count{font-size:10px;color:var(--sub);margin:4px 0}
.card .value{color:var(--gold);font-size:11px;margin-top:8px;font-weight:800}
.sell-btn{width:100%;padding:8px;margin-top:8px;background:linear-gradient(135deg,#e74c3c,#ff6b6b);border:none;border-radius:8px;color:#fff;font-size:10px;cursor:pointer;font-weight:800;transition:all .2s}
.sell-btn:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(231,76,60,.5)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:60px;margin-bottom:15px;animation:bounce 1s infinite">🎣</div>
  <h2>CÂU CÁ 3D</h2>
  <div id="loadbar"><div id="loadfill"></div></div>
</div>

<div id="game">
  <div id="hdr">
    <h1>🎣 CÂU CÁ 3D</h1>
    <div id="coins-display">🪙 <span id="coins">100,000</span></div>
  </div>
  <div id="maps">
    <button class="mb on" onclick="selMap(0)">🏡 Hồ Làng</button>
    <button class="mb" onclick="selMap(1)">🌊 Biển</button>
    <button class="mb" onclick="selMap(2)">🏔️ Băng</button>
    <button class="mb" onclick="selMap(3)">🌑 Vực</button>
  </div>
  <div id="cw">
    <canvas id="gc" width="900" height="480"></canvas>
    <div id="xhair"></div>
    <div id="st">Nhấn THẢ CÂU để bắt đầu!</div>
    <div id="result-banner">
      <div id="res-emoji" style="font-size:56px;margin-bottom:8px"></div>
      <div id="res-name" style="font-weight:900;font-size:15px;margin-bottom:6px"></div>
      <div id="res-info" style="font-size:12px;color:var(--sub);margin-bottom:8px"></div>
      <div id="res-value" style="font-size:14px;color:var(--gold);font-weight:800"></div>
    </div>
  </div>
  <div id="act">
    <button id="cb" onclick="handleCast()">🎣 THẢ CÂU</button>
    <div id="ri"><span class="us" id="rods">10</span><span style="font-size:10px;color:var(--sub);display:block;margin-top:4px">lần</span></div>
  </div>
  <div id="tabs">
    <button class="tb on" onclick="swTab('bag')">🎒 Túi cá</button>
    <button class="tb" onclick="swTab('shop')">🏪 Shop</button>
    <button class="tb" onclick="swTab('sell')">💰 Bán cá</button>
    <button class="tb" onclick="swTab('rates')">📊 Tỉ lệ</button>
  </div>
  <div id="cp"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const MAP_DEFS=[
  {id:'ho',name:'🏡 Hồ Làng',pool:['moi','tram','chep','vang'],rates:{miss:45,moi:35,tram:12,chep:6,vang:2},sky:0x87ceeb,water:0x3d8fcc,ground:0x4a7a2a},
  {id:'bien',name:'🌊 Biển',pool:['bien','ngua','mattroi','rong'],rates:{miss:42,bien:36,ngua:14,mattroi:6,rong:2},sky:0x0077b6,water:0x0096c7,ground:0xf0d080},
  {id:'nui',name:'🏔️ Băng',pool:['hoi','tam','bang','thanbang'],rates:{miss:40,hoi:34,tam:16,bang:7,thanbang:3},sky:0x1a2040,water:0xa8d8ea,ground:0xdde8f0},
  {id:'vuc',name:'🌑 Vực',pool:['bachtuoc','cama','caco','thanhailong'],rates:{miss:38,bachtuoc:32,cama:20,caco:8,thanhailong:2},sky:0x000008,water:0x001020,ground:0x0a1520}
];
const ALL_FISH={
  moi:{id:'moi',name:'Cá Mồi',emoji:'🐟',value:10_000,rar:'Thường',color:0x74b9ff,minW:.1,maxW:.8},
  tram:{id:'tram',name:'Cá Trắm',emoji:'🐠',value:120_000,rar:'Không Thường',color:0xa29bfe,minW:1,maxW:5},
  chep:{id:'chep',name:'Cá Chép Vàng',emoji:'🐡',value:600_000,rar:'Quý Hiếm',color:0xfdcb6e,minW:3,maxW:15},
  vang:{id:'vang',name:'Cá Vàng',emoji:'✨',value:8_000_000,rar:'Huyền Thoại',color:0xffd700,minW:5,maxW:25},
  bien:{id:'bien',name:'Cá Biển',emoji:'🐬',value:15_000,rar:'Thường',color:0x00d4ff,minW:.5,maxW:3},
  ngua:{id:'ngua',name:'Cá Ngựa',emoji:'🦀',value:200_000,rar:'Không Thường',color:0xff6b9d,minW:2,maxW:12},
  mattroi:{id:'mattroi',name:'Cá Mặt Trời',emoji:'🐙',value:1_500_000,rar:'Quý Hiếm',color:0xff9f43,minW:10,maxW:50},
  rong:{id:'rong',name:'Cá Rồng',emoji:'🐲',value:50_000_000,rar:'Thần Thoại',color:0xff3333,minW:50,maxW:300},
  hoi:{id:'hoi',name:'Cá Hồi',emoji:'🦑',value:80_000,rar:'Thường',color:0x74e0ff,minW:.5,maxW:4},
  tam:{id:'tam',name:'Cá Tầm',emoji:'🐋',value:500_000,rar:'Không Thường',color:0x7fb3d3,minW:20,maxW:100},
  bang:{id:'bang',name:'Cá Băng',emoji:'💎',value:5_000_000,rar:'Quý Hiếm',color:0xaef7ff,minW:30,maxW:200},
  thanbang:{id:'thanbang',name:'Thần Băng',emoji:'❄️',value:80_000_000,rar:'Huyền Thoại',color:0xffffff,minW:100,maxW:500},
  bachtuoc:{id:'bachtuoc',name:'Bạch Tuộc',emoji:'🦑',value:30_000,rar:'Thường',color:0x8e44ad,minW:5,maxW:30},
  cama:{id:'cama',name:'Cá Ma',emoji:'👻',value:300_000,rar:'Không Thường',color:0x2ecc71,minW:2,maxW:20},
  caco:{id:'caco',name:'Cá Cổ',emoji:'🦕',value:10_000_000,rar:'Quý Hiếm',color:0x2c3e50,minW:200,maxW:1000},
  thanhailong:{id:'thanhailong',name:'Thần Hải Long',emoji:'🐉',value:500_000_000,rar:'Vô Tiền',color:0xff00ff,minW:1000,maxW:9999}
};

let ROD_PRICE=10000, ROD_USES=10;
let player={userId:'local',username:'Người Chơi',coins:100000,rodUses:10,inventory:{},totalCaught:0};
let gstate='idle', curMap=0, activeTab='bag', wt, bt, resultFish=null, resultWeight=0;
let yaw=0, pitch=0;

// ═══════════════════════════════════════════════════════════
// THREE.JS SETUP - ENHANCED GRAPHICS
// ═══════════════════════════════════════════════════════════
const cv=document.getElementById('gc');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
renderer.setSize(900,480);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x87ceeb,20,100);
const camera=new THREE.PerspectiveCamera(70,900/480,0.1,200);
camera.position.set(0,1.5,0);camera.rotation.order='YXZ';scene.add(camera);

// Lighting
const ambientLight=new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambientLight);
const sunLight=new THREE.DirectionalLight(0xfff4d8,1.3);
sunLight.position.set(10,15,8);
sunLight.castShadow=true;
sunLight.shadow.mapSize.set(2048,2048);
sunLight.shadow.camera.near=0.5;
sunLight.shadow.camera.far=50;
scene.add(sunLight);
const fillLight=new THREE.DirectionalLight(0xaad4ff,0.4);
fillLight.position.set(-8,5,-6);
scene.add(fillLight);

let isDrag=false,px=0,py=0;
cv.addEventListener('mousedown',e=>{isDrag=true;px=e.clientX;py=e.clientY;});
document.addEventListener('mouseup',()=>isDrag=false);
document.addEventListener('mousemove',e=>{if(!isDrag)return;yaw-=(e.clientX-px)*.0024;pitch=Math.max(-.8,Math.min(.8,pitch-(e.clientY-py)*.0024));px=e.clientX;py=e.clientY;camera.rotation.y=yaw;camera.rotation.x=pitch;});
cv.addEventListener('touchstart',e=>{isDrag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',()=>isDrag=false);
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrag||!e.touches[0])return;yaw-=(e.touches[0].clientX-px)*.0028;pitch=Math.max(-.8,Math.min(.8,pitch-(e.touches[0].clientY-py)*.0028));px=e.touches[0].clientX;py=e.touches[0].clientY;camera.rotation.y=yaw;camera.rotation.x=pitch;},{passive:false});

function stdMat(c,r=.8,m=0){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});}

// WATER SHADER - ENHANCED
const waterGeo=new THREE.PlaneGeometry(120,120,100,100);
const waterMat=new THREE.ShaderMaterial({
  uniforms:{
    uT:{value:0},
    uDeep:{value:new THREE.Vector3(.1,.4,.7)},
    uShallow:{value:new THREE.Vector3(.2,.6,.9)}
  },
  vertexShader:`
    uniform float uT;
    varying float vElevation;
    varying vec3 vPosition;
    void main(){
      vec3 p=position;
      float e=sin(p.x*3.2+uT*1.6)*.18+sin(p.z*2.5-uT*1.2)*.14+sin((p.x+p.z)*1.8+uT*.9)*.08;
      p.y+=e;
      vElevation=e;
      vPosition=p;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
    }
  `,
  fragmentShader:`
    uniform vec3 uDeep;
    uniform vec3 uShallow;
    varying float vElevation;
    void main(){
      float mixStrength=(vElevation+.35)/.65;
      vec3 color=mix(uDeep,uShallow,mixStrength);
      float foam=smoothstep(.2,.4,vElevation);
      color=mix(color,vec3(.95,.98,1.),foam*.4);
      gl_FragColor=vec4(color,.9);
    }
  `,
  transparent:true,
  side:THREE.DoubleSide
});
const water=new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2;
water.position.y=0.01;
scene.add(water);

// GROUND
const groundGeo=new THREE.PlaneGeometry(120,120);
const groundMat=new THREE.MeshStandardMaterial({color:0x4a7a2a,roughness:0.95});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.position.y=-0.25;
ground.receiveShadow=true;
scene.add(ground);

// ROD - ENHANCED
const rodGrp=new THREE.Group();
camera.add(rodGrp);
rodGrp.position.set(0.3,-0.7,-0.6);
rodGrp.rotation.set(0,0,-0.15);

// Rod handle
const handleGeo=new THREE.CylinderGeometry(0.035,0.04,0.5,12);
const handleMat=new THREE.MeshStandardMaterial({color:0x181410,roughness:0.95});
const handle=new THREE.Mesh(handleGeo,handleMat);
handle.position.y=0.25;
handle.castShadow=true;
rodGrp.add(handle);

// Rod reel
const reelGeo=new THREE.CylinderGeometry(0.055,0.055,0.06,16);
const reelMat=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.3,metalness:0.8});
const reel=new THREE.Mesh(reelGeo,reelMat);
reel.position.y=0.55;
reel.rotation.x=Math.PI/2;
reel.castShadow=true;
rodGrp.add(reel);

// Rod blank
const blankGeo=new THREE.CylinderGeometry(0.008,0.02,2.5,10);
const blankMat=new THREE.MeshStandardMaterial({color:0xb87333,roughness:0.65});
const blank=new THREE.Mesh(blankGeo,blankMat);
blank.position.y=1.5;
blank.castShadow=true;
rodGrp.add(blank);

// Rod tip
const rodTip=new THREE.Object3D();
rodTip.position.y=3.0;
rodGrp.add(rodTip);

// BOBBER - ENHANCED
const bobGrp=new THREE.Group();
scene.add(bobGrp);
bobGrp.visible=false;
const bobberTopGeo=new THREE.SphereGeometry(0.12,12,10,0,Math.PI*2,0,Math.PI/2);
const bobberTopMat=new THREE.MeshStandardMaterial({color:0xe74c3c,roughness:0.5,metalness:0.1});
const bobberTop=new THREE.Mesh(bobberTopGeo,bobberTopMat);
bobberTop.castShadow=true;
bobGrp.add(bobberTop);
const bobberBottomGeo=new THREE.SphereGeometry(0.12,12,10,0,Math.PI*2,Math.PI/2,Math.PI/2);
const bobberBottomMat=new THREE.MeshStandardMaterial({color:0xecf0f1,roughness:0.6});
const bobberBottom=new THREE.Mesh(bobberBottomGeo,bobberBottomMat);
bobberBottom.castShadow=true;
bobGrp.add(bobberBottom);

// FISHING LINE
const linePts=35;
const lineArr=new Float32Array(linePts*3);
const lineGeo=new THREE.BufferGeometry();
lineGeo.setAttribute('position',new THREE.Float32BufferAttribute(lineArr,3));
const lineMat=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.85});
const lineMesh=new THREE.Line(lineGeo,lineMat);
scene.add(lineMesh);

// GIANT FISH MODEL - ENHANCED
const fishGrp=new THREE.Group();
scene.add(fishGrp);
fishGrp.visible=false;

// Fish body with better material
const fishBodyMat=new THREE.MeshStandardMaterial({color:0x74b9ff,roughness:0.3,metalness:0.3});
const fishBody=new THREE.Mesh(new THREE.SphereGeometry(0.5,20,15),fishBodyMat);
fishBody.scale.set(2.8,0.9,1.0);
fishBody.castShadow=true;
fishGrp.add(fishBody);

// Fish tail
const tailGeo=new THREE.ConeGeometry(0.45,1.4,6);
const tailMat=new THREE.MeshStandardMaterial({color:0x74b9ff,roughness:0.3});
const fishTail=new THREE.Mesh(tailGeo,tailMat);
fishTail.position.x=-1.8;
fishTail.rotation.z=-Math.PI/2;
fishTail.castShadow=true;
fishGrp.add(fishTail);

// Fish fins
const fin1=new THREE.Mesh(new THREE.ConeGeometry(0.28,0.6,5),fishBodyMat);
fin1.position.set(0.35,0.65,0);
fin1.castShadow=true;
fishGrp.add(fin1);

const fin2=new THREE.Mesh(new THREE.ConeGeometry(0.18,0.35,5),fishBodyMat);
fin2.position.set(0.55,-0.55,0);
fin2.castShadow=true;
fishGrp.add(fin2);

// Fish eyes
const eyeGeo=new THREE.SphereGeometry(0.1,10,10);
const eyeMat=new THREE.MeshBasicMaterial({color:0xffffff});
const pupilMat=new THREE.MeshBasicMaterial({color:0x000000});
const eye1=new THREE.Mesh(eyeGeo,eyeMat);
eye1.position.set(1.2,0.25,0.4);
fishGrp.add(eye1);
const pupil1=new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8),pupilMat);
pupil1.position.set(1.25,0.25,0.4);
fishGrp.add(pupil1);

const eye2=eye1.clone();
eye2.position.set(1.2,0.25,-0.4);
fishGrp.add(eye2);
const pupil2=pupil1.clone();
pupil2.position.set(1.25,0.25,-0.4);
fishGrp.add(pupil2);

// Fish glow light
const fishLight=new THREE.PointLight(0x74b9ff,3,18);
fishGrp.add(fishLight);

// Bubbles
for(let i=0;i<15;i++){
  const bubbleGeo=new THREE.SphereGeometry(0.05+Math.random()*0.08,8,8);
  const bubbleMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.75});
  const bubble=new THREE.Mesh(bubbleGeo,bubbleMat);
  bubble.userData={off:Math.random()*6.28,speed:1.5+Math.random()*2,yBase:Math.random()*2.5};
  fishGrp.add(bubble);
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let lineLen=10, fishRiseT=0, fishState='none', castT=0;
const bobTarget=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*0.001;
  waterMat.uniforms.uT.value=t;
  
  // Rod animation
  const tRot=gstate==='casting'?0.38:gstate==='biting'?0.18+Math.sin(t*9)*0.1:gstate==='reeling'?0.28:0.05;
  rodGrp.rotation.x+=(tRot-rodGrp.rotation.x)*0.1;

  // Bobber & Line
  if(gstate==='casting'){
    castT=Math.min(castT+0.07,1);
    bobGrp.position.lerpVectors(new THREE.Vector3(camera.position.x,1.2,camera.position.z-3),bobTarget,castT);
    lineLen=castT*9;
  }else if(gstate==='waiting'){
    castT=1;
    bobGrp.position.x=bobTarget.x+Math.sin(t*0.6)*0.9;
    bobGrp.position.z=bobTarget.z+Math.cos(t*0.5)*0.6;
    bobGrp.position.y=Math.sin(t*1.2)*0.12;
    lineLen=9;
  }else if(gstate==='biting'){
    bobGrp.position.y=-0.25;
    lineLen=8;
  }else if(gstate==='reeling'){
    lineLen=Math.max(0.5,lineLen-0.18);
    bobGrp.position.y=Math.sin(t)*0.06;
  }else{
    bobGrp.visible=false;
    lineMesh.visible=false;
    lineLen=10;
  }
  bobGrp.visible=lineLen>1&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');
  lineMesh.visible=lineLen>1;

  if(lineMesh.visible){
    const tip=new THREE.Vector3();
    rodTip.getWorldPosition(tip);
    const bp=bobGrp.position;
    const p=lineMesh.geometry.attributes.position.array;
    for(let i=0;i<linePts;i++){
      const f=i/(linePts-1);
      const sag=Math.sin(f*Math.PI)*-0.35*(lineLen/9);
      p[i*3]=tip.x+(bp.x-tip.x)*f;
      p[i*3+1]=tip.y+(bp.y-tip.y)*f+sag;
      p[i*3+2]=tip.z+(bp.z-tip.z)*f;
    }
    lineMesh.geometry.attributes.position.needsUpdate=true;
  }

  // GIANT FISH ANIMATION - ENHANCED
  if(fishState==='rising'){
    fishGrp.visible=true;
    fishRiseT+=0.014;
    fishGrp.position.set(0,-1.6+fishRiseT*4.5,0);
    fishGrp.rotation.y+=0.06;
    fishGrp.rotation.z=Math.sin(t*2.5)*0.18;
    const s=0.35+fishRiseT*3.2;
    fishGrp.scale.set(s,s,s);
    
    // Bubbles animation
    fishGrp.children.filter(c=>c.userData.speed).forEach((b,i)=>{
      b.position.set(
        Math.sin(t*2.5+b.userData.off)*0.7,
        fishRiseT*3 + b.userData.yBase,
        Math.cos(t*1.8+b.userData.off)*0.6
      );
    });
    
    if(fishRiseT>=1) fishState='holding';
  }else if(fishState==='holding'){
    fishGrp.position.y=1.0+Math.sin(t*1.5)*0.18;
    fishGrp.rotation.y+=0.04;
    fishGrp.rotation.z=Math.sin(t*3.5)*0.12;
    if(t%3.5<0.12) fishState='pulling';
  }else if(fishState==='pulling'){
    const pt=Math.min((t%3.5)/1.4,1);
    fishGrp.position.lerp(new THREE.Vector3(camera.position.x*0.25,0.5,camera.position.z*0.25+1.0),pt*0.12);
    fishGrp.rotation.y+=0.12;
    fishGrp.rotation.z=Math.sin(t*7)*0.3;
    if(pt>=1){
      fishGrp.visible=false;
      fishState='none';
      triggerCatch();
    }
  }
  
  renderer.render(scene,camera);
}
animate();

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════
function rollFish(i){
  const r=MAP_DEFS[i].rates;
  const x=Math.random()*100;
  let c=r.miss||30;
  if(x<c) return null;
  for(const id of MAP_DEFS[i].pool){
    c+=r[id]||0;
    if(x<c) return ALL_FISH[id];
  }
  return null;
}

function rollWeight(f){
  return Math.round((f.minW+Math.random()*(f.maxW-f.minW))*10)/10;
}

function fmtWeight(w){
  return w>=1000?(w/1000).toFixed(1)+' tấn':w>=1?w.toFixed(1)+' kg':Math.round(w*1000)+' g';
}

function updateUI(){
  document.getElementById('coins').textContent=player.coins.toLocaleString('vi-VN');
  document.getElementById('rods').textContent=player.rodUses;
}

function setStatus(m){
  document.getElementById('st').textContent=m;
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

function handleCast(){
  if(gstate==='biting'){
    clearTimeout(bt);
    doReel();
    return;
  }
  if(gstate!=='idle') return;
  if(player.rodUses<=0){
    showToast('❌ Mua cần câu ở Shop!');
    swTab('shop');
    return;
  }
  resultFish=null;
  resultWeight=0;
  gstate='casting';
  castT=0;
  fishState='none';
  setStatus('🎣 Đang quăng câu...');
  document.getElementById('cb').disabled=true;
  
  const fwd=new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y=0;
  fwd.normalize();
  bobTarget.set(camera.position.x+fwd.x*9,0,camera.position.z+fwd.z*9);
  bobGrp.position.set(camera.position.x,1.2,camera.position.z-3);
  
  setTimeout(()=>{
    gstate='waiting';
    setStatus('⏳ Chờ cá cắn...');
    wt=setTimeout(startBite,3500+Math.random()*5000);
  },900);
}

function startBite(){
  gstate='biting';
  setStatus('🐟 CÁ CẮN! NHẤN KÉO!');
  const b=document.getElementById('cb');
  b.textContent='⚡ KÉO!';
  b.disabled=false;
  bt=setTimeout(escape,3500);
}

function doReel(){
  gstate='reeling';
  setStatus('⚡ Đang kéo...');
  const b=document.getElementById('cb');
  b.textContent='🎣 THẢ CÂU';
  b.disabled=true;
  player.rodUses--;
  updateUI();
  
  resultFish=rollFish(curMap);
  resultWeight=resultFish?rollWeight(resultFish):0;
  
  if(resultFish){
    const c=resultFish.color;
    fishGrp.children[0].material.color.setHex(c);
    fishGrp.children[1].material.color.setHex(c);
    fishGrp.children[2].material.color.setHex(c);
    fishGrp.children[3].material.color.setHex(c);
    fishLight.color.setHex(c);
    fishState='rising';
    fishRiseT=0;
  }else{
    setTimeout(escape,1800);
  }
}

function escape(){
  gstate='idle';
  fishState='none';
  fishGrp.visible=false;
  setStatus('😔 Cá thoát! Kéo chậm quá!');
  document.getElementById('cb').disabled=false;
  setTimeout(()=>setStatus('Nhấn THẢ CÂU để thử lại!'),2500);
}

function triggerCatch(){
  if(!resultFish) return;
  if(!player.inventory[resultFish.id]) player.inventory[resultFish.id]=[];
  player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value});
  player.totalCaught++;
  showBanner(resultFish,resultWeight);
  setTimeout(()=>{
    gstate='idle';
    setStatus('🎉 Bắt thành công! Nhấn THẢ CÂU tiếp!');
    document.getElementById('cb').disabled=false;
    renderContent();
  },2500);
}

function showBanner(f,w){
  const b=document.getElementById('result-banner');
  document.getElementById('res-emoji').textContent=f.emoji;
  document.getElementById('res-name').textContent=f.name;
  document.getElementById('res-info').textContent=f.rar+' | ⚖️ '+fmtWeight(w);
  document.getElementById('res-value').textContent='+'+f.value.toLocaleString('vi-VN')+' 🪙';
  b.style.borderColor='#'+f.color.toString(16).padStart(6,'0');
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
}

function selMap(i){
  curMap=i;
  document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('on',j===i));
  const m=MAP_DEFS[i];
  scene.background=new THREE.Color(m.sky);
  scene.fog.color.setHex(m.sky);
  waterMat.uniforms.uD.value.setHex(m.water);
  waterMat.uniforms.uS.value.setHex(m.water);
  ground.material.color.setHex(m.ground);
  showToast('📍 Đến '+m.name);
}

function swTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tb').forEach((b,j)=>{
    const tabs=['bag','shop','sell','rates'];
    b.classList.toggle('on',tabs[j]===tab);
  });
  renderContent();
}

function renderContent(){
  const p=document.getElementById('cp');
  
  if(activeTab==='bag'){
    const k=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(!k.length){
      p.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--sub)"><div style="font-size:64px;margin-bottom:20px">🎒</div><p style="font-size:14px;line-height:1.6">Túi cá trống!<br>Hãy đi câu nhé!</p></div>';
      return;
    }
    let h='<div class="grid-container">';
    k.forEach(id=>{
      const f=ALL_FISH[id];
      const arr=player.inventory[id];
      const tv=arr.reduce((s,e)=>s+e.value,0);
      h+=`<div class="card">
        <span class="emoji">${f.emoji}</span>
        <div class="name">${f.name}</div>
        <div class="count">×${arr.length} con</div>
        <div class="value">${tv.toLocaleString('vi-VN')}🪙</div>
      </div>`;
    });
    h+='</div>';
    p.innerHTML=h;
  }
  else if(activeTab==='shop'){
    p.innerHTML=`<div style="background:rgba(15,32,53,.95);border:2px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;gap:20px;margin-bottom:15px">
      <div style="font-size:56px">🎣</div>
      <div style="flex:1">
        <div style="font-weight:900;font-size:15px;margin-bottom:8px">Cần Câu Đồng</div>
        <div style="font-size:12px;color:var(--sub);margin-bottom:8px">Sử dụng được <strong style="color:var(--accent)">${ROD_USES}</strong> lần câu</div>
        <div style="color:var(--gold);font-weight:800;font-size:14px">${ROD_PRICE.toLocaleString('vi-VN')} 🪙</div>
      </div>
      <button onclick="buyRod()" style="padding:14px 24px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:12px;color:#000;font-weight:900;cursor:pointer;font-size:12px;box-shadow:0 4px 15px rgba(0,230,118,.5);transition:all .3s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">MUA NGAY</button>
    </div>`;
  }
  else if(activeTab==='sell'){
    const k=Object.keys(player.inventory).filter(k=>player.inventory[k]?.length>0);
    if(!k.length){
      p.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--sub)"><div style="font-size:64px;margin-bottom:20px">🐟</div><p style="font-size:14px;line-height:1.6">Không có cá để bán<br>Đi câu thêm nhé!</p></div>';
      return;
    }
    let total=0;
    let h='<div class="grid-container">';
    k.forEach(id=>{
      const f=ALL_FISH[id];
      const arr=player.inventory[id];
      const val=arr.reduce((s,e)=>s+e.value,0);
      total+=val;
      h+=`<div class="card">
        <span class="emoji">${f.emoji}</span>
        <div class="name">${f.name}</div>
        <div class="count">×${arr.length}</div>
        <div class="value">${val.toLocaleString('vi-VN')}🪙</div>
        <button class="sell-btn" onclick="sellFish('${id}')">BÁN</button>
      </div>`;
    });
    h+=`</div><div style="margin-top:20px;text-align:right;font-weight:800;color:var(--gold);font-size:16px;padding:15px;background:rgba(255,214,96,.15);border-radius:12px;border:2px solid rgba(255,214,96,.3)">💰 Tổng: ${total.toLocaleString('vi-VN')} 🪙</div>`;
    p.innerHTML=h;
  }
  else if(activeTab==='rates'){
    const m=MAP_DEFS[curMap];
    let h='<table style="width:100%;font-size:12px;border-collapse:collapse"><tr style="background:rgba(0,212,255,.2)"><th style="padding:12px;text-align:left;border-bottom:2px solid var(--border)">Cá</th><th style="border-bottom:2px solid var(--border)">Hiếm</th><th style="border-bottom:2px solid var(--border)">Tỉ Lệ</th><th style="border-bottom:2px solid var(--border)">Giá</th></tr>';
    h+=`<tr><td style="padding:12px;border-bottom:1px solid var(--border)">💨 Hụt</td><td style="border-bottom:1px solid var(--border)">—</td><td style="border-bottom:1px solid var(--border)">${m.rates.miss}%</td><td style="border-bottom:1px solid var(--border)">—</td></tr>`;
    m.pool.forEach(id=>{
      const f=ALL_FISH[id];
      h+=`<tr><td style="padding:12px;border-bottom:1px solid var(--border)">${f.emoji} ${f.name}</td><td style="border-bottom:1px solid var(--border)">${f.rar}</td><td style="border-bottom:1px solid var(--border)">${m.rates[id]||0}%</td><td style="border-bottom:1px solid var(--border);color:var(--gold);font-weight:800">${f.value.toLocaleString('vi-VN')}🪙</td></tr>`;
    });
    h+='</table>';
    p.innerHTML=h;
  }
}

function buyRod(){
  if(player.coins<ROD_PRICE){
    showToast('❌ Không đủ xu! Cần '+ROD_PRICE.toLocaleString('vi-VN')+' 🪙');
    return;
  }
  player.coins-=ROD_PRICE;
  player.rodUses+=ROD_USES;
  updateUI();
  showToast('✅ Mua '+ROD_USES+' lần câu thành công!');
  renderContent();
}

function sellFish(id){
  if(!player.inventory[id]) return;
  const tv=player.inventory[id].reduce((s,e)=>s+e.value,0);
  player.coins+=tv;
  delete player.inventory[id];
  updateUI();
  showToast('💰 Bán được '+tv.toLocaleString('vi-VN')+' 🪙');
  renderContent();
}

document.getElementById('cb').addEventListener('click',()=>{
  if(gstate==='biting') doReel();
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('game').style.display='flex';
    updateUI();
    renderContent();
    setStatus('🎮 Game đã sẵn sàng! Nhấn THẢ CÂU!');
  },1200);
});
</script>
</body>
