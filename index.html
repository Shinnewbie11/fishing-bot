<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>🎣 Câu Cá Online</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;
  --gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px;--rsm:7px;--online:#2ecc71
}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden;-webkit-user-select:none;user-select:none}
#game{width:100%;max-width:900px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.4)}
#hdr-right{display:flex;align-items:center;gap:8px}
#cd{display:flex;align-items:center;gap:4px;font-weight:900;font-size:15px;color:var(--gold)}
#online-pill{display:flex;align-items:center;gap:4px;background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--online)}
#online-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--online);box-shadow:0 0 6px var(--online);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto;scrollbar-width:none}
#maps::-webkit-scrollbar{display:none}
.mb{flex:0 0 auto;padding:6px 13px;background:rgba(10,25,45,.8);border:2px solid var(--border);border-radius:16px;color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;transition:all .2s;white-space:nowrap}
.mb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
#cw{position:relative;width:100%;background:#000;overflow:hidden}
#gc{width:100%;height:auto;display:block;cursor:grab;touch-action:none}
#gc:active{cursor:grabbing}
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.72) 100%);pointer-events:none;z-index:2}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.6);border-radius:1px}
#xhair::before{width:1px;height:16px;left:50%;top:-4px;transform:translateX(-50%)}
#xhair::after{width:16px;height:1px;top:50%;left:-4px;transform:translateY(-50%)}
#st{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000;pointer-events:none;z-index:6;white-space:nowrap;text-align:center;line-height:1.6}
#snd{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:800;cursor:pointer;z-index:6;color:rgba(255,255,255,.7)}
#bf{position:absolute;inset:0;background:rgba(255,60,0,.15);pointer-events:none;opacity:0;z-index:3}
#bf.on{animation:bflash .28s infinite}
@keyframes bflash{0%,100%{opacity:.1}50%{opacity:.55}}

/* ── MAP NAME OVERLAY ── */
#map-name{position:absolute;top:10px;left:10px;font-family:'Press Start 2P',monospace;font-size:7px;
  color:#fff;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;
  pointer-events:none;z-index:6;background:rgba(0,0,0,.4);border-radius:6px;padding:4px 8px;
  border:1px solid rgba(255,255,255,.15)}
#map-fish-hint{position:absolute;top:38px;left:10px;font-size:9px;font-weight:800;
  pointer-events:none;z-index:6;background:rgba(0,0,0,.5);border-radius:6px;
  padding:3px 8px;border:1px solid rgba(255,255,255,.1);color:var(--sub);max-width:160px}

/* ── RESULT BANNER ── */
#rb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(4,12,28,.97);border:2px solid var(--gold);border-radius:var(--rad);
  padding:16px 24px;text-align:center;min-width:200px;pointer-events:none;z-index:12;
  backdrop-filter:blur(10px);box-shadow:0 0 40px rgba(0,0,0,.8)}
#rb.show{animation:rpop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rpop{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg)}70%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
#rb .rem{font-size:56px;line-height:1.1;filter:drop-shadow(0 0 12px currentColor)}
#rb .rn{font-weight:900;font-size:16px;margin:6px 0 3px}
#rb .rv{font-size:13px;font-weight:700;color:var(--gold)}
#rb .rr{font-size:11px;margin-top:3px}
#rb .rsz{font-size:10px;margin-top:2px;color:#88aacc}

#wb{position:absolute;bottom:0;left:0;right:0;height:4px;pointer-events:none;z-index:5}
#wbf{height:100%;width:100%;box-shadow:0 0 8px rgba(0,212,255,.5);transition:none}
#players-overlay{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:8;pointer-events:none;max-width:155px}
.po{display:flex;align-items:center;gap:5px;background:rgba(4,12,28,.78);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 8px;backdrop-filter:blur(4px)}
.po img{width:18px;height:18px;border-radius:50%}
.po .pn{font-size:9px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.po .ps{font-size:8px;margin-left:2px}
.ps-idle{color:#5a7a9a}.ps-casting{color:#f39c12}.ps-waiting{color:#00d4ff}
.ps-biting{color:#e74c3c;animation:blink .4s infinite}.ps-reeling{color:#2ecc71}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#notifs{position:absolute;bottom:50px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:9;pointer-events:none}
.notif{background:rgba(4,12,28,.88);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:6px 10px;font-size:10px;font-weight:800;animation:slideIn .3s ease,fadeOut .4s 3.6s forwards;backdrop-filter:blur(4px)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}
#chatbox{position:absolute;bottom:42px;left:8px;width:210px;z-index:8}
#chatlog{display:flex;flex-direction:column;gap:3px;max-height:85px;overflow:hidden;justify-content:flex-end}
.chatmsg{background:rgba(4,12,28,.75);border-radius:8px;padding:4px 8px;font-size:9px;animation:fadeMsg 9s forwards}
.chatmsg strong{color:var(--accent)}
@keyframes fadeMsg{0%,80%{opacity:1}100%{opacity:0}}
#chatinput-row{display:flex;gap:4px;margin-top:4px}
#chatinput{flex:1;background:rgba(8,20,36,.9);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:9px;font-weight:700;color:var(--text);outline:none;font-family:'Nunito',sans-serif}
#chatinput:focus{border-color:var(--accent)}
#chatsend{padding:4px 8px;background:rgba(0,212,255,.2);border:1px solid var(--accent);border-radius:8px;font-size:9px;font-weight:800;color:var(--accent);cursor:pointer}
#act{display:flex;gap:7px;padding:8px;background:rgba(6,16,31,.98);border-top:1px solid var(--border)}
#cb{flex:1;padding:13px;font-family:'Press Start 2P',monospace;font-size:9px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 3px 18px rgba(0,180,255,.35);min-height:50px}
#cb:hover:not(:disabled){transform:translateY(-1px)}
#cb:disabled{opacity:.4;cursor:not-allowed;transform:none}
#cb.bite{background:linear-gradient(135deg,#8a0000,#dd0000);animation:bp .22s infinite;box-shadow:0 3px 22px rgba(200,0,0,.7)}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
#ri{padding:8px 12px;background:rgba(10,25,45,.9);border:1px solid var(--border);border-radius:var(--rad);font-size:10px;color:var(--sub);text-align:center;min-width:78px;display:flex;flex-direction:column;justify-content:center}
#ri .us{font-weight:900;font-size:22px;color:var(--accent);display:block;line-height:1.2}
#tabs{display:flex;background:rgba(8,20,36,.98);border-top:1px solid var(--border)}
.tb{flex:1;padding:11px 5px;background:none;border:none;border-right:1px solid var(--border);color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;transition:all .2s;min-height:44px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:rgba(8,20,36,.98);border-top:1px solid var(--border);padding:11px;min-height:155px}
.stl{font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.ii{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.ii .fe{font-size:36px;line-height:1}.ii .fn{font-size:12px;font-weight:800;margin:3px 0 2px}.ii .fc{font-size:10px;color:var(--sub)}.ii .fv{font-size:10px;margin-top:2px}.ii .fsz{font-size:9px;color:#88aacc;margin-top:1px}
.shoprow{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.shoprow .si{flex:1}.shoprow .sn{font-weight:900;font-size:13px}.shoprow .sd{font-size:11px;color:var(--sub);margin-top:3px}.shoprow .sp{font-size:13px;font-weight:800;color:var(--gold);margin-top:4px}
.buybtn{padding:10px 16px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:var(--rsm);color:#000;font-weight:900;font-size:12px;cursor:pointer;min-height:44px;white-space:nowrap}
.buybtn.dis{background:#223;color:var(--sub);cursor:not-allowed}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:8px}
.si2{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.sb{width:100%;margin-top:5px;padding:7px 0;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:5px;color:#fff;font-weight:800;font-size:11px;cursor:pointer;min-height:36px}
#sab{width:100%;padding:11px;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:var(--rsm);color:#fff;font-weight:900;font-size:13px;cursor:pointer;min-height:44px}
.rt{width:100%;border-collapse:collapse;font-size:11px}
.rt td,.rt th{padding:6px 7px;border-bottom:1px solid var(--border)}
.rt tr:last-child td{border-bottom:none}.rt tr:nth-child(odd){background:rgba(255,255,255,.02)}
.es{text-align:center;padding:26px 20px;color:var(--sub)}.es .ei{font-size:36px;margin-bottom:9px}.es p{font-size:12px;line-height:1.6}
.r1{color:#88aacc}.r2{color:#a29bfe}.r3{color:#fdcb6e}.r4{color:#e17055}.r5{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6)}
.r6{color:#ff6fff;text-shadow:0 0 10px rgba(255,0,255,.7);animation:rainbow .8s infinite}
@keyframes rainbow{0%{color:#ff6fff}25%{color:#ffff00}50%{color:#00ffff}75%{color:#ff8800}100%{color:#ff6fff}}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:18px}
#loading h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent)}
#loadbar{width:240px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;width:0;transition:width .4s ease}
#loadtxt{font-size:11px;color:var(--sub);font-weight:700}
#autherr{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;padding:24px}
#autherr h2{font-family:'Press Start 2P',monospace;font-size:11px;color:#e74c3c;text-align:center}
#autherr .ae-reason{font-size:14px;font-weight:900;color:var(--gold);text-align:center}
#autherr p{font-size:12px;color:var(--sub);text-align:center;max-width:340px;line-height:1.6}
#ae-detail{font-family:monospace;font-size:10px;color:#7a90a8;background:rgba(15,32,53,.7);border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-width:360px;word-break:break-all;line-height:1.5;text-align:left;white-space:pre-wrap}
#autherr .ae-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ae-btn{padding:11px 18px;border:none;border-radius:var(--rsm);font-weight:900;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif}
.ae-btn.demo{background:linear-gradient(135deg,#1a8f4a,#00e676);color:#000}
.ae-btn.retry{background:rgba(0,212,255,.18);border:1px solid var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:18px;padding:9px 18px;font-size:12px;font-weight:800;color:var(--text);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#demo-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.2);border:1px solid var(--online);border-radius:14px;padding:2px 10px;font-size:9px;font-weight:800;color:var(--online);z-index:7;display:none}
#sync-status{position:absolute;bottom:8px;right:8px;font-size:9px;font-weight:800;z-index:6;padding:3px 8px;border-radius:10px;background:rgba(0,0,0,.5);color:#2ecc71}
@media(max-width:520px){#hdr h1{font-size:8px}#cd{font-size:13px}.mb{font-size:10px;padding:5px 10px}#cb{font-size:7px}#chatbox{width:155px}}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── GIANT FISH ANIMATION ── */
#fish-rise{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:15;display:none;flex-direction:column;align-items:center;gap:0}
#fish-emoji-big{font-size:80px;line-height:1;filter:drop-shadow(0 0 20px gold);animation:fishJump 2s ease-in-out}
@keyframes fishJump{0%{transform:translateY(80px) scale(.2);opacity:0}30%{transform:translateY(-30px) scale(1.3);opacity:1}60%{transform:translateY(10px) scale(1)}80%{transform:translateY(-10px) scale(1.05)}100%{transform:translateY(0) scale(1)}}
#fish-splash{font-size:36px;animation:splashAnim 1.5s ease-out;opacity:0}
@keyframes splashAnim{0%{opacity:1;transform:scale(.5)}50%{opacity:.8;transform:scale(1.5)}100%{opacity:0;transform:scale(2)}}
#fish-size-badge{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;font-weight:900;font-size:12px;padding:3px 10px;border-radius:12px;white-space:nowrap;box-shadow:0 0 20px rgba(255,200,0,.6)}

/* ── WATER SPLASH EFFECT ── */
#splash-overlay{position:absolute;inset:0;pointer-events:none;z-index:14;overflow:hidden}
.splash-drop{position:absolute;border-radius:50%;background:rgba(100,200,255,.7);animation:dropFall 1s ease-in forwards}
@keyframes dropFall{0%{transform:translateY(-20px) scale(1);opacity:.8}100%{transform:translateY(60px) scale(.1);opacity:0}}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:52px">🎣</div>
  <h2>CÂU CÁ ONLINE</h2>
  <div id="loadbar"><div id="loadfill"></div></div>
  <div id="loadtxt">Đang kết nối Firebase...</div>
</div>
<div id="autherr">
  <div style="font-size:56px">🔒</div>
  <h2>KHÔNG VÀO ĐƯỢC</h2>
  <div class="ae-reason" id="ae-reason">Phiên hết hạn</div>
  <p id="ae-msg">Dùng lệnh <strong>tcauonline</strong> trong Discord để lấy link mới!</p>
  <div id="ae-detail"></div>
  <div class="ae-btns">
    <button class="ae-btn retry" onclick="location.reload()">🔄 Thử lại</button>
    <button class="ae-btn demo" onclick="startDemo()">🎮 Chơi thử (Demo)</button>
  </div>
</div>
<div id="game">
  <div id="hdr">
    <h1>🎣 CÂU CÁ ONLINE</h1>
    <div id="hdr-right">
      <div id="online-pill"><span id="online-count">0</span> online</div>
      <div id="cd">🪙 <span id="ct">--</span></div>
    </div>
  </div>
  <div id="maps">
    <button class="mb on" onclick="selMap(0)">🏡 Hồ Làng</button>
    <button class="mb" onclick="selMap(1)">🌊 Biển Nhiệt Đới</button>
    <button class="mb" onclick="selMap(2)">🏔️ Sông Núi Băng</button>
    <button class="mb" onclick="selMap(3)">🌑 Vực Đại Dương</button>
  </div>
  <div id="cw">
    <canvas id="gc" width="900" height="480"></canvas>
    <div id="vig"></div>
    <div id="xhair"></div>
    <div id="st"></div>
    <div id="map-name"></div>
    <div id="map-fish-hint"></div>
    <div id="demo-badge">🎮 CHẾ ĐỘ DEMO</div>
    <button id="snd" onclick="toggleSound()">🔊</button>
    <div id="bf"></div>
    <div id="rb">
      <div class="rem" id="rem"></div>
      <div id="fish-size-badge" style="display:none"></div>
      <div class="rn" id="rn"></div>
      <div class="rv" id="rv"></div>
      <div class="rr" id="rr"></div>
      <div class="rsz" id="rsz"></div>
    </div>
    <div id="fish-rise">
      <div id="fish-emoji-big"></div>
      <div id="fish-splash">💦</div>
    </div>
    <div id="splash-overlay"></div>
    <div id="wb"><div id="wbf"></div></div>
    <div id="players-overlay"></div>
    <div id="notifs"></div>
    <div id="chatbox">
      <div id="chatlog"></div>
      <div id="chatinput-row">
        <input id="chatinput" placeholder="Chat..." maxlength="80" onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chatsend" onclick="sendChat()">→</button>
      </div>
    </div>
    <div id="sync-status">✓ Đã đồng bộ</div>
  </div>
  <div id="act">
    <button id="cb" disabled onclick="handleCast()">⏳ Đang tải...</button>
    <div id="ri"><span class="us" id="ut">0</span>lần còn</div>
  </div>
  <div id="tabs">
    <button class="tb on" onclick="swTab('bag')">🎒 Túi</button>
    <button class="tb" onclick="swTab('shop')">🏪 Shop</button>
    <button class="tb" onclick="swTab('sell')">💰 Bán</button>
    <button class="tb" onclick="swTab('rates')">📊 Tỉ Lệ</button>
  </div>
  <div id="cp"></div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyA9Iv98Bcurd6bqXo79BbgEz58a3xrPH8o",
  authDomain:        "fishing-bot-e8d42.firebaseapp.com",
  databaseURL:       "https://fishing-bot-e8d42-default-rtdb.firebaseio.com",
  projectId:         "fishing-bot-e8d42",
  storageBucket:     "fishing-bot-e8d42.firebasestorage.app",
  messagingSenderId: "404799504673",
  appId:             "1:404799504673:web:6128427eae7b29729cbe60"
};
const GAME_SECRET = 'datBatKyChuan123';

// ═══════════════════════════════════════════════════════════
// MAP DEFINITIONS — mỗi map có cảnh và cá riêng
// ═══════════════════════════════════════════════════════════
const MAP_DEFS = [
  {
    id: 'ho_lang',
    name: '🏡 Hồ Làng Quê',
    desc: 'Hồ nước ngọt yên bình. Cá nước ngọt phổ biến.',
    hint: 'Cá Mồi · Cá Trắm · Cá Chép · Cá Vàng',

// Lấy cá theo fishPool
function getFishList(mapIdx) {
  return MAP_DEFS[mapIdx].fishPool.map(id => ALL_FISH[id]);
}

// Roll cá theo map
function rollFishForMap(mapIdx) {
  const mapDef = MAP_DEFS[mapIdx];
  const rates = mapDef.fishRates;
  const r = Math.random() * 100;
  let c = rates.miss || 30;
  if (r < c) return null;
  for (const id of mapDef.fishPool) {
    c += (rates[id] || 0);
    if (r < c) return ALL_FISH[id];
  }
  return null;
}

// Random cân nặng
function rollWeight(fish) {
  const w = fish.minW + Math.random() * (fish.maxW - fish.minW);
  return Math.round(w * 10) / 10;
}

function fmtWeight(w) {
  if (w >= 1000) return (w/1000).toFixed(1) + ' tấn';
  if (w >= 1) return w.toFixed(1) + ' kg';
  return Math.round(w * 1000) + ' g';
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script'); s.src = src; s.async = false;
    s.onload = () => res(src); s.onerror = () => rej(new Error('Không tải: ' + src));
    document.head.appendChild(s);
  });
}
async function loadFromCDN(base) {
  await loadScript(base + 'firebase-app-compat.js');
  await loadScript(base + 'firebase-database-compat.js');
}
async function bootFirebase() {
  setLoad('Tải thư viện Firebase...', 8);
  const CDNS = ['https://www.gstatic.com/firebasejs/10.11.0/','https://cdn.jsdelivr.net/npm/firebase@10.11.0/','https://unpkg.com/firebase@10.11.0/'];
  if (typeof firebase === 'undefined') {
    let ok = false, lastErr = null;
    for (const base of CDNS) {
      try { await loadFromCDN(base); if (typeof firebase !== 'undefined') { ok = true; break; } } catch(e) { lastErr = e; }
    }
    if (!ok) { showAuthError('Không tải được Firebase','Mạng đang chặn CDN.',String(lastErr?.message||lastErr)); return; }
  }
  try { firebase.initializeApp(firebaseConfig); DB = firebase.database(); } catch(e) { showAuthError('Lỗi khởi tạo Firebase','',String(e?.message||e)); return; }
  initAuth();
}

const URL_TOKEN = new URLSearchParams(window.location.search).get('t');
async function readSessionWithRetry(token, max=5) {
  for (let i=0; i<max; i++) {
    try { const snap = await DB.ref(`sessions/${token}`).once('value'); if (snap.val()) return { session:snap.val(), error:null }; await new Promise(r=>setTimeout(r,1000)); }
    catch(e) { await new Promise(r=>setTimeout(r,1000)); if(i===max-1) return { session:null, error:e }; }
  }
  return { session:null, error:null };
}
async function initAuth() {
  setLoad('Xác thực tài khoản...', 20);
  if (!URL_TOKEN) { showAuthError('Thiếu token','URL không có ?t=...',''); return; }
  await new Promise(r=>setTimeout(r,600));
  const { session, error } = await readSessionWithRetry(URL_TOKEN);
  if (error) { showAuthError('Lỗi đọc Firebase','',String(error.message||error)); return; }
  if (!session) { showAuthError('Không tìm thấy session','sessions/'+URL_TOKEN+' = null','Bot phải ghi sessions trước khi gửi link.'); return; }
  if (!session.expiresAt || Date.now() > session.expiresAt) { showAuthError('Session đã hết hạn','Dùng tcauonline để lấy link mới.',''); return; }
  if (session.secret !== GAME_SECRET) { showAuthError('Secret không khớp','','Bot: "'+session.secret+'" | Web cần: "'+GAME_SECRET+'"'); return; }
  setLoad('Tải dữ liệu người chơi...', 40);
  player.userId = session.userId; player.username = session.username; player.avatar = session.avatar || '';
  try {
    const pSnap = await DB.ref(`players/${session.userId}`).once('value');
    const pData = pSnap.val();
    if (pData) {
      player.coins = pData.coins ?? session.coins ?? 0;
      player.rodUses = pData.rodUses ?? session.rodUses ?? 0;
      player.inventory = pData.inventory ?? session.inventory ?? {};
      player.totalCaught = pData.totalCaught ?? 0;
      player.totalEarned = pData.totalEarned ?? 0;
    } else {
      player.coins = session.coins ?? 0; player.rodUses = session.rodUses ?? 0;
      player.inventory = session.inventory ?? {};
      await writePlayerImmediate();
    }
  } catch(e) { player.coins = session.coins ?? 0; player.rodUses = session.rodUses ?? 0; player.inventory = session.inventory ?? {}; }
  startGame(true);
}

function setSyncStatus(state) {

  if (state==='err')    { el.textContent='✗ Lỗi lưu';     el.style.color='#e74c3c'; }
}
async function writePlayerImmediate() {
  if (DEMO || !DB || !player.userId) return;
  setSyncStatus('saving');
  try {
    await DB.ref(`players/${player.userId}`).update({
      coins: player.coins, rodUses: player.rodUses,
      inventory: player.inventory,
      totalCaught: player.totalCaught, totalEarned: player.totalEarned,
      webUpdatedAt: Date.now(), updatedAt: Date.now(),
    });
    setSyncStatus('ok');
  } catch(e) { console.error('[Save]', e); setSyncStatus('err'); }
}
function scheduleSave(delayMs=800) {
  pendingSave = true; setSyncStatus('saving');
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(async () => { await writePlayerImmediate(); pendingSave = false; }, delayMs);
}
function flushSaveOnExit() {
  if (DEMO || !player.userId || (!pendingSave && saveDebounceTimer === null)) return;
  try {
    const url = firebaseConfig.databaseURL.replace(/\/+$/,'')+`/players/${player.userId}.json`;
    fetch(url,{method:'PATCH',keepalive:true,headers:{'Content-Type':'application/json'},body:JSON.stringify({coins:player.coins,rodUses:player.rodUses,inventory:player.inventory,totalCaught:player.totalCaught,totalEarned:player.totalEarned,webUpdatedAt:Date.now(),updatedAt:Date.now()})}).catch(()=>{});
  } catch(e) {}
}

function paintSky(config){
  const c=document.createElement('canvas');const cx=c.getContext('2d');c.width=2048;c.height=1024;
  const g=cx.createLinearGradient(0,0,0,600);config.sky.forEach(([s,col])=>g.addColorStop(s,col));cx.fillStyle=g;cx.fillRect(0,0,2048,1024);
  if(config.sun){const sg=cx.createRadialGradient(config.sun.x,config.sun.y,5,config.sun.x,config.sun.y,config.sun.r);sg.addColorStop(0,config.sun.color+'ee');sg.addColorStop(.4,config.sun.color+'55');sg.addColorStop(1,config.sun.color+'00');cx.fillStyle=sg;cx.beginPath();cx.arc(config.sun.x,config.sun.y,config.sun.r,0,Math.PI*2);cx.fill();}
  if(config.clouds){config.clouds.forEach(([cx2,cy,w,h])=>{cx.fillStyle='rgba(255,255,255,.55)';cx.beginPath();cx.ellipse(cx2,cy,w*.5,h*.5,0,0,Math.PI*2);cx.fill();cx.beginPath();cx.ellipse(cx2+w*.25,cy-h*.12,w*.36,h*.44,0,0,Math.PI*2);cx.fill();});}

}

  const label=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(tc),transparent:true}));label.scale.set(1.3,.26,1);label.position.y=1.32;grp.add(label);
  const oBob=new THREE.Group();scene.add(oBob);oBob.visible=false;
  oBob.add(new THREE.Mesh(new THREE.SphereGeometry(.09,8,6,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0xe74c3c,roughness:.52})));
  oBob.add(new THREE.Mesh(new THREE.SphereGeometry(.09,8,6,0,Math.PI*2,Math.PI/2,Math.PI/2),new THREE.MeshStandardMaterial({color:0xffffff,roughness:.6})));
  const oLArr=new Float32Array(LPTS*3);

function syncOtherPlayer3D(others){
  const seen=new Set();
  for(const[id,pData]of others){
    seen.add(id);
    if(pData.mapIndex!==curMap){if(otherPlayers.has(id))otherPlayers.get(id).mesh.grp.visible=false;continue;}
    if(!otherPlayers.has(id)){const mesh=buildOtherPlayerMesh(id,pData.username);otherPlayers.set(id,{mesh,data:pData});}
    const entry=otherPlayers.get(id);entry.data=pData;const{mesh}=entry;
    mesh.grp.visible=true;
    const hash=parseInt(id.slice(-6),16);const angle=(hash/0xffffff)*Math.PI*2;const dist=1.5+(parseInt(id.slice(-2),16)/255)*1.8;
    mesh.grp.position.set(Math.cos(angle)*dist,0,Math.sin(angle)*dist-1.5);
    if(pData.yaw!==undefined)mesh.grp.rotation.y=pData.yaw+Math.PI;
    const state=pData.state||'idle';
    if(state==='idle'||state==='result'){mesh.castProgress=Math.max(0,mesh.castProgress-.04);mesh.armR.rotation.x=THREE.MathUtils.lerp(mesh.armR.rotation.x,-.2,.1);mesh.forearm.rotation.x=THREE.MathUtils.lerp(mesh.forearm.rotation.x,.3,.1);mesh.oBob.visible=false;mesh.oLine.visible=false;}
    else if(state==='casting'){mesh.castProgress=Math.min(1,mesh.castProgress+.06);mesh.armR.rotation.x=THREE.MathUtils.lerp(mesh.armR.rotation.x,-1.4,.12);mesh.forearm.rotation.x=THREE.MathUtils.lerp(mesh.forearm.rotation.x,-.5,.1);mesh.oBob.visible=false;mesh.oLine.visible=false;}
    else if(state==='waiting'||state==='biting'){mesh.castProgress=1;mesh.armR.rotation.x=THREE.MathUtils.lerp(mesh.armR.rotation.x,-.6,.1);mesh.forearm.rotation.x=THREE.MathUtils.lerp(mesh.forearm.rotation.x,.4,.1);mesh.oBob.visible=true;mesh.oLine.visible=true;}
    else if(state==='reeling'){mesh.castProgress=Math.max(0,mesh.castProgress-.06);mesh.armR.rotation.x=THREE.MathUtils.lerp(mesh.armR.rotation.x,-1.0,.15);mesh.forearm.rotation.x=THREE.MathUtils.lerp(mesh.forearm.rotation.x,-.6,.12);}
  }
  for(const[id,entry]of otherPlayers){if(!seen.has(id)){scene.remove(entry.mesh.grp);scene.remove(entry.mesh.oBob);scene.remove(entry.mesh.oLine);otherPlayers.delete(id);}}
}

// ═══════════════════════════════════════════════════════════
// THREE INIT — ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
// Fish animation state
let fishRiseAnim = false;   // cá đang nổi lên
let fishRiseT = 0;           // 0→1
let fishTargetPos = new THREE.Vector3();
let fishJumpPhase = 'none'; // none | rising | peak | pulling

function initThree(){
  applyMap(0);
  let lineProgress=0,curRot=-.22;
  const RANG={idle:-.22,casting:-.94,waiting:-.52,biting:-.46,reeling:.34,result:-.22};
  const tipWP=new THREE.Vector3(),tmpWP=new THREE.Vector3();

  function waveY(x,z,t){
    return Math.sin(x*3.2+t*1.6)*.16+Math.sin(z*2.5-t*1.2)*.12+Math.sin((x+z)*1.8+t*.9)*.08+Math.sin(x*1.1-z*.8+t*2.2)*.045;
  }

  function updateOtherPlayerLines(t){
    for(const[,entry]of otherPlayers){
      const{mesh}=entry;if(!mesh.oBob.visible){mesh.oLine.visible=false;continue;}mesh.oLine.visible=true;
      const bx=mesh.grp.position.x+mesh.castDir.x*4*mesh.castProgress;
      const bz=mesh.grp.position.z+mesh.castDir.z*4*mesh.castProgress-3;
      const by=waveY(bx,bz,t)+.02;mesh.oBob.position.set(bx,by,bz);
      mesh.mTip.getWorldPosition(tmpWP);
      const pos=mesh.oLine.geometry.attributes.position.array;
      for(let i=0;i<LPTS;i++){const ft=i/(LPTS-1);pos[i*3]=tmpWP.x+(bx-tmpWP.x)*ft;pos[i*3+1]=tmpWP.y+(by-tmpWP.y)*ft+Math.sin(ft*Math.PI)*(-.4)*mesh.castProgress;pos[i*3+2]=tmpWP.z+(bz-tmpWP.z)*ft;}
      mesh.oLine.geometry.attributes.position.needsUpdate=true;
    }
  }

  function animate(ts){
    requestAnimationFrame(animate);
    const t=ts*.001;
    waterMat.uniforms.uT.value=t; skySph.rotation.y=t*.006;
    curRot+=((RANG[gstate]??RANG.idle)-curRot)*.09; fpRod.rotation.x=curRot;
    if(gstate==='casting') lineProgress=Math.min(lineProgress+.055,1);
    else if(gstate==='idle'||gstate==='result') lineProgress=Math.max(lineProgress-.09,0);

    // BOBBER
    if(gstate==='waiting'||gstate==='biting'){
      const wy=waveY(bobGrp.position.x,bobGrp.position.z,t);
      const dip=gstate==='biting'?Math.abs(Math.sin(t*5.5))*.32+.22:0;
      bobGrp.position.y=wy-dip;
      if(gstate==='biting'){bobLight.position.copy(bobGrp.position);bobLight.position.y+=.4;bobLight.intensity=.6+Math.sin(t*8.5)*.24;bobGrp.children[0].material.color.set(0xff1111);}
      else{bobLight.intensity=0;bobGrp.children[0].material.color.set(0xe74c3c);}
      const rp=(t*.65)%1;ripMesh.scale.set(1+rp*3.8,1+rp*3.8,1);ripMesh.material.opacity=(1-rp)*.40;
    } else bobLight.intensity=0;

    bobGrp.visible=lineProgress>.8&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');
    lineMesh.visible=lineProgress>.05;
    if(lineMesh.visible){
      tipObj.getWorldPosition(tipWP);
      const pos=lineMesh.geometry.attributes.position.array;
      for(let i=0;i<LPTS;i++){const ft=i/(LPTS-1);pos[i*3]=tipWP.x+(bobGrp.position.x-tipWP.x)*ft;pos[i*3+1]=tipWP.y+(bobGrp.position.y-tipWP.y)*ft+Math.sin(ft*Math.PI)*(-.52)*lineProgress;pos[i*3+2]=tipWP.z+(bobGrp.position.z-tipWP.z)*ft;}
      lineMesh.geometry.attributes.position.needsUpdate=true;
    }

    // ─── GIANT FISH ANIMATION ─────────────────────────
    if(fishRiseAnim && resultFish){
      fishRiseT=Math.min(fishRiseT+.018,1);
      const bx=bobGrp.position.x, bz=bobGrp.position.z;
      const px2=camera.position.x, pz=camera.position.z;

      if(fishJumpPhase==='rising'){
        // Cá trồi lên từ dưới nước, rất lớn
        const yOff=Math.sin(fishRiseT*Math.PI)*4.5; // vọt lên 4.5 đơn vị
        fishGrp.position.set(
          bx*(1-fishRiseT*0.3), waveY(bx,bz,t)+yOff, bz*(1-fishRiseT*0.3)
        );
        // Scale to = size của cá (tùy loại)
        const tScale = 0.3 + fishRiseT * 2.5;
        fishGrp.scale.set(tScale, tScale, tScale);
        fishGrp.rotation.y += .05;
        fishGrp.rotation.z = Math.sin(t * 8) * .15; // vẫy
        // Bong bóng
        bubbleGrp.children.forEach((bb,i)=>{
          const bo=bb.userData.offset;
          bb.position.set(Math.sin(t*3+bo)*.4,(fishRiseT*3+Math.sin(t*2+bo)*.3),Math.cos(t*2+bo)*.3);
        });
        // Sóng vòng
        wakeRings.forEach((wr,i)=>{
          wr.visible=fishRiseT>.2;
          const rp=((fishRiseT*2+i*.25)%1);wr.position.set(bx,waveY(bx,bz,t)+.02,bz);wr.scale.set(1+rp*8,1+rp*8,1);wr.material.opacity=(1-rp)*.5;
        });
        // Ánh sáng phát từ cá
        fishGlow.intensity=fishRiseT*2; fishGlow.color.set(resultFish.color);
        if(fishRiseT>=0.8) fishJumpPhase='pulling';
      } else if(fishJumpPhase==='pulling'){
        // Kéo về phía người chơi
        const pullT=(fishRiseT-0.8)*5; // 0→1 trong 20% cuối
        fishGrp.position.lerp(new THREE.Vector3(px2*.3, 0.5, pz*.3+0.8), pullT*.1);
        fishGrp.rotation.y += .08;
        fishGrp.rotation.z=Math.sin(t*12)*.3;
        if(pullT>=1||fishRiseT>=1){
          fishGrp.visible=false; fishRiseAnim=false;
          wakeRings.forEach(wr=>wr.visible=false);
          fishGlow.intensity=0;
        }
      }

      fbM.material.color.set(resultFish.color);
      ftM.material.color.set(resultFish.color);
      fFinM.material.color.set(resultFish.color);
    }

    updateOtherPlayerLines(t);
    if(gstate==='waiting'&&waitStart>0){
      const frac=Math.min((performance.now()-waitStart)/waitDur,1);
      const wbf=document.getElementById('wbf');wbf.style.width=(100-frac*100)+'%';wbf.style.background=frac>.7?'#ff5252':frac>.4?'#ffd660':'#00d4ff';
    } else document.getElementById('wbf').style.width='100%';

    renderer.render(scene,camera);
  }
  window._applyMap=applyMap; window._bobGrp=bobGrp;
  requestAnimationFrame(animate);
}

function handleCast(){
  if(gstate==='biting'){clearTimeout(bt);doReelIn();return;}
  if(gstate!=='idle'||!player.userId) return;
  if(player.rodUses<=0){showToast('❌ Mua cần câu ở Shop!');swTab('shop');return;}
  resultFish=null;resultWeight=0;hideBanner();gstate='casting';
  setStatus('🎣 Đang thả câu...');
  document.getElementById('cb').disabled=true;
  const fwd2=new THREE.Vector3();camera.getWorldDirection(fwd2);fwd2.y=0;fwd2.normalize();
  window._bobGrp.position.set(camera.position.x+fwd2.x*12,.05,camera.position.z+fwd2.z*12);
  updatePresence('casting');
  setTimeout(()=>{
    gstate='waiting';setStatus('⏳ Đang chờ cá cắn...');
    const mapName=MAP_DEFS[curMap].name;setStatus(`⏳ Chờ cá ở ${mapName}...`);
    waitDur=3000+Math.random()*8000;waitStart=performance.now();
    updatePresence('waiting');wt=setTimeout(startBite,waitDur);
  },1200);
}

function startBite(){
  gstate='biting';setStatus('🐟 CÁ CẮN! CLICK KÉO!');
  const b=document.getElementById('cb');b.textContent='⚡ KÉO!';b.classList.add('bite');b.disabled=false;
  document.getElementById('bf').classList.add('on');
  updatePresence('biting');bt=setTimeout(fishEscape,3000);
}

async function doReelIn(){
  gstate='reeling';setStatus('');
  const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=true;
  document.getElementById('bf').classList.remove('on');
  player.rodUses--;updateUI();

  // Roll cá theo map hiện tại
  resultFish=rollFishForMap(curMap);
  resultWeight=resultFish?rollWeight(resultFish):0;
  updatePresence('reeling');

  if(resultFish){
    // Trigger GIANT FISH ANIMATION
    fishGrp.visible=true;fishGrp.scale.set(.1,.1,.1);
    fishGrp.position.copy(bobGrp.position);
    fishRiseT=0;fishRiseAnim=true;fishJumpPhase='rising';
    broadcastCatch(resultFish);
    // Tạo splash effect
    createSplashEffect();
    // Rung màn hình nhẹ nếu cá lớn
    if(resultWeight>50){
      document.getElementById('cw').style.animation='none';
      setTimeout(()=>{document.getElementById('cw').style.transform='translateX(3px)';setTimeout(()=>{document.getElementById('cw').style.transform='translateX(-3px)';setTimeout(()=>{document.getElementById('cw').style.transform='';},80);},80);},0);
    }
  }

  setTimeout(async()=>{
    gstate='result';showBanner(resultFish,resultWeight);
    if(resultFish){
      // Cộng cá vào inventory — lưu ngay để không bị mất
      if(!player.inventory[resultFish.id]) player.inventory[resultFish.id]=[];
      player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value,map:curMap});
      player.totalCaught++;
      showToast(`🎉 ${resultFish.emoji} ${resultFish.name} — ${fmtWeight(resultWeight)}!`);
    } else {
      showToast('😅 Không câu được gì...');
    }
    // ── SAVE NGAY sau khi câu ──────────────────────────
    await writePlayerImmediate();
    updateUI();renderContent();

    setTimeout(()=>{
      gstate='idle';hideBanner();updatePresence('idle');
      const noRod=player.rodUses<=0;
      setStatus(noRod?'🏪 Hết cần! Mua thêm.':'🎣 Nhấn THẢ CÂU để tiếp tục!');
      const btn=document.getElementById('cb');btn.disabled=false;
      btn.textContent=noRod?'🏪 MUA CẦN':'🎣 THẢ CÂU';
    },2800);
  },1600);
}

function fishEscape(){
  gstate='idle';setStatus('😔 Cá thoát! Kéo nhanh hơn!');
  const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=false;
  document.getElementById('bf').classList.remove('on');
  updatePresence('idle');showToast('😔 Cá trốn mất!');
}

// ── Tạo giọt nước splash ──────────────────────────────────
function createSplashEffect(){
  const overlay=document.getElementById('splash-overlay');
  for(let i=0;i<14;i++){
    const drop=document.createElement('div');drop.className='splash-drop';
    const cx2=35+Math.random()*30,cy=35+Math.random()*30;
    const size=4+Math.random()*8;
    drop.style.cssText=`left:${cx2}%;top:${cy}%;width:${size}px;height:${size}px;animation-delay:${Math.random()*.3}s;animation-duration:${.6+Math.random()*.4}s`;
    overlay.appendChild(drop);setTimeout(()=>drop.remove(),1500);
  }
}

// ── MUA CẦN ──────────────────────────────────────────────
async function buyRod(qty){
  qty=Math.min(parseInt(qty)||1,100);const cost=ROD_PRICE*qty;
  if(player.coins<cost){showToast('❌ Không đủ xu!');return;}
  player.coins-=cost;player.rodUses+=ROD_USES*qty;
  updateUI();renderContent();showToast(`✅ Mua ${qty} cần! +${ROD_USES*qty} lần câu`);
  await writePlayerImmediate();
  if(gstate==='idle'){document.getElementById('cb').textContent='🎣 THẢ CÂU';setStatus('🎣 Nhấn THẢ CÂU!');}
}

// ── BÁN CÁ — FIX: xóa cá khỏi inventory NGAY và lưu ──────
async function sellFish(id,idx){
  const arr=player.inventory[id];
  if(!arr||!arr.length) return;
  const fish=ALL_FISH[id];
  let got=0;
  if(idx==='all'){
    got=arr.reduce((s,e)=>s+e.value,0);
    player.coins+=got;player.totalEarned+=got;
    delete player.inventory[id];  // xóa hẳn
  } else {
    const entry=arr[idx];if(!entry)return;
    got=entry.value;player.coins+=got;player.totalEarned+=got;
    arr.splice(idx,1);
    if(arr.length===0) delete player.inventory[id];  // xóa hẳn nếu hết
  }
  updateUI();
  renderContent();
  showToast(`💰 +${fmt(got)} 🪙 — ${fish.emoji} đã bán!`);
  // ── SAVE NGAY, không debounce ──
  await writePlayerImmediate();
}

async function sellAll(){
  const keys=Object.keys(player.inventory);
  if(!keys.length){showToast('❌ Túi cá trống!');return;}
  let total=0;
  for(const[id,arr] of Object.entries(player.inventory)){
    total+=arr.reduce((s,e)=>s+e.value,0);
  }
  player.coins+=total;player.totalEarned+=total;
  player.inventory={};  // xóa hết
  updateUI();renderContent();showToast(`💰 Bán tất cả → +${fmt(total)} 🪙!`);
  // ── SAVE NGAY ──
  await writePlayerImmediate();
}

function fmt(n){
  if(n>=1e9)return(n/1e9).toFixed(1).replace(/\.0$/,'')+'B';
  if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return n.toLocaleString('vi-VN');
}
function setStatus(m){document.getElementById('st').textContent=m;}
function updateUI(){document.getElementById('ct').textContent=fmt(player.coins);document.getElementById('ut').textContent=player.rodUses>0?player.rodUses:'0';}

function updateMapUI(){

}

function renderContent(){

    const inv=player.inventory;
    const keys=Object.keys(inv).filter(k=>inv[k]&&inv[k].length>0);
    if(!keys.length){p.innerHTML=`<div class="stl">🎒 TÚI CÁ</div><div class="es"><div class="ei">🎣</div><p>Túi trống. Thả câu bắt cá!<br><small>Mỗi map có cá khác nhau!</small></p></div>`;return;}
    let h=`<div class="stl">🎒 TÚI CÁ — ${invCount(inv)} con</div><div class="ig">`;
    for(const id of keys){
      const fish=ALL_FISH[id];if(!fish)continue;
      const arr=inv[id];const cnt=arr.length;
      const hc='#'+fish.color.toString(16).padStart(6,'0');
      const maxW=Math.max(...arr.map(e=>e.value));
      const totalVal=arr.reduce((s,e)=>s+e.value,0);
      h+=`<div class="ii" style="border-color:${hc}40"><div class="fe">${fish.emoji}</div><div class="fn">${fish.name}</div><div class="fc">×${cnt} con | Map ${fish.map+1}</div><div class="fv"><span class="${fish.rc}">${fish.rar}</span></div><div class="fv" style="color:var(--gold)">${fmt(totalVal)}🪙</div></div>`;
    }
    p.innerHTML=h+'</div>';return;
  }

  // ── SHOP ──────────────────────────────────────────────
  if(activeTab==='shop'){
    const ok=player.coins>=ROD_PRICE;
    p.innerHTML=`<div class="stl">🏪 CỬA HÀNG</div>
      <div class="shoprow"><div style="font-size:38px">🎣</div>
        <div class="si"><div class="sn">Cần Câu Đồng</div><div class="sd">Câu được ${ROD_USES} lần</div><div class="sp">${fmt(ROD_PRICE)} 🪙</div></div>
        <button class="buybtn ${ok?'':'dis'}" onclick="${ok?'buyRod(1)':'void 0'}">${ok?'MUA 1':'THIẾU XU'}</button></div>
      ${player.coins>=ROD_PRICE*5?`<div class="shoprow"><div style="font-size:38px">🎣</div><div class="si"><div class="sn">Gói 5 Cần Câu</div><div class="sd">+${ROD_USES*5} lần câu</div><div class="sp">${fmt(ROD_PRICE*5)} 🪙</div></div><button class="buybtn" onclick="buyRod(5)">MUA 5</button></div>`:''}
      <div style="padding:9px;background:rgba(15,32,53,.8);border-radius:var(--rsm);font-size:11px;color:var(--sub)">
        💰 <strong style="color:var(--gold)">${fmt(player.coins)} 🪙</strong> | 🎣 <strong style="color:var(--accent)">${player.rodUses}</strong> lần còn
      </div>
      <div style="margin-top:8px;padding:8px;background:rgba(0,180,100,.08);border:1px solid rgba(0,200,120,.2);border-radius:var(--rsm);font-size:10px;color:#88ddaa">
        💡 Mỗi map có cá riêng! Chọn map ở trên để câu cá khác nhau.
      </div>`;return;
  }

  // ── BÁN CÁ ────────────────────────────────────────────
  if(activeTab==='sell'){
    const inv=player.inventory;
    const keys=Object.keys(inv).filter(k=>inv[k]&&inv[k].length>0);
    if(!keys.length){p.innerHTML=`<div class="stl">💰 BÁN CÁ</div><div class="es"><div class="ei">🐟</div><p>Không có cá. Hãy đi câu trước!</p></div>`;return;}
    const total=invValue(inv);const totalCnt=invCount(inv);
    let h=`<div class="stl">💰 BÁN CÁ — ${totalCnt} con</div><div class="sg">`;
    for(const id of keys){
      const fish=ALL_FISH[id];if(!fish)continue;
      const arr=inv[id];const cnt=arr.length;
      const hc='#'+fish.color.toString(16).padStart(6,'0');
      const tv=arr.reduce((s,e)=>s+e.value,0);
      const maxW=Math.max(...arr.map(()=>0))||0;
      h+=`<div class="si2" style="border-color:${hc}40">
        <div style="font-size:34px">${fish.emoji}</div>
        <div style="font-weight:800;font-size:12px;margin:3px 0">${fish.name}</div>
        <div style="font-size:10px;color:var(--sub)">×${cnt} con</div>
        <div style="font-size:11px;color:var(--gold);font-weight:800;margin:2px 0 4px">${fmt(tv)}🪙</div>
        <button class="sb" onclick="sellFish('${id}','all')">BÁN TẤT CẢ</button>
      </div>`;
    }
    h+=`</div><div style="text-align:right;font-size:12px;font-weight:800;color:var(--gold);margin-bottom:7px">Tổng: +${fmt(total)} 🪙 (${totalCnt} con)</div>
       <button id="sab" onclick="sellAll()">💰 BÁN TẤT CẢ → +${fmt(total)} 🪙</button>`;
    p.innerHTML=h;return;
  }

  // ── TỈ LỆ THEO MAP ────────────────────────────────────
  if(activeTab==='rates'){
    const m=MAP_DEFS[curMap];
    let h=`<div class="stl">📊 TỈ LỆ — ${m.name}</div>
      <table class="rt">
        <tr style="background:rgba(15,32,53,.8)"><th>Cá</th><th>Độ Hiếm</th><th>Tỉ Lệ</th><th>Giá/con</th><th>Cân nặng</th></tr>
        <tr><td>💨 Hụt</td><td>—</td><td>${m.fishRates.miss}%</td><td>—</td><td>—</td></tr>`;
    for(const id of m.fishPool){
      const f=ALL_FISH[id];const rate=m.fishRates[id]||0;
      h+=`<tr><td>${f.emoji} ${f.name}</td><td><span class="${f.rc}">${f.rar}</span></td><td>${rate}%</td><td style="color:var(--gold);font-weight:800">${fmt(f.value)}🪙</td><td style="font-size:10px;color:#88aacc">${fmtWeight(f.minW)}–${fmtWeight(f.maxW)}</td></tr>`;
    }
    h+=`</table><div style="margin-top:8px;font-size:10px;color:var(--sub);text-align:center">Đổi map để xem tỉ lệ map khác!</div>`;
    p.innerHTML=h;return;
  }
}

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let audioCtx=null,soundOn=false,masterGain=null;
function initAudio(){
  if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=.13;masterGain.connect(audioCtx.destination);
  for(let l=0;l<3;l++){
    const dur=audioCtx.sampleRate*(4+l),buf=audioCtx.createBuffer(1,dur,audioCtx.sampleRate),data=buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<dur;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;data[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.09));b6=w*.115926;}
    const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    const flt=audioCtx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=140+l*300;flt.Q.value=.75;
    const g=audioCtx.createGain();g.gain.value=.36-l*.08;
    const lfo=audioCtx.createOscillator();lfo.frequency.value=.16+l*.12;
    const lg=audioCtx.createGain();lg.gain.value=.035;
    lfo.connect(lg);lg.connect(g.gain);lfo.start();
    src.connect(flt);flt.connect(g);g.connect(masterGain);src.start(0,Math.random()*3);
  }
  soundOn=true;document.getElementById('snd').textContent='🔊';
}
function toggleSound(){if(!audioCtx){initAudio();return;}soundOn=!soundOn;if(masterGain)masterGain.gain.value=soundOn?.13:0;document.getElementById('snd').textContent=soundOn?'🔊':'🔇';}
document.addEventListener('click',()=>{if(!audioCtx)initAudio();},{once:true});

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
bootFirebase();
</script>
