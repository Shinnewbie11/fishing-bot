<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>🎣 Câu Cá Online</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;
  --gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px;--rsm:7px;--online:#2ecc71
}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden;-webkit-user-select:none;user-select:none}
#game{width:100%;max-width:900px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.4)}
#hdr-right{display:flex;align-items:center;gap:8px}
#cd{display:flex;align-items:center;gap:4px;font-weight:900;font-size:15px;color:var(--gold)}
#online-pill{display:flex;align-items:center;gap:4px;background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--online)}
#online-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--online);box-shadow:0 0 6px var(--online);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto;scrollbar-width:none}
#maps::-webkit-scrollbar{display:none}
.mb{flex:0 0 auto;padding:6px 13px;background:rgba(10,25,45,.8);border:2px solid var(--border);border-radius:16px;color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;transition:all .2s;white-space:nowrap}
.mb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
#cw{position:relative;width:100%;background:#000;overflow:hidden}
#gc{width:100%;height:auto;display:block;cursor:grab;touch-action:none}
#gc:active{cursor:grabbing}
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.72) 100%);pointer-events:none;z-index:2}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.6);border-radius:1px}
#xhair::before{width:1px;height:16px;left:50%;top:-4px;transform:translateX(-50%)}
#xhair::after{width:16px;height:1px;top:50%;left:-4px;transform:translateY(-50%)}
#st{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000;pointer-events:none;z-index:6;white-space:nowrap;text-align:center;line-height:1.6}
#snd{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:800;cursor:pointer;z-index:6;color:rgba(255,255,255,.7)}
#bf{position:absolute;inset:0;background:rgba(255,60,0,.15);pointer-events:none;opacity:0;z-index:3}
#bf.on{animation:bflash .28s infinite}
@keyframes bflash{0%,100%{opacity:.1}50%{opacity:.55}}
#map-name{position:absolute;top:10px;left:10px;font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;pointer-events:none;z-index:6;background:rgba(0,0,0,.4);border-radius:6px;padding:4px 8px;border:1px solid rgba(255,255,255,.15)}
#map-fish-hint{position:absolute;top:38px;left:10px;font-size:9px;font-weight:800;pointer-events:none;z-index:6;background:rgba(0,0,0,.5);border-radius:6px;padding:3px 8px;border:1px solid rgba(255,255,255,.1);color:var(--sub);max-width:160px}
#rb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(4,12,28,.97);border:2px solid var(--gold);border-radius:var(--rad);padding:16px 24px;text-align:center;min-width:200px;pointer-events:none;z-index:12;backdrop-filter:blur(10px);box-shadow:0 0 40px rgba(0,0,0,.8)}
#rb.show{animation:rpop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rpop{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg)}70%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
#rb .rem{font-size:56px;line-height:1.1;filter:drop-shadow(0 0 12px currentColor)}
#rb .rn{font-weight:900;font-size:16px;margin:6px 0 3px}
#rb .rv{font-size:13px;font-weight:700;color:var(--gold)}
#rb .rr{font-size:11px;margin-top:3px}
#rb .rsz{font-size:10px;margin-top:2px;color:#88aacc}
#wb{position:absolute;bottom:0;left:0;right:0;height:4px;pointer-events:none;z-index:5}
#wbf{height:100%;width:100%;box-shadow:0 0 8px rgba(0,212,255,.5);transition:none}
#players-overlay{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:8;pointer-events:none;max-width:155px}
.po{display:flex;align-items:center;gap:5px;background:rgba(4,12,28,.78);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 8px;backdrop-filter:blur(4px)}
.po img{width:18px;height:18px;border-radius:50%}
.po .pn{font-size:9px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.po .ps{font-size:8px;margin-left:2px}
.ps-idle{color:#5a7a9a}.ps-casting{color:#f39c12}.ps-waiting{color:#00d4ff}.ps-biting{color:#e74c3c;animation:blink .4s infinite}.ps-reeling{color:#2ecc71}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#notifs{position:absolute;bottom:50px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:9;pointer-events:none}
.notif{background:rgba(4,12,28,.88);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:6px 10px;font-size:10px;font-weight:800;animation:slideIn .3s ease,fadeOut .4s 3.6s forwards;backdrop-filter:blur(4px)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}
#chatbox{position:absolute;bottom:42px;left:8px;width:210px;z-index:8}
#chatlog{display:flex;flex-direction:column;gap:3px;max-height:85px;overflow:hidden;justify-content:flex-end}
.chatmsg{background:rgba(4,12,28,.75);border-radius:8px;padding:4px 8px;font-size:9px;animation:fadeMsg 9s forwards}
.chatmsg strong{color:var(--accent)}
@keyframes fadeMsg{0%,80%{opacity:1}100%{opacity:0}}
#chatinput-row{display:flex;gap:4px;margin-top:4px}
#chatinput{flex:1;background:rgba(8,20,36,.9);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:9px;font-weight:700;color:var(--text);outline:none;font-family:'Nunito',sans-serif}
#chatinput:focus{border-color:var(--accent)}
#chatsend{padding:4px 8px;background:rgba(0,212,255,.2);border:1px solid var(--accent);border-radius:8px;font-size:9px;font-weight:800;color:var(--accent);cursor:pointer}
#act{display:flex;gap:7px;padding:8px;background:rgba(6,16,31,.98);border-top:1px solid var(--border)}
#cb{flex:1;padding:13px;font-family:'Press Start 2P',monospace;font-size:9px;background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 3px 18px rgba(0,180,255,.35);min-height:50px}
#cb:hover:not(:disabled){transform:translateY(-1px)}
#cb:disabled{opacity:.4;cursor:not-allowed;transform:none}
#cb.bite{background:linear-gradient(135deg,#8a0000,#dd0000);animation:bp .22s infinite;box-shadow:0 3px 22px rgba(200,0,0,.7)}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
#ri{padding:8px 12px;background:rgba(10,25,45,.9);border:1px solid var(--border);border-radius:var(--rad);font-size:10px;color:var(--sub);text-align:center;min-width:78px;display:flex;flex-direction:column;justify-content:center}
#ri .us{font-weight:900;font-size:22px;color:var(--accent);display:block;line-height:1.2}
#tabs{display:flex;background:rgba(8,20,36,.98);border-top:1px solid var(--border)}
.tb{flex:1;padding:11px 5px;background:none;border:none;border-right:1px solid var(--border);color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;transition:all .2s;min-height:44px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:rgba(8,20,36,.98);border-top:1px solid var(--border);padding:11px;min-height:155px}
.stl{font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.ii{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.ii .fe{font-size:36px;line-height:1}.ii .fn{font-size:12px;font-weight:800;margin:3px 0 2px}.ii .fc{font-size:10px;color:var(--sub)}.ii .fv{font-size:10px;margin-top:2px}.ii .fsz{font-size:9px;color:#88aacc;margin-top:1px}
.shoprow{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.shoprow .si{flex:1}.shoprow .sn{font-weight:900;font-size:13px}.shoprow .sd{font-size:11px;color:var(--sub);margin-top:3px}.shoprow .sp{font-size:13px;font-weight:800;color:var(--gold);margin-top:4px}
.buybtn{padding:10px 16px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:var(--rsm);color:#000;font-weight:900;font-size:12px;cursor:pointer;min-height:44px;white-space:nowrap}
.buybtn.dis{background:#223;color:var(--sub);cursor:not-allowed}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:8px}
.si2{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.sb{width:100%;margin-top:5px;padding:7px 0;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:5px;color:#fff;font-weight:800;font-size:11px;cursor:pointer;min-height:36px}
#sab{width:100%;padding:11px;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:var(--rsm);color:#fff;font-weight:900;font-size:13px;cursor:pointer;min-height:44px}
.rt{width:100%;border-collapse:collapse;font-size:11px}
.rt td,.rt th{padding:6px 7px;border-bottom:1px solid var(--border)}
.rt tr:last-child td{border-bottom:none}.rt tr:nth-child(odd){background:rgba(255,255,255,.02)}
.es{text-align:center;padding:26px 20px;color:var(--sub)}.es .ei{font-size:36px;margin-bottom:9px}.es p{font-size:12px;line-height:1.6}
.r1{color:#88aacc}.r2{color:#a29bfe}.r3{color:#fdcb6e}.r4{color:#e17055}.r5{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6)}.r6{color:#ff6fff;text-shadow:0 0 10px rgba(255,0,255,.7);animation:rainbow .8s infinite}
@keyframes rainbow{0%{color:#ff6fff}25%{color:#ffff00}50%{color:#00ffff}75%{color:#ff8800}100%{color:#ff6fff}}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:18px}
#loading h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent)}
#loadbar{width:240px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;width:0;transition:width .4s ease}
#loadtxt{font-size:11px;color:var(--sub);font-weight:700}
#autherr{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;padding:24px}
#autherr h2{font-family:'Press Start 2P',monospace;font-size:11px;color:#e74c3c;text-align:center}
#autherr .ae-reason{font-size:14px;font-weight:900;color:var(--gold);text-align:center}
#autherr p{font-size:12px;color:var(--sub);text-align:center;max-width:340px;line-height:1.6}
#ae-detail{font-family:monospace;font-size:10px;color:#7a90a8;background:rgba(15,32,53,.7);border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-width:360px;word-break:break-all;line-height:1.5;text-align:left;white-space:pre-wrap}
#autherr .ae-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ae-btn{padding:11px 18px;border:none;border-radius:var(--rsm);font-weight:900;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif}
.ae-btn.demo{background:linear-gradient(135deg,#1a8f4a,#00e676);color:#000}
.ae-btn.retry{background:rgba(0,212,255,.18);border:1px solid var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:18px;padding:9px 18px;font-size:12px;font-weight:800;color:var(--text);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#demo-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.2);border:1px solid var(--online);border-radius:14px;padding:2px 10px;font-size:9px;font-weight:800;color:var(--online);z-index:7;display:none}
#sync-status{position:absolute;bottom:8px;right:8px;font-size:9px;font-weight:800;z-index:6;padding:3px 8px;border-radius:10px;background:rgba(0,0,0,.5);color:#2ecc71}
@media(max-width:520px){#hdr h1{font-size:8px}#cd{font-size:13px}.mb{font-size:10px;padding:5px 10px}#cb{font-size:7px}#chatbox{width:155px}}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═════ HIỆU ỨNG QUÁI VẬT FULL MÀN HÌNH ═════ */
#giant-monster-overlay{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at 50% 80%, #001525 0%, #000815 40%, #000008 100%);display:none;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;pointer-events:auto;touch-action:none;user-select:none}
#giant-monster-overlay.active{display:flex}
.water-break{position:absolute;bottom:0;left:0;width:100%;height:40vh;background:linear-gradient(to top,#003366 0%,#001a33 40%,transparent 100%);transform:translateY(100%);animation:waterRise 1.2s cubic-bezier(0.2,0.8,0.3,1) forwards}
@keyframes waterRise{to{transform:translateY(0)}}
.monster-container{position:relative;z-index:2;text-align:center;transform:translateY(60vh) scale(0.3);opacity:0;animation:monsterRise 2.5s cubic-bezier(0.15,0.85,0.25,1) 0.8s forwards}
@keyframes monsterRise{0%{transform:translateY(60vh) scale(0.3);opacity:0;filter:blur(10px)}40%{opacity:1;filter:blur(0)}70%{transform:translateY(-5vh) scale(1.05)}100%{transform:translateY(5vh) scale(1)}}
.monster-emoji{font-size:clamp(80px,25vw,280px);line-height:1;filter:drop-shadow(0 0 40px rgba(255,215,0,0.8)) drop-shadow(0 20px 30px rgba(0,0,0,0.6));animation:floatGiant 3s ease-in-out infinite alternate}
@keyframes floatGiant{0%{transform:translateY(0) rotate(-3deg)}100%{transform:translateY(-15px) rotate(3deg)}}
.monster-shadow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:60%;height:30px;background:radial-gradient(ellipse,rgba(0,0,0,0.7) 0%,transparent 70%);filter:blur(8px);animation:shadowPulse 3s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{opacity:0.6;transform:translateX(-50%) scaleX(1)}50%{opacity:0.3;transform:translateX(-50%) scaleX(0.85)}}
.monster-info{margin-top:2vh}
.monster-name{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4vw,28px);color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.6);margin-bottom:0.5vh}
.monster-rarity{font-size:clamp(12px,3vw,20px);font-weight:900;margin-bottom:1vh}
.monster-weight{font-size:clamp(16px,4.5vw,32px);color:#fff;font-weight:800;background:rgba(0,0,0,0.5);padding:0.5vh 2vw;border-radius:12px;display:inline-block}
.reel-rope{position:absolute;top:-100vh;left:50%;width:4px;height:100vh;background:linear-gradient(to bottom,#b87333 0%,#5a3a1a 100%);transform:translateX(-50%);box-shadow:2px 0 10px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.3s}
.reel-rope.active{opacity:1}
.vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle,transparent 40%,rgba(0,0,0,0.8) 100%)}
.tap-hint{position:absolute;bottom:5vh;left:0;width:100%;text-align:center;font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,14px);color:#00d4ff;text-shadow:0 0 10px rgba(0,212,255,0.8);opacity:0;transition:opacity 0.5s;animation:pulseHint 1.5s infinite}
.tap-hint.visible{opacity:1}
@keyframes pulseHint{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#giant-monster-overlay.reeling .monster-container{animation:pullToPlayer 1.8s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes pullToPlayer{0%{transform:translateY(5vh) scale(1)}30%{transform:translateY(-10vh) scale(1.1)}100%{transform:translateY(-30vh) scale(0.6);opacity:0;filter:blur(5px)}}
#giant-monster-overlay.reeling .reel-rope{transform:translateX(-50%) scaleY(1)}
#giant-monster-overlay.reeling .tap-hint{display:none}

#splash-overlay{position:absolute;inset:0;pointer-events:none;z-index:14;overflow:hidden}
.splash-drop{position:absolute;border-radius:50%;background:rgba(100,200,255,.7);animation:dropFall 1s ease-in forwards}
@keyframes dropFall{0%{transform:translateY(-20px) scale(1);opacity:.8}100%{transform:translateY(60px) scale(.1);opacity:0}}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:52px">🎣</div>
  <h2>CÂU CÁ ONLINE</h2>
  <div id="loadbar"><div id="loadfill"></div></div>
  <div id="loadtxt">Đang kết nối Firebase...</div>
</div>
<div id="autherr">
  <div style="font-size:56px">🔒</div>
  <h2>KHÔNG VÀO ĐƯỢC</h2>
  <div class="ae-reason" id="ae-reason">Phiên hết hạn</div>
  <p id="ae-msg">Dùng lệnh <strong>tcauonline</strong> trong Discord để lấy link mới!</p>
  <div id="ae-detail"></div>
  <div class="ae-btns">
    <button class="ae-btn retry" onclick="location.reload()">🔄 Thử lại</button>
    <button class="ae-btn demo" onclick="startDemo()">🎮 Chơi thử (Demo)</button>
  </div>
</div>
<div id="game">
  <div id="hdr">
    <h1>🎣 CÂU CÁ ONLINE</h1>
    <div id="hdr-right">
      <div id="online-pill"><span id="online-count">0</span> online</div>
      <div id="cd">🪙 <span id="ct">--</span></div>
    </div>
  </div>
  <div id="maps">
    <button class="mb on" onclick="selMap(0)">🏡 Hồ Làng</button>
    <button class="mb" onclick="selMap(1)">🌊 Biển Nhiệt Đới</button>
    <button class="mb" onclick="selMap(2)">🏔️ Sông Núi Băng</button>
    <button class="mb" onclick="selMap(3)">🌑 Vực Đại Dương</button>
  </div>
  <div id="cw">
    <canvas id="gc" width="900" height="480"></canvas>
    <div id="vig"></div>
    <div id="xhair"></div>
    <div id="st"></div>
    <div id="map-name"></div>
    <div id="map-fish-hint"></div>
    <div id="demo-badge">🎮 CHẾ ĐỘ DEMO</div>
    <button id="snd" onclick="toggleSound()">🔊</button>
    <div id="bf"></div>
    <div id="rb">
      <div class="rem" id="rem"></div>
      <div class="rn" id="rn"></div>
      <div class="rv" id="rv"></div>
      <div class="rr" id="rr"></div>
      <div class="rsz" id="rsz"></div>
    </div>
    <!-- ⭐ OVERLAY MỚI THAY CHO #fish-rise -->
    <div id="giant-monster-overlay">
      <div class="water-break"></div>

async function writePlayerImmediate(){
  if(DEMO||!DB||!player.userId)return;
  setSyncStatus('saving');
  try{
    const safeInv={};
    for(const[fishId,entries]of Object.entries(player.inventory)){
      if(Array.isArray(entries)&&entries.length>0){
        safeInv[fishId]=entries.filter(e=>e&&typeof e==='object'&&e.value!==undefined).map(e=>({weight:e.weight||0,value:e.value||0,map:e.map??curMap,caughtAt:e.caughtAt||Date.now()}));
      }
    }
    // ⚠️ Dùng .set() để ghi đè hoàn toàn inventory, tránh bug merge của Firebase
    await DB.ref(`players/${player.userId}/inventory`).set(safeInv);
    await DB.ref(`players/${player.userId}`).update({coins:player.coins,rodUses:player.rodUses,totalCaught:player.totalCaught,totalEarned:player.totalEarned,webUpdatedAt:Date.now(),updatedAt:Date.now()});
    setSyncStatus('ok');
  }catch(e){console.error('❌ [Save]',e);setSyncStatus('err');setTimeout(()=>writePlayerImmediate().catch(()=>{}),1000);}
}

function handleCast(){if(gstate==='biting'){clearTimeout(bt);doReelIn();return;}if(gstate!=='idle'||!player.userId)return;if(player.rodUses<=0){showToast('❌ Mua cần câu ở Shop!');swTab('shop');return;}resultFish=null;resultWeight=0;hideBanner();gstate='casting';setStatus('🎣 Đang thả câu...');document.getElementById('cb').disabled=true;const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();window._bobGrp.position.set(camera.position.x+fwd.x*12,.05,camera.position.z+fwd.z*12);updatePresence('casting');setTimeout(()=>{gstate='waiting';setStatus('⏳ Đang chờ cá cắn...');waitDur=3000+Math.random()*8000;waitStart=performance.now();updatePresence('waiting');wt=setTimeout(startBite,waitDur);},1200);}
function startBite(){gstate='biting';setStatus('🐟 CÁ CẮN! CLICK KÉO!');const b=document.getElementById('cb');b.textContent='⚡ KÉO!';b.classList.add('bite');b.disabled=false;document.getElementById('bf').classList.add('on');updatePresence('biting');bt=setTimeout(fishEscape,3000);}

function showGiantFishRise(fish,weight){const o=document.getElementById('giant-monster-overlay');o.className='';void o.offsetWidth;o.querySelector('.monster-emoji').textContent=fish.emoji;o.querySelector('.monster-name').textContent=fish.name;o.querySelector('.monster-rarity').textContent=fish.rar;o.querySelector('.monster-rarity').style.color='#'+fish.color.toString(16).padStart(6,'0');o.querySelector('.monster-weight').textContent='⚖️ '+fmtWeight(weight);o.classList.add('active');o.querySelector('.tap-hint').classList.add('visible');if(soundOn&&audioCtx)playFishCatchSound(fish.rar);createWaterRipples(weight);if(weight>50)shakeScreen(.04,300);setTimeout(()=>{o.querySelector('.reel-rope').classList.add('active');o.querySelector('.tap-hint').textContent='Đang kéo về... ⚓';o.classList.add('reeling');broadcastCatch(fish);},2500);o.style.pointerEvents='auto';o.addEventListener('pointerdown',()=>{o.classList.add('reeling');},{once:true});}
function hideGiantFish(){const o=document.getElementById('giant-monster-overlay');o.classList.remove('active','reeling');o.style.display='none';if(fishGrp){fishGrp.visible=false;fishGrp.scale.set(.1,.1,.1);}}

async function doReelIn(){gstate='reeling';setStatus('');const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=true;document.getElementById('bf').classList.remove('on');player.rodUses--;updateUI();resultFish=rollFishForMap(curMap);resultWeight=resultFish?rollWeight(resultFish):0;updatePresence('reeling');if(resultFish)showGiantFishRise(resultFish,resultWeight);setTimeout(async()=>{hideGiantFish();gstate='result';showBanner(resultFish,resultWeight);if(resultFish){if(!player.inventory[resultFish.id])player.inventory[resultFish.id]=[];player.inventory[resultFish.id].push({weight:resultWeight,value:resultFish.value,map:curMap,caughtAt:Date.now()});player.totalCaught++;showToast(`🎉 ${resultFish.emoji} ${resultFish.name} — ${fmtWeight(resultWeight)}!`);}else showToast('😅 Không câu được gì...');await writePlayerImmediate();updateUI();renderContent();setTimeout(()=>{gstate='idle';hideBanner();updatePresence('idle');const nr=player.rodUses<=0;setStatus(nr?'🏪 Hết cần! Mua thêm.':'🎣 Nhấn THẢ CÂU để tiếp tục!');const btn=document.getElementById('cb');btn.disabled=false;btn.textContent=nr?'🏪 MUA CẦN':'🎣 THẢ CÂU';},2000);},4500);}
function fishEscape(){gstate='idle';setStatus('😔 Cá thoát! Kéo nhanh hơn!');const b=document.getElementById('cb');b.textContent='🎣 THẢ CÂU';b.classList.remove('bite');b.disabled=false;document.getElementById('bf').classList.remove('on');updatePresence('idle');showToast('😔 Cá trốn mất!');}
function createWaterRipples(w){const o=document.getElementById('splash-overlay');const c=Math.min(20,5+Math.floor(w/20));for(let i=0;i<c;i++){const r=document.createElement('div');r.className='splash-drop';const x=35+Math.random()*30,y=35+Math.random()*30,s=8+Math.random()*15+w*.05;r.style.cssText=`left:${x}%;top:${y}%;width:${s}px;height:${s}px;background:rgba(100,200,255,${.5-i*.02});animation:dropFall ${.8+i*.1}s ease-in ${i*.05}s forwards;border-radius:50%;`;o.appendChild(r);setTimeout(()=>r.remove(),2000);}}
function shakeScreen(i=.02,d=200){const cw=document.getElementById('cw'),ot=cw.style.transform;let c=0;const iv=setInterval(()=>{if(c>=d/16){clearInterval(iv);cw.style.transform=ot;return;}cw.style.transform=`translate(${(Math.random()-.5)*i*100}%,${(Math.random()-.5)*i*100}%)`;c++;},16);}
function createSplashEffect(){}
function playFishCatchSound(r){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(masterGain);const f={Thường:440,'Không Thường':523,'Quý Hiếm':659,'Huyền Thoại':784,'Thần Thoại':1047,'Vô Tiền Khoáng Hậu':1319};o.frequency.value=f[r]||440;o.type=r==='Thần Thoại'||r==='Vô Tiền Khoáng Hậu'?'sine':'triangle';g.gain.setValueAtTime(.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);o.start();o.stop(audioCtx.currentTime+.3);}

async function buyRod(q){q=Math.min(parseInt(q)||1,100);const c=ROD_PRICE*q;if(player.coins<c){showToast('❌ Không đủ xu!');return;}player.coins-=c;player.rodUses+=ROD_USES*q;updateUI();renderContent();showToast(`✅ Mua ${q} cần! +${ROD_USES*q} lần câu`);await writePlayerImmediate();if(gstate==='idle'){document.getElementById('cb').textContent='🎣 THẢ CÂU';setStatus('🎣 Nhấn THẢ CÂU!');}}
async function sellFish(id,idx){const arr=player.inventory[id];if(!arr||!arr.length)return;const f=ALL_FISH[id];let g=0;if(idx==='all'){g=arr.reduce((s,e)=>s+e.value,0);player.coins+=g;player.totalEarned+=g;delete player.inventory[id];}else{const e=arr[idx];if(!e)return;g=e.value;player.coins+=g;player.totalEarned+=g;arr.splice(idx,1);if(!arr.length)delete player.inventory[id];}updateUI();renderContent();showToast(`💰 +${fmt(g)} 🪙 — ${f.emoji} đã bán!`);await writePlayerImmediate();}
async function sellAll(){const k=Object.keys(player.inventory);if(!k.length){showToast('❌ Túi cá trống!');return;}let t=0;for(const[id,arr]of Object.entries(player.inventory))t+=arr.reduce((s,e)=>s+e.value,0);player.coins+=t;player.totalEarned+=t;player.inventory={};updateUI();renderContent();showToast(`💰 Bán tất cả → +${fmt(t)} 🪙!`);await writePlayerImmediate();}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function fmt(n){return n>=1e9?(n/1e9).toFixed(1).replace(/\.0$/,'')+'B':n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,'')+'M':n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,'')+'K':n.toLocaleString('vi-VN');}
function setStatus(m){document.getElementById('st').textContent=m;}
function updateUI(){document.getElementById('ct').textContent=fmt(player.coins);document.getElementById('ut').textContent=player.rodUses>0?player.rodUses:'0';}
function updateMapUI(){const m=MAP_DEFS[curMap];document.getElementById('map-name').textContent=m.name;document.getElementById('map-fish-hint').textContent='🐟 '+m.hint;}
function selMap(i){curMap=i;window._applyMap&&window._applyMap(i);document.querySelectorAll('.mb').forEach((b,j)=>b.classList.toggle('on',j===i));updatePresence(gstate);updateMapUI();showToast(`📍 ${MAP_DEFS[i].name}`);renderContent();setStatus(player.rodUses>0?`🎣 Câu cá tại ${MAP_DEFS[i].name}!`:'🏪 Mua cần câu ở Shop!');}
function swTab(tab){activeTab=tab;const k=['bag','shop','sell','rates'];document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',k[i]===tab));renderContent();}
function showBanner(f,w){const b=document.getElementById('rb');if(f){document.getElementById('rem').textContent=f.emoji;document.getElementById('rn').textContent=f.name;document.getElementById('rv').textContent='Bán: +'+fmt(f.value)+' 🪙';document.getElementById('rr').innerHTML=`<span class="${f.rc}">${f.rar}</span>`;document.getElementById('rsz').textContent='⚖️ '+fmtWeight(w);b.style.borderColor='#'+f.color.toString(16).padStart(6,'0');}else{document.getElementById('rem').textContent='💨';document.getElementById('rn').textContent='Hụt rồi!';document.getElementById('rv').textContent='Cá trốn...';document.getElementById('rr').textContent='';document.getElementById('rsz').textContent='';b.style.borderColor='#555';}b.classList.remove('show');void b.offsetWidth;b.classList.add('show');}
function hideBanner(){document.getElementById('rb').classList.remove('show');}
let toastT=null;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3200);}
function renderOtherPlayersList(others){const el=document.getElementById('players-overlay');let h='';const SL={idle:'💤',casting:'🎣',waiting:'⏳',biting:'🐟!',reeling:'⚡',result:'✅'};for(const[id,p]of others){const av=p.avatar?`https://cdn.discordapp.com/avatars/${id}/${p.avatar}.webp?size=32`:`https://cdn.discordapp.com/embed/avatars/0.png`;h+=`<div class="po"><img src="${av}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"><span class="pn">${p.username.slice(0,12)}</span><span class="ps ps-${p.state||'idle'}">${SL[p.state||'idle']||''}</span></div>`;}el.innerHTML=h;}
function addNotif(html){const el=document.getElementById('notifs');const d=document.createElement('div');d.className='notif';d.innerHTML=html;el.appendChild(d);setTimeout(()=>d.remove(),4000);if(el.children.length>5)el.removeChild(el.children[0]);}
function addChatMsg(u,t,is=false){const el=document.getElementById('chatlog');const d=document.createElement('div');d.className='chatmsg';d.innerHTML=`<strong style="color:${is?'var(--gold)':'var(--accent)'}">${u}:</strong> ${t}`;el.appendChild(d);el.scrollTop=el.scrollHeight;setTimeout(()=>d.remove(),9000);if(el.children.length>8)el.removeChild(el.children[0]);}
function invValue(inv){let t=0;for(const a of Object.values(inv))t+=a.reduce((s,e)=>s+(e.value||0),0);return t;}
function invCount(inv){let t=0;for(const a of Object.values(inv))t+=a.length;return t;}

function renderContent(){const p=document.getElementById('cp');if(activeTab==='bag'){const inv=player.inventory,k=Object.keys(inv).filter(k=>inv[k]&&inv[k].length>0);if(!k.length){p.innerHTML=`<div class="stl">🎒 TÚI CÁ</div><div class="es"><div class="ei">🎣</div><p>Túi trống. Thả câu bắt cá!<br><small>Mỗi map có cá khác nhau!</small></p></div>`;return;}let h=`<div class="stl">🎒 TÚI CÁ — ${invCount(inv)} con</div><div class="ig">`;for(const id of k){const f=ALL_FISH[id];if(!f)continue;const arr=inv[id],cnt=arr.length,hc='#'+f.color.toString(16).padStart(6,'0'),tv=arr.reduce((s,e)=>s+e.value,0);h+=`<div class="ii" style="border-color:${hc}40"><div class="fe">${f.emoji}</div><div class="fn">${f.name}</div><div class="fc">×${cnt} con | Map ${f.map+1}</div><div class="fv"><span class="${f.rc}">${f.rar}</span></div><div class="fv" style="color:var(--gold)">${fmt(tv)}🪙</div></div>`;}p.innerHTML=h+'</div>';return;}if(activeTab==='shop'){const ok=player.coins>=ROD_PRICE;p.innerHTML=`<div class="stl">🏪 CỬA HÀNG</div><div class="shoprow"><div style="font-size:38px">🎣</div><div class="si"><div class="sn">Cần Câu Đồng</div><div class="sd">Câu được ${ROD_USES} lần</div><div class="sp">${fmt(ROD_PRICE)} 🪙</div></div><button class="buybtn ${ok?'':'dis'}" onclick="${ok?'buyRod(1)':'void 0'}">${ok?'MUA 1':'THIẾU XU'}</button></div>${player.coins>=ROD_PRICE*5?`<div class="shoprow"><div style="font-size:38px">🎣</div><div class="si"><div class="sn">Gói 5 Cần Câu</div><div class="sd">+${ROD_USES*5} lần câu</div><div class="sp">${fmt(ROD_PRICE*5)} 🪙</div></div><button class="buybtn" onclick="buyRod(5)">MUA 5</button></div>`:''}<div style="padding:9px;background:rgba(15,32,53,.8);border-radius:var(--rsm);font-size:11px;color:var(--sub)">💰 <strong style="color:var(--gold)">${fmt(player.coins)} 🪙</strong> | 🎣 <strong style="color:var(--accent)">${player.rodUses}</strong> lần còn</div>`;return;}if(activeTab==='sell'){const inv=player.inventory,k=Object.keys(inv).filter(k=>inv[k]&&inv[k].length>0);if(!k.length){p.innerHTML=`<div class="stl">💰 BÁN CÁ</div><div class="es"><div class="ei">🐟</div><p>Không có cá. Hãy đi câu trước!</p></div>`;return;}const t=invValue(inv),tc=invCount(inv);let h=`<div class="stl">💰 BÁN CÁ — ${tc} con</div><div class="sg">`;for(const id of k){const f=ALL_FISH[id];if(!f)continue;const arr=inv[id],cnt=arr.length,hc='#'+f.color.toString(16).padStart(6,'0'),tv=arr.reduce((s,e)=>s+e.value,0);h+=`<div class="si2" style="border-color:${hc}40"><div style="font-size:34px">${f.emoji}</div><div style="font-weight:800;font-size:12px;margin:3px 0">${f.name}</div><div style="font-size:10px;color:var(--sub)">×${cnt} con</div><div style="font-size:11px;color:var(--gold);font-weight:800;margin:2px 0 4px">${fmt(tv)}🪙</div><button class="sb" onclick="sellFish('${id}','all')">BÁN TẤT CẢ</button></div>`;}h+=`</div><div style="text-align:right;font-size:12px;font-weight:800;color:var(--gold);margin-bottom:7px">Tổng: +${fmt(t)} 🪙 (${tc} con)</div><button id="sab" onclick="sellAll()">💰 BÁN TẤT CẢ → +${fmt(t)} 🪙</button>`;p.innerHTML=h;return;}if(activeTab==='rates'){const m=MAP_DEFS[curMap];let h=`<div class="stl">📊 TỈ LỆ — ${m.name}</div><table class="rt"><tr style="background:rgba(15,32,53,.8)"><th>Cá</th><th>Độ Hiếm</th><th>Tỉ Lệ</th><th>Giá/con</th><th>Cân nặng</th></tr><tr><td>💨 Hụt</td><td>—</td><td>${m.fishRates.miss}%</td><td>—</td><td>—</td></tr>`;for(const id of m.fishPool){const f=ALL_FISH[id],r=m.fishRates[id]||0;h+=`<tr><td>${f.emoji} ${f.name}</td><td><span class="${f.rc}">${f.rar}</span></td><td>${r}%</td><td style="color:var(--gold);font-weight:800">${fmt(f.value)}🪙</td><td style="font-size:10px;color:#88aacc">${fmtWeight(f.minW)}–${fmtWeight(f.maxW)}</td></tr>`;}h+=`</table><div style="margin-top:8px;font-size:10px;color:var(--sub);text-align:center">Đổi map để xem tỉ lệ map khác!</div>`;p.innerHTML=h;return;}}

let audioCtx=null,soundOn=false,masterGain=null;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.13;masterGain.connect(audioCtx.destination);for(let l=0;l<3;l++){const dur=audioCtx.sampleRate*(4+l),buf=audioCtx.createBuffer(1,dur,audioCtx.sampleRate),data=buf.getChannelData(0);let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<dur;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;data[i]=Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.09));b6=w*.115926;}const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;const flt=audioCtx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=140+l*300;flt.Q.value=.75;const g=audioCtx.createGain();g.gain.value=.36-l*.08;const lfo=audioCtx.createOscillator();lfo.frequency.value=.16+l*.12;const lg=audioCtx.createGain();lg.gain.value=.035;lfo.connect(lg);lg.connect(g.gain);lfo.start();src.connect(flt);flt.connect(g);g.connect(masterGain);src.start(0,Math.random()*3);}soundOn=true;document.getElementById('snd').textContent='🔊';}
function toggleSound(){if(!audioCtx){initAudio();return;}soundOn=!soundOn;if(masterGain)masterGain.gain.value=soundOn?.13:0;document.getElementById('snd').textContent=soundOn?'🔊':'🔇';}
document.addEventListener('click',()=>{if(!audioCtx)initAudio();},{once:true});
bootFirebase();
</script>
