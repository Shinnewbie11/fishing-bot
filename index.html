<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎣 Câu Cá Online - Boss Raid & Level Up</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#04121f;font-family:'Be Vietnam Pro',sans-serif;overflow:hidden;color:#fff;user-select:none;position:fixed;inset:0;touch-action:none;overscroll-behavior:none}
#wrap{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#04121f;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

.hud{position:absolute;pointer-events:none;z-index:5}
.hud *{pointer-events:auto}

#pinfo{top:10px;left:10px;display:flex;gap:8px;align-items:flex-start;z-index:10}
#avatar{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#2a4d6e,#16344f);border:2px solid #5fd0ff;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
#pstats{font-size:11px;line-height:1.5}
#pstats .nm{font-weight:800;font-size:13px;color:#ffe27a;text-shadow:1px 1px 2px #000}
.bar{width:130px;height:9px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);border-radius:5px;overflow:hidden;margin-top:2px;position:relative}
.bar > i{position:absolute;inset:0;display:block;border-radius:5px;transition:width 0.3s}
.bar span{position:absolute;inset:0;font-size:8px;text-align:center;line-height:9px;text-shadow:1px 1px 1px #000;font-weight:700}
#xpfill{background:linear-gradient(90deg,#3a9bff,#73d2ff)}
#stamfill{background:linear-gradient(90deg,#ff8a2a,#ffd23f)}
#stamfill.danger{background:linear-gradient(90deg,#ff0000,#800000);animation:pulse 1s infinite}
@keyframes pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }
#pstats small{color:#bcd6ec;font-size:9px}

#staminaTimer{position:absolute;top:65px;left:10px;background:rgba(255,0,0,0.8);color:white;padding:4px 8px;border-radius:8px;font-weight:bold;font-size:12px;display:none;z-index:11;border:1px solid #ffaaaa}

#topright{top:10px;right:10px;display:flex;align-items:center;gap:8px;z-index:10}
#coins{background:rgba(8,24,40,.85);border:1px solid #ffd23f;border-radius:18px;padding:5px 12px 5px 8px;font-weight:800;color:#ffd23f;font-size:13px;display:flex;align-items:center;gap:5px}
.icobtn{width:34px;height:34px;border-radius:50%;background:rgba(8,24,40,.85);border:1px solid #2f5a7d;color:#bcd6ec;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.icobtn:hover{border-color:#5fd0ff;color:#5fd0ff;transform:scale(1.08)}

#centerNotify {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 50; text-align: center; pointer-events: none; opacity: 0;
  transition: opacity 0.5s, transform 0.3s;
}
#centerNotify.show { opacity: 1; transform: translate(-50%, -55%); }
#centerNotify .title { font-size: 28px; font-weight: 900; text-shadow: 0 0 20px rgba(0,0,0,0.8); margin-bottom: 5px; }
#centerNotify .sub { font-size: 16px; font-weight: 700; color: #ffd23f; text-shadow: 0 0 10px #000; }
#centerNotify.bossMode .title { color: #ff4444; font-size: 40px; animation: shakeText 0.5s infinite; }
@keyframes shakeText { 0%{transform:translate(0,0)} 25%{transform:translate(-2px,2px)} 50%{transform:translate(2px,-2px)} 75%{transform:translate(-2px,-2px)} 100%{transform:translate(0,0)} }

#fishhud{top:80px;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:.3s;z-index:10}
#fishhud.show{opacity:1}
#fishhud .ftit{font-weight:800;font-size:13px;color:#ff7a7a;text-shadow:1px 1px 2px #000}
#fishbar{width:230px;height:13px;background:rgba(0,0,0,.6);border:1px solid #ff7a7a;border-radius:7px;overflow:hidden;margin:3px auto 0;position:relative}
#fishbar > i{position:absolute;inset:0;background:linear-gradient(90deg,#c0392b,#ff5a5a);border-radius:7px;transition:width .15s}
#fishbar span{position:absolute;inset:0;font-size:9px;line-height:13px;text-align:center;font-weight:800;text-shadow:1px 1px 1px #000}

#netstat{position:absolute;top:52px;right:10px;font-size:10px;background:rgba(8,24,40,.85);padding:4px 9px;border-radius:12px;border:1px solid #2f5a7d;color:#9fc;display:flex;align-items:center;gap:5px;z-index:5}
#netstat .dot{width:8px;height:8px;border-radius:50%;background:#ffb02a;box-shadow:0 0 6px #ffb02a}
#netstat.live .dot{background:#37e07a;box-shadow:0 0 6px #37e07a}

#chatbox{bottom:88px;left:10px;width:250px;max-width:46%;z-index:5}
#chatlog{max-height:118px;overflow-y:auto;font-size:11px;line-height:1.5;display:flex;flex-direction:column;justify-content:flex-end;mask-image:linear-gradient(to top,#000 70%,transparent)}
#chatlog::-webkit-scrollbar{width:0}
#chatlog div{margin-bottom:1px;text-shadow:1px 1px 2px #000}
#chatlog .who{color:#73d2ff;font-weight:700}
#chatlog .sys{color:#ffd23f}
#chatrow{display:flex;gap:5px;margin-top:5px}
#chatinput{flex:1;background:rgba(4,16,28,.9);border:1px solid #2f5a7d;border-radius:14px;padding:6px 11px;color:#fff;font-size:11px;font-family:inherit;outline:none}
#chatinput:focus{border-color:#5fd0ff}
#chatsend{background:#1f6dad;border:none;border-radius:14px;padding:0 12px;color:#fff;font-size:13px;cursor:pointer}

#reelarea{bottom:14px;right:14px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:6}
#reelbtn{width:92px;height:92px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#3a3f48,#15181d);border:4px solid #4a525c;color:#dfe8f0;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.6);position:relative;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.15;transition:.05s}
#reelbtn:active{transform:scale(.90)}
#reelbtn.pulse{box-shadow:0 0 30px #ffd23f, 0 0 60px rgba(255,210,63,0.5)}
#reeldepth{font-size:10px;color:#bcd6ec;background:rgba(8,24,40,.8);padding:3px 9px;border-radius:10px;border:1px solid #2f5a7d}

#castbtn{bottom:24px;left:50%;transform:translateX(-50%);padding:15px 40px;border:none;border-radius:30px;background:linear-gradient(135deg,#0f7ad4,#2cc6ff);color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 6px 22px rgba(44,198,255,.55);z-index:6;letter-spacing:.5px;transition:.12s}
#castbtn:active{transform:translateX(-50%) scale(.95)}
#castbtn.charging{background:linear-gradient(135deg,#c08400,#ffc400)}
#castbtn:disabled{opacity:.45;cursor:default}
#castbtn.exhausted { background: #555; box-shadow: none; }

#power{bottom:74px;left:50%;transform:translateX(-50%);width:200px;height:11px;background:rgba(0,0,0,.6);border:1px solid #2cc6ff;border-radius:7px;overflow:hidden;opacity:0;transition:opacity .2s;z-index:6}
#power.show{opacity:1}
#power > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#37e07a,#ffd23f,#ff5a5a)}

#hint{top:60%;left:50%;transform:translate(-50%,-50%);font-weight:800;font-size:15px;color:#fff;text-shadow:2px 2px 4px #000,0 0 14px rgba(44,198,255,.7);background:rgba(4,16,28,.5);padding:10px 22px;border-radius:20px;text-align:center;z-index:5;transition:.3s;pointer-events:none}

#cfgbtn{position:absolute;bottom:14px;left:14px;z-index:7;background:rgba(8,24,40,.85);border:1px solid #2f5a7d;color:#9fc;font-size:10px;padding:7px 11px;border-radius:12px;cursor:pointer}
#cfgbtn:hover{border-color:#5fd0ff}
#login{position:absolute;inset:0;background:rgba(2,8,16,.95);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
#login.show{display:flex}
#loginbox{background:#0a1c30;border:1px solid #2f5a7d;border-radius:14px;padding:24px;max-width:340px;width:100%;text-align:center}
#loginbox h3{color:#5fd0ff;margin-bottom:10px;font-size:18px}
#loginbox p{font-size:12px;color:#bcd6ec;line-height:1.6;margin-bottom:14px}
#loginbox input{width:100%;background:#04121f;border:1px solid #2f5a7d;border-radius:8px;color:#fff;padding:12px;font-size:14px;outline:none;font-family:inherit}
#loginbox input:focus{border-color:#5fd0ff}
#loginerr{display:block;margin-top:10px;color:#ff7a7a;font-size:12px;min-height:16px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1;padding:13px;border:none;border-radius:8px;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit}
#loginbtn{background:linear-gradient(135deg,#0f7ad4,#2cc6ff);color:#fff}

#toast{position:absolute;top:150px;left:50%;transform:translateX(-50%);background:rgba(10,28,50,.96);border:1px solid #5fd0ff;border-radius:14px;padding:9px 18px;font-size:13px;font-weight:800;z-index:40;opacity:0;transition:.35s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.5);display:none}
#toast.show{display:block;opacity:1;transform:translateX(-50%) translateY(10px)}

@media (max-width:760px){
  #castbtn{padding:16px 36px;font-size:16px;bottom:15px}
  #reelbtn{width:110px;height:110px;font-size:14px;border-width:5px}
  #reelarea{bottom:10px;right:10px}
  #avatar{width:36px;height:36px;font-size:18px}
  .bar{width:90px;height:7px}
  #pstats{font-size:10px}
  #pstats .nm{font-size:12px}
  #chatbox{width:40%;bottom:90px;left:5px}
  #chatlog{max-height:80px;font-size:10px}
  #chatinput{font-size:10px;padding:5px 8px}
  #coins{font-size:12px;padding:5px 10px}
  .icobtn{width:38px;height:38px;font-size:16px}
  #fishbar{width:min(60vw,260px)}
  #hint{font-size:12px;padding:8px 16px;width:min(80vw,360px)}
}
@media (max-width:480px) and (orientation:portrait){ #chatbox{width:45%;bottom:95px} #chatlog{max-height:70px} #reelbtn{width:100px;height:100px} }
@media (hover:none){ #castbtn,#reelbtn,.icobtn,#chatsend{touch-action:manipulation} }
@media (orientation:portrait){ #rotate{display:none!important} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="hud" id="pinfo">
    <div id="avatar">🧑‍</div>
    <div id="pstats">
      <div class="nm" id="myname">Bạn</div>
      <div><small>Lv <b id="mylv">1</b></small></div>
      <div class="bar"><i id="xpfill" style="width:20%"></i><span id="xptxt">XP</span></div>
      <div class="bar"><i id="stamfill" style="width:100%"></i><span id="stamtxt">Thể lực</span></div>
      <div><small id="rankline">Cá nặng nhất: — • Hạng: #—</small></div>
    </div>
  </div>
  <div id="staminaTimer">⏳ Chờ hồi phục: 00:00:00</div>
  <div class="hud" id="topright">
    <div id="coins">🪙 <span id="coinval">100,000</span></div>
    <button class="icobtn" id="btnRank" title="Xếp hạng">🏆</button>
    <button class="icobtn" id="btnChat" title="Chat">💬</button>
  </div>
  <div id="netstat"><span class="dot"></span><span id="netlabel">Demo</span></div>

    <div class="ftit" id="ftit">Cá</div>
    <div id="fishbar"><i></i><span id="fishbartxt"></span></div>
  </div>
  <div class="hud" id="chatbox">
    <div id="chatlog"></div>
    <div id="chatrow">
      <input id="chatinput" maxlength="80" placeholder="Nhập tin nhắn...">
      <button id="chatsend">➤</button>
    </div>
  </div>
  <div id="centerNotify">
    <div class="title">⚠️ THÔNG BÁO</div>
    <div class="sub">Nội dung</div>
  </div>
  <div id="hint">Nhấn giữ THẢ CÂU để lấy lực!</div>
  <div class="hud" id="reelarea">
    <button id="reelbtn">SPAM<br>KÉO</button>
    <div id="reeldepth">🎣 Còn <b id="rodUsesVal">999</b> lần</div>
  </div>
  <div id="power"><i></i></div>
  <button id="castbtn">🎣 THẢ CÂU</button>
  <div id="login"><div id="loginbox">
    <h3>🎣 Đăng Nhập Câu Cá</h3>
    <p id="logininfo">Nhập mật khẩu từ DM Discord.</p>
    <input id="loginpw" maxlength="8" placeholder="Mật khẩu" autocomplete="off" style="text-transform:uppercase;text-align:center;letter-spacing:4px;font-size:18px;font-weight:800">
    <div class="mbtns"><button id="loginbtn">Vào Game</button></div>
    <small id="loginerr"></small>
  </div></div>
  <div id="toast"></div>
  <div id="rotate"><div class="ph">📱</div><p>Xoay ngang để chơi tốt hơn!</p><button id="playportrait">Vẫn chơi dọc</button></div>
</div>

<script>
'use strict';
const MAX_PAYOUT = 100_000_000;
const FISH=[
  {id:'moi', name:'Cá Mồi',      emoji:'🐟', base:10_000,      rar:'Thường',       col:'#74b9ff', minW:.1, maxW:.8,  power:1,  rate:35,  boss:false},
  {id:'tram',name:'Cá Trắm',     emoji:'🐠', base:100_000,     rar:'Không Thường', col:'#a29bfe', minW:1,  maxW:8,   power:2,  rate:20,  boss:false},
  {id:'chep',name:'Cá Chép Vàng',emoji:'🐡', base:500_000,     rar:'Quý Hiếm',     col:'#fdcb6e', minW:5,  maxW:30,  power:4,  rate:10,  boss:true},
  {id:'hoi', name:'Cá Hồi',      emoji:'🦑', base:5_000_000,   rar:'Huyền Thoại',  col:'#e17055', minW:20, maxW:120, power:7,  rate:4.99,boss:true},
  {id:'rong',name:'Cá Rồng',     emoji:'🐲', base:100_000_000, rar:'Thần Thoại',   col:'#ffd700', minW:500,maxW:3000,power:12, rate:0.01,boss:true},
];
const MISS_RATE=30;
function rollFish(){ let x=Math.random()*100, c=MISS_RATE; if(x<c) return null; for(const f of FISH){ c+=f.rate; if(x<c) return f; } return FISH[0]; }
function rollWeight(f){ return Math.round((f.minW+Math.random()**2*(f.maxW-f.minW))*10)/10; }
function fmtW(w){ return w>=1000?(w/1000).toFixed(1)+' tấn':w>=1?w.toFixed(1)+' kg':Math.round(w*1000)+' g'; }
function fmtN(n){ return Math.round(n).toLocaleString('vi-VN'); }
function lvFromXp(xp){ return Math.floor(Math.sqrt(xp/50))+1; }
function xpForLv(lv){ return 50*(lv-1)*(lv-1); }

const me={
  id:'me', name:'Bạn', lv:1, xp:0, coins:100000,
  x:0.18, state:'idle', lineDepth:0, stamina:1000, staminaMax:1000,
  best:0, rodUses:999, inventory:{}, totalCaught:0, totalEarned:0,
  exhaustedAt: null, pullStrength: 0.045
};
let lobbyId='ho-lang';
const RAND_NAMES=['Hồng Hải Nhi','Tiểu Ngư','Lão Câu','Phong Vân','Hắc Long','Bạch Tuyết','Mèo Lười','Ngư Phủ','Sóng Biển','Kẻ Lữ Hành','A Phú','Thần Câu'];

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA9Iv98Bcurd6bqXo79BbgEz58a3xrPH8o",
  authDomain: "fishing-bot-e8d42.firebaseapp.com",
  databaseURL: "https://fishing-bot-e8d42-default-rtdb.firebaseio.com",
  projectId: "fishing-bot-e8d42",
  storageBucket: "fishing-bot-e8d42.firebasestorage.app",
  messagingSenderId: "404799504673",
  appId: "1:404799504673:web:6128427eae7b29729cbe60",
  measurementId: "G-DZ8TX0X6K6"
};
const GAME_SECRET = 'datBatKyChuan123';

const net={ mode:'demo', players:{}, onChat:null, onPlayersChange:null, _fb:null, session:null };
function startDemo(){
  net.mode='demo'; net.players={};
  const n=3+Math.floor(Math.random()*3);
  const used=new Set();
  for(let i=0;i<n;i++){
    let nm; do{ nm=RAND_NAMES[Math.floor(Math.random()*RAND_NAMES.length)]; }while(used.has(nm)); used.add(nm);
    const id='bot'+i;
    net.players[id]={ id, name:nm, lv:5+Math.floor(Math.random()*40), x:0.28+i*0.16+Math.random()*0.05, state:'waiting', lineDepth:1+Math.random()*2, best:Math.round(Math.random()*Math.random()*900), _t:Math.random()*4, _bot:true };
  }
  net.players['me']=publicMe();
  setNet(false,'Demo (chưa nối Firebase)');
  net.onPlayersChange&&net.onPlayersChange();
  if(net._demoTimer)clearInterval(net._demoTimer);
  net._demoTimer=setInterval(demoTick,500);
  if(net._chatTimer)clearInterval(net._chatTimer);
  net._chatTimer=setInterval(()=>{
    const ids=Object.keys(net.players).filter(k=>net.players[k]._bot);
    if(!ids.length)return;
    if(Math.random()<0.3) spawnBoss();
    if(Math.random()<0.5){
      const b=net.players[ids[Math.floor(Math.random()*ids.length)]];
      net.onChat&&net.onChat({who:b.name, text:['câu được con bự 😎','hồ này cá đẹp ghê','ai cho mượn cần 🙏'][Math.floor(Math.random()*3)]});
    }
  },6000);
}
function demoTick(){
  let changed=false;
  for(const id in net.players){ const p=net.players[id]; if(!p._bot)continue; p._t-=0.5; if(p._t<=0){ const states=['waiting','reeling','casting','idle']; p.state=states[Math.floor(Math.random()*states.length)]; p._t=2+Math.random()*4; if(p.state==='reeling'&&Math.random()<0.4){ p.best=Math.max(p.best,Math.round(Math.random()*1500)); } changed=true; } p.lineDepth=p.state==='idle'?0:1+Math.sin(Date.now()/700+id.length)*0.8+1.5; }
  if(changed)net.onPlayersChange&&net.onPlayersChange();
}

let FB=null;
async function initFirebase(){
  if(FB) return FB;
  if(!FIREBASE_CONFIG.databaseURL) throw new Error('Chưa điền FIREBASE_CONFIG');
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const dbm=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  const authm=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const app=initializeApp(FIREBASE_CONFIG);
  const auth=authm.getAuth(app);
  await authm.signInAnonymously(auth);
  FB={app, db:dbm.getDatabase(app), m:dbm, auth};
  return FB;
}
async function fetchSession(token){
  const {db,m}=await initFirebase();
  const snap=await m.get(m.ref(db,`sessions/${token}`));
  if(!snap.exists()) throw new Error('Phiên không tồn tại');
  const s=snap.val();
  if(s.secret!==GAME_SECRET) throw new Error('Sai secret');
  if(s.expiresAt && Date.now()>s.expiresAt) throw new Error('Phiên hết hạn');
  return s;
}
async function startOnline(token, session){
  const {db,m}=FB;
  net.mode='fb'; net.session={token,...session};
  me.id=session.userId; me.name=session.username||'Người chơi';
  me.coins=session.coins||0; me.rodUses=session.rodUses||0;
  me.inventory=normInv(session.inventory||{}); me.best=bestWeight(me.inventory);
  me.exhaustedAt = session.exhaustedAt || null;
  me.stamina = session.stamina || me.staminaMax;
  me.staminaMax = session.staminaMax || 1000;
  me.pullStrength = session.pullStrength || 0.045;
  me.lv = session.lv || 1; me.xp = session.xp || 0;

  net.players={}; net._fb={db,m,base:`lobby/${lobbyId}`};
  const meRef=m.ref(db,`${net._fb.base}/presence/${me.id}`);
  m.onDisconnect(meRef).remove(); await m.set(meRef, publicMe());
  m.onValue(m.ref(db,`${net._fb.base}/presence`), snap=>{
    net.players=snap.val()||{}; if(!net.players[me.id]) net.players[me.id]=publicMe();
    net.onPlayersChange&&net.onPlayersChange();
  });
  m.onValue(m.ref(db,`${net._fb.base}/worldBoss`), snap=>{
    if(snap.exists()){
      bossState = snap.val();
      if(bossState.active && !bossNotified) { triggerBossEvent(bossState); bossNotified = true; }
      else if (!bossState.active) bossNotified = false;
    }
  });
  const chatRef=m.ref(db,`${net._fb.base}/chat`);
  m.onValue(chatRef, snap=>{
    const arr=Object.values(snap.val()||{}).sort((a,b)=>(a.t||0)-(b.t||0)).slice(-20);
    if(net._chatSeen===undefined){ net._chatSeen=arr.length; redrawChat(arr); return; }
    if(arr.length>net._chatSeen){ for(let i=net._chatSeen;i<arr.length;i++) net.onChat&&net.onChat(arr[i]); net._chatSeen=arr.length; }
  });
  m.onValue(m.ref(db,`players/${me.id}`), snap=>{
    const d=snap.val(); if(!d)return;
    const botTs=d.botUpdatedAt||0, webTs=d.webUpdatedAt||0;

function checkExhaustion() {
  if (me.stamina <= 0 && !me.exhaustedAt) {
    me.exhaustedAt = Date.now();
    showCenterNotify("💥 Kiệt Sức!", "Bạn phải nghỉ 3 tiếng để hồi phục!", false);
    writePlayer(true);
  }
  const timerEl = $('staminaTimer');
  const castBtn = $('castbtn');
  if (me.exhaustedAt) {
    const elapsed = Date.now() - me.exhaustedAt;
    const duration = 5 * 60 * 1000; // 5 phút
    const remaining = duration - elapsed;
    if (remaining > 0) {
      timerEl.style.display = 'block'; castBtn.disabled = true; castBtn.classList.add('exhausted'); castBtn.textContent = "💤 ĐANG NGHỈ";
      const h = Math.floor(remaining / 3600000), m = Math.floor((remaining % 3600000) / 60000), s = Math.floor((remaining % 60000) / 1000);
      timerEl.textContent = `⏳ Hồi phục: ${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      return true;
    } else {
      me.stamina = me.staminaMax; me.exhaustedAt = null; timerEl.style.display = 'none';
      castBtn.disabled = false; castBtn.classList.remove('exhausted'); castBtn.textContent = "🎣 THẢ CÂU";
      showCenterNotify("⚡ Đã Hồi Phục!", "Thể lực đã đầy 100%!", false); writePlayer(true);
    }
  } else {
    timerEl.style.display = 'none';
    if(me.stamina > 0) { castBtn.disabled = false; castBtn.classList.remove('exhausted'); }
  }
  return false;
}

const castBtn=$('castbtn'), powerEl=$('power'), reelBtn=$('reelbtn');
let lastReelTime = 0; const REEL_COOLDOWN = 90;

function handleReelTap(e) {
    if (me.state !== 'reeling' && me.state !== 'biting') return;
    if (checkExhaustion()) return;
    e.preventDefault();

    const now = Date.now();
    if (now - lastReelTime < REEL_COOLDOWN) return;
    lastReelTime = now;

    // Hiệu ứng nút lún
    reelBtn.style.transform = 'scale(0.92)';
    setTimeout(() => reelBtn.style.transform = 'scale(1)', 50);

    if (me.state === 'biting') { clearTimeout(biteTimer); startReel(); return; }

    // ✅ CỐ ĐỊNH: Mỗi lần bấm thành công tốn đúng 2 thể lực
    const staminaCost = 2;
    const pullAmount = me.pullStrength; // Lực kéo cá về (giảm khoảng cách)

    // ── CƠ CHẾ KÉO HỤT ──
    const slipChance = 0.05 + (curFish.power * 0.03) - (me.lv * 0.002);

    if (Math.random() < slipChance) {
        // 💨 KÉO HỤT: Tốn 1 thể lực (nhẹ hơn), cá lùi nhẹ
        me.stamina -= 1;
        fishDist = Math.min(1, fishDist + 0.015);
        showCenterNotify("💨 HỤT!", "Cá giật mạnh làm tuột tay!", false);
    } else {
        // ✅ KÉO THÀNH CÔNG
        fishDist = Math.max(0, fishDist - pullAmount);
        me.stamina -= staminaCost; // Trừ đúng 2
        tension += 0.04 + (curFish.power * 0.015); // Giảm nhẹ độ tăng dây căng cho cân bằng

        // 🔥 DAMAGE GÂY RA CHO CÁ/BOSS MỖI LẦN BẤM
        // Bạn có thể chỉnh 2 số này để tăng/giảm dame:
        const baseDamage = 60;      // Dame cơ bản mỗi lần bấm
        const lvBonus = 12;         // Dame cộng thêm mỗi level
        const damagePerTap = baseDamage + (me.lv * lvBonus);

        // Nếu đang câu Boss -> trừ máu boss chung
        if (bossState.active && curFish.boss) {
            bossState.hp = Math.max(0, bossState.hp - damagePerTap);
            playerContribution += damagePerTap;

            // Đồng bộ lên Firebase để mọi người thấy máu giảm realtime
            if (net.mode === 'fb' && net._fb) {
                net._fb.m.update(net._fb.m.ref(net._fb.db, `${net._fb.base}/worldBoss`), {
                    hp: bossState.hp
                }).catch(err => console.log("Sync boss HP lỗi:", err));
            }

            if (bossState.hp <= 0) succeedCatch();
        }
    }

    checkExhaustion();
    if (tension >= 1) { failCatch('💥 Đứt dây! Cá quá khỏe!'); return; }
    reelFrames++;
}

function startReel(){ 
  if(bossState.active) {
    curFish = bossState.type; curWeight = bossState.maxHp * 1000; bossState.hp = bossState.maxHp; playerContribution = 0;
  } else {
    curFish = rollFish(); if(!curFish){ failCatch('Hụt! Không dính con nào.'); return; } curWeight=rollWeight(curFish);
    if(curFish.boss && Math.random() > 0.5) spawnBoss();
  }
  me.state='reeling'; setHint('⚡ SPAM NÚT KÉO LIÊN TỤC!'); castBtn.textContent='🎣 THẢ CÂU'; castBtn.disabled=true; 
  reelBtn.classList.remove('pulse'); reelBtn.style.boxShadow='0 6px 20px rgba(0,0,0,.6)'; 
  fishDist=1; tension=0; fishStruggle=0; reelFrames=0; reelGood=0; reelStartT=performance.now(); fishHud(true); publishSelf(true); 
}
let reelFrames=0, reelGood=0, reelStartT=0;
function fishHud(show){ const h=$('fishhud'); h.classList.toggle('show',show); if(show&&curFish) $('ftit').textContent=`${curFish.emoji} ${curFish.name} — ${fmtW(curWeight)}`; }
function failCatch(msg){ me.state='idle'; curFish=null; fishHud(false); castBtn.textContent='🎣 THẢ CÂU'; castBtn.disabled=false; reelBtn.style.boxShadow='0 6px 20px rgba(0,0,0,.6)'; showCenterNotify("😔 THẤT BẠI", msg, false); setTimeout(()=>{ if(me.state==='idle')setHint('Nhấn giữ THẢ CÂU để câu tiếp!'); },2200); publishSelf(true); }

function succeedCatch(){ 
  const f=curFish, w=curWeight; 
  const acc=reelFrames>0?reelGood/reelFrames:0.5; 
  const secs=(performance.now()-reelStartT)/1000; 
  const speedBonus=clamp(1-(secs-3)/12,0,1); 
  const pull=clamp(0.45+acc*0.45+speedBonus*0.10,0,1); 
  let value = 0;
  if(bossState.active && f === bossState.type) {
    const share = clamp(playerContribution / (playerContribution + 200), 0.1, 1);
    value = Math.round(f.base * share * pull);
    showCenterNotify(`🏆 HẠ GỤC BOSS!`, `Phần thưởng: ${fmtN(value)} 🪙`, true);
    bossState.active = false;
    if(net.mode === 'fb' && net._fb) net._fb.m.set(net._fb.m.ref(net._fb.db, `${net._fb.base}/worldBoss`), { active: false });
  } else {
    const wf=clamp((w-f.minW)/(f.maxW-f.minW||1),0,1); 
    value=Math.min(MAX_PAYOUT, Math.round(f.base*(0.6+wf*0.4)*pull)); 
  }
  if(!me.inventory[f.id]) me.inventory[f.id]=[]; 
  me.inventory[f.id].push({weight:w, value, map:0, caughtAt:Date.now()}); 
  me.totalCaught=(me.totalCaught||0)+1; me.best=Math.max(me.best,w); 
  const xpGain = Math.round(value/2000) + 20 + (me.lv * 5);
  me.xp += xpGain;
  me.coins += value; me.totalEarned += value;
  checkLevelUp();
  if(!bossState.active) showCenterNotify(`🎉 BẮT ĐƯỢC ${f.name}`, `+${fmtN(value)} 🪙 (+${xpGain} XP)`, false); 
  curFish=null; fishHud(false); me.state='idle'; castBtn.disabled=false; 
  writePlayer(true); updateHUD(); publishSelf(true); 
  setTimeout(()=>{ if(me.state==='idle')setHint('Nhấn giữ THẢ CÂU để câu tiếp!'); },2600); 
}

let lastT=performance.now(), myTip={rx:0,ry:0}, myReelJerk=0, myReelBoss=false;
function loop(now){ 
  requestAnimationFrame(loop); let dt=(now-lastT)/1000; lastT=now; dt=Math.min(dt,0.05); const t=now*0.001; 
  checkExhaustion(); updateFishing(dt,t); 
  if(!me.exhaustedAt && (me.state==='idle'||me.state==='waiting')) me.stamina=Math.min(me.staminaMax, me.stamina+60*dt); 
  drawScene(t); 
  if(bossState.active && bossState.type) {
    const bx = bossState.x * W, by = bossState.y * H, bossLen = Math.min(W, H) * 0.6;
    const shakeX = (Math.random()-0.5) * (bossState.hp < bossState.maxHp * 0.5 ? 10 : 2);
    drawFishShape(bx + shakeX, by, bossLen, -1, bossState.type.col, 1, t*0.5, true);
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(bx - 100, by - bossLen/2 - 40, 200, 20);
    ctx.fillStyle = '#ff3333'; ctx.fillRect(bx - 100, by - bossLen/2 - 40, 200 * (bossState.hp / bossState.maxHp), 20);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText(`HP BOSS: ${Math.round(bossState.hp)}/${Math.round(bossState.maxHp)}`, bx, by - bossLen/2 - 45);
    for(const id of Object.keys(net.players)) {
      const p = net.players[id]; if(!p) continue; const isMe = (id === me.id);
      const info = isMe ? {lv:me.lv,name:me.name,state:me.state} : {lv:p.lv||1,name:p.name||'?',state:p.state||'idle'};
      const mp = anglerPos(isMe?me.x:(p.x||0.5));
      if(info.state === 'waiting' || info.state === 'biting' || info.state === 'reeling') {
         const tip = drawAngler(mp.px, mp.py, 0.9, info, isMe, t);
         ctx.strokeStyle = isMe ? '#00ff00' : '#aaaaaa'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
         ctx.beginPath(); ctx.moveTo(tip.rx, tip.ry); ctx.lineTo(bx, by); ctx.stroke(); ctx.setLineDash([]);
         if(isMe) myTip = tip;
      } else if(isMe) { const tip = drawAngler(mp.px, mp.py, 0.9, {lv:me.lv,name:me.name,state:'idle'}, true, t); myTip = tip; }
    }
  } else {
    const ids=Object.keys(net.players); ids.sort((a,b)=>anglerPos(net.players[a].x||0.5).py - anglerPos(net.players[b].x||0.5).py); 
    for(const id of ids){ const p=net.players[id]; if(!p)continue; const isMe=(id===me.id); const info=isMe?{lv:me.lv,name:me.name,state:me.state}:{lv:p.lv||1,name:p.name||'?',state:p.state||'idle'}; const mp=anglerPos(isMe?me.x:(p.x||0.5)); const sc=0.9+(isMe?me.x:(p.x||0.5))*0.5; const tip=drawAngler(mp.px,mp.py,sc,info,isMe,t); if(isMe){ myTip=tip; } } 
    for(const f of ambientFish){ f.x+=f.sp*0.003; if(f.x>1.1)f.x=-0.1; if(f.x<-0.1)f.x=1.1; drawFishShape(f.x*W,f.y*H+Math.sin(t+f.ph)*6,f.sz,f.sp<0?-1:1,f.col,0.5,t+f.ph); }
    drawMyTackle(t); 
  }
  drawSplash(dt); 
}
function drawScene(t){ applyShake(); let g=ctx.createLinearGradient(0,0,0,H*WATER_TOP); g.addColorStop(0,scene.sky1); g.addColorStop(1,scene.sky2); ctx.fillStyle=g; ctx.fillRect(0,0,W,H*WATER_TOP); g=ctx.createLinearGradient(0,H*WATER_TOP,0,H); g.addColorStop(0,scene.w1); g.addColorStop(0.5,scene.w2); g.addColorStop(1,scene.w3); ctx.fillStyle=g; ctx.fillRect(0,H*WATER_TOP,W,H*(1-WATER_TOP)); ctx.save(); ctx.globalCompositeOperation='lighter'; for(let i=0;i<6;i++){ const bx=(i/6)*W + Math.sin(t*0.3+i)*20; const grd=ctx.createLinearGradient(bx,H*WATER_TOP,bx-60,H); grd.addColorStop(0,'rgba(180,230,255,0.10)'); grd.addColorStop(1,'rgba(180,230,255,0)'); ctx.fillStyle=grd; ctx.beginPath(); ctx.moveTo(bx-18,H*WATER_TOP); ctx.lineTo(bx+18,H*WATER_TOP); ctx.lineTo(bx-50,H); ctx.lineTo(bx-120,H); ctx.closePath(); ctx.fill(); } ctx.restore(); ctx.strokeStyle='rgba(220,245,255,0.55)'; ctx.lineWidth=2; ctx.beginPath(); for(let x=0;x<=W;x+=8){ const y=H*WATER_TOP + Math.sin(x*0.04+t*2)*2.5 + Math.sin(x*0.013-t*1.3)*2; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke(); ctx.fillStyle=scene.rock; ctx.beginPath(); ctx.moveTo(0,H*0.45); ctx.bezierCurveTo(W*0.05,H*0.5, W*0.02,H*0.7, W*0.14,H*0.78); ctx.bezierCurveTo(W*0.18,H*0.82, W*0.1,H*0.95, W*0.16,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2; for(let i=0;i<5;i++){ ctx.beginPath(); const yy=H*(0.55+i*0.08); ctx.moveTo(0,yy); ctx.bezierCurveTo(W*0.04,yy+8,W*0.06,yy-6,W*0.12,yy+10); ctx.stroke(); } g=ctx.createLinearGradient(0,H*0.9,0,H); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,scene.floor); ctx.fillStyle=g; ctx.fillRect(0,H*0.85,W,H*0.15); }

function updateFishing(dt,t){ 
  if(me.state==='casting'){ castProg=Math.min(castProg+dt*1.6,1); const e=1-Math.pow(1-castProg,3); hookX=lerp(hookX,castTargetX,e*0.5); hookY=lerp(hookY,castTargetY,e*0.5); me.lineDepth=castProg*((castTargetY-WATER_TOP)*30); if(castProg>=1){ me.state='waiting'; setHint('⏳ Chờ cá cắn...'); emitSplash(hookX*W,hookY*H,14,3); publishSelf(true); waitTimer=setTimeout(startBite, 1800+Math.random()*4000); } } 
  else if(me.state==='waiting'){ hookY=castTargetY+Math.sin(t*1.5)*0.004; me.lineDepth=(hookY-WATER_TOP)*30; } 
  else if(me.state==='biting'){ hookY=castTargetY+0.02+Math.max(0,Math.sin(t*16))*0.012; if(Math.random()<0.2) emitSplash(hookX*W,hookY*H,2,1.5); } 
  else if(me.state==='reeling'){ 
    const freq=2.2+curFish.power*0.35; const amp=curFish.boss?1.0:0.7; fishStruggle=Math.max(0, Math.sin(t*freq-curFish.power*0.5))*amp; 
    const struggling=fishStruggle>0.35; 
    const passivePull = (struggling ? 0.09 : 0.035) * (curFish.power / 4) * dt;
    fishDist = Math.min(1, fishDist + passivePull);
    tension = Math.max(0, tension - 0.45 * dt);
    me.stamina=Math.max(0,me.stamina); reelFrames++; 
    if(tension>0.25 && tension<0.85) reelGood++; 
    myReelJerk=struggling?fishStruggle:myReelJerk*0.9; myReelBoss=curFish.boss; 
    const mp=anglerPos(me.x); const baseX=mp.px/W, baseY=mp.py/H; hookX=lerp(baseX+0.06, castTargetX, fishDist); hookY=lerp(baseY-0.02, castTargetY+0.03, fishDist); me.lineDepth=fishDist*((castTargetY-WATER_TOP)*30); 
    $('fishbar').firstElementChild.style.width=((1-fishDist)*100)+'%'; $('fishbartxt').textContent=`${Math.round((1-fishDist)*100)}% • Căng: ${Math.round(tension*100)}%`; $('fishbar').style.borderColor=tension>0.8?'#ff2a2a':tension>0.55?'#ffae42':'#ff7a7a'; 
    if(struggling) shake(tension*(curFish.boss?6:3)+fishStruggle*(curFish.boss?4:1.5)); 
    if(tension>=1){ failCatch('💥 Đứt dây! Cá quá khỏe!'); shake(10); myReelJerk=0; return; } 
    if(me.stamina<200){ setHint('😫 Sắp hết thể lực! Bấm chậm lại!'); } 
    else if(curFish.boss && struggling){ setHint('🐉 BOSS ĐANG GIẬT! SPAM NHANH LÊN!'); } 
    else { setHint('⚡ SPAM NÚT KÉO LIÊN TỤC!'); } 
    if(fishDist<=0.02 && !bossState.active){ myReelJerk=0; succeedCatch(); } 
    publishSelf(); 
  } else { myReelJerk*=0.85; } 
}

function drawMyTackle(t){ if(me.state==='idle'||me.state==='charging')return; const tipx=myTip.rx||0, tipy=myTip.ry||0; const wobble=me.state==='biting' || (me.state==='reeling'&&myReelJerk>0.3); drawLine(tipx,tipy,hookX*W,hookY*H,0.85,t,wobble); ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(hookX*W,hookY*H,5,0,7); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(hookX*W,hookY*H+5,4,0,Math.PI); ctx.fill(); }
const sparks=[]; function emitSplash(x,y,n,p){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2; sparks.push({x,y,vx:Math.cos(a)*p*30*(0.5+Math.random()),vy:-Math.abs(Math.random())*p*60-20,life:1}); } }
function drawSplash(dt){ ctx.save(); ctx.fillStyle='rgba(220,245,255,0.85)'; for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.life-=dt*1.4; s.vy+=600*dt; s.x+=s.vx*dt; s.y+=s.vy*dt; if(s.life<=0){ sparks.splice(i,1); continue; } ctx.globalAlpha=s.life; ctx.beginPath(); ctx.arc(s.x,s.y,2.5*s.life+1,0,7); ctx.fill(); } ctx.restore(); }
let shakeAmt=0; function shake(a){ shakeAmt=Math.max(shakeAmt,a); }
function lerp(a,b,k){return a+(b-a)*k;} function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function applyShake(){ if(shakeAmt>0.2){ const ox=(Math.random()-0.5)*shakeAmt, oy=(Math.random()-0.5)*shakeAmt; ctx.setTransform(DPR,0,0,DPR,ox*DPR,oy*DPR); shakeAmt*=0.85; } else { ctx.setTransform(DPR,0,0,DPR,0,0); shakeAmt=0; } }
function drawLine(x1,y1,x2,y2,alpha,t,wobble){ ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#eaf6ff'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(x1,y1); const sag=(wobble?6+Math.sin(t*14)*3:14); ctx.quadraticCurveTo((x1+x2)/2,(y1+y2)/2+sag,x2,y2); ctx.stroke(); ctx.restore(); }

const chatlog=$('chatlog'); function addChatLine(who,text,sys){ const d=document.createElement('div'); if(sys){ d.className='sys'; d.textContent='⚙️ '+text; } else d.innerHTML=`<span class="who">${esc(who)}:</span> ${esc(text)}`; chatlog.appendChild(d); while(chatlog.children.length>40) chatlog.removeChild(chatlog.firstChild); chatlog.scrollTop=chatlog.scrollHeight; }
function redrawChat(arr){ chatlog.innerHTML=''; arr.forEach(m=>addChatLine(m.who,m.text)); }
function esc(s){ return (s+'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
net.onChat=m=>addChatLine(m.who,m.text); net.onPlayersChange=()=>updateHUD();
$('chatsend').addEventListener('click',()=>{ const v=$('chatinput').value.trim(); if(!v)return; $('chatinput').value=''; sendChatNet(v); }); $('chatinput').addEventListener('keydown',e=>{ if(e.key==='Enter') $('chatsend').click(); });
castBtn.addEventListener('mousedown',pressStart); castBtn.addEventListener('mouseup',pressEnd); castBtn.addEventListener('mouseleave',()=>{ if(me.state==='charging')pressEnd(); }); castBtn.addEventListener('touchstart',e=>{e.preventDefault();pressStart();},{passive:false}); castBtn.addEventListener('touchend',e=>{e.preventDefault();pressEnd();},{passive:false});
$('btnRank').addEventListener('click',()=>{ const all=Object.values(net.players).slice().sort((a,b)=>(b.best||0)-(a.best||0)).slice(0,5); let s='🏆 BXH:\n'+all.map((p,i)=>`${i+1}. ${p.id===me.id?'★ ':''}${p.name} — ${p.best?fmtW(p.best):'?'}`).join('\n'); toast('Xem BXH ở chat 👇'); addChatLine('',s.replace(/\n/g,' | '),true); });
$('btnChat').addEventListener('click',()=>$('chatinput').focus());
let _pendingToken=null, _pendingSession=null;
async function tryLogin(){ const pw=($('loginpw').value||'').trim().toUpperCase(); $('loginerr').textContent=''; if(!_pendingSession){ $('loginerr').textContent='Phiên lỗi.'; return; } if(pw!==String(_pendingSession.password||'').toUpperCase()){ $('loginerr').textContent='❌ Sai MK!'; return; } $('loginbtn').disabled=true; $('loginbtn').textContent='Đang vào...'; try{ await startOnline(_pendingToken,_pendingSession); $('login').classList.remove('show'); addChatLine('','Đã vào hồ!',true); setHint('SPAM NÚT KÉO khi cá cắn!'); updateHUD(); }catch(e){ $('loginerr').textContent='❌ '+(e.message||e); $('loginbtn').disabled=false; $('loginbtn').textContent='Vào Game'; } }
$('loginbtn').addEventListener('click',tryLogin); $('loginpw').addEventListener('keydown',e=>{ if(e.key==='Enter')tryLogin(); });
me.name='Bạn'+Math.floor(Math.random()*900+100); resize();
const _pp=document.getElementById('playportrait'); if(_pp) _pp.addEventListener('click',()=>{ allowPortrait=true; checkOrientation(); });
const _token=new URLSearchParams(location.search).get('t');
if(_token && FIREBASE_CONFIG.databaseURL){ setNet(false,'Đang tải...'); fetchSession(_token).then(s=>{ _pendingToken=_token; _pendingSession=s; me.name=s.username||me.name; $('logininfo').textContent=`Chào ${s.username}! Nhập MK từ Discord.`; $('login').classList.add('show'); $('loginpw').focus(); updateHUD(); }).catch(e=>{ setNet(false,'Lỗi — chơi thử'); toast('⚠️ '+(e.message||e)); startDemo(); }); }else{ startDemo(); addChatLine('','Chế độ Demo. Dùng tcauonline trên Discord để chơi thật.',true); }
updateHUD(); setHint('Nhấn giữ THẢ CÂU để lấy lực!'); requestAnimationFrame(loop);
setInterval(()=>{ if(net.mode==='fb') publishSelf(); }, 1000);
</script>
