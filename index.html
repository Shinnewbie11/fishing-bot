<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06101f;--panel:rgba(8,20,36,.92);--border:#1a3550;--accent:#00d4ff;
  --gold:#ffd660;--text:#d8eeff;--sub:#5a7a9a;--rad:10px;--rsm:7px;--online:#2ecc71
}
html,body{height:100%;background:#000;color:var(--text);font-family:'Nunito',sans-serif;
  overflow-x:hidden;-webkit-user-select:none;user-select:none}
#game{width:100%;max-width:900px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
#hdr{display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);
  text-shadow:0 0 18px rgba(0,212,255,.4)}
#hdr-right{display:flex;align-items:center;gap:8px}
#cd{display:flex;align-items:center;gap:4px;font-weight:900;font-size:15px;color:var(--gold)}
#online-pill{display:flex;align-items:center;gap:4px;background:rgba(46,204,113,.15);
  border:1px solid rgba(46,204,113,.3);border-radius:20px;padding:4px 10px;
  font-size:11px;font-weight:800;color:var(--online)}
#online-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--online);
  box-shadow:0 0 6px var(--online);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#maps{display:flex;gap:6px;padding:6px 8px;background:rgba(6,16,31,.97);overflow-x:auto;scrollbar-width:none}
#maps::-webkit-scrollbar{display:none}
.mb{flex:0 0 auto;padding:6px 13px;background:rgba(10,25,45,.8);border:2px solid var(--border);
  border-radius:16px;color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:11px;transition:all .2s;white-space:nowrap}
.mb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
#cw{position:relative;width:100%;background:#000;overflow:hidden}
#gc{width:100%;height:auto;display:block;cursor:grab;touch-action:none}
#gc:active{cursor:grabbing}
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.72) 100%);pointer-events:none;z-index:2}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.6);border-radius:1px}
#xhair::before{width:1px;height:16px;left:50%;top:-4px;transform:translateX(-50%)}
#xhair::after{width:16px;height:1px;top:50%;left:-4px;transform:translateY(-50%)}
#st{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;font-size:8px;color:#fff;
  text-shadow:2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000;
  pointer-events:none;z-index:6;white-space:nowrap}
#snd{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:800;cursor:pointer;z-index:6;color:rgba(255,255,255,.7)}
#bf{position:absolute;inset:0;background:rgba(255,60,0,.15);pointer-events:none;opacity:0;z-index:3}
#bf.on{animation:bflash .28s infinite}
@keyframes bflash{0%,100%{opacity:.1}50%{opacity:.55}}
#rb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(4,12,28,.95);border:2px solid var(--gold);border-radius:var(--rad);
  padding:16px 24px;text-align:center;min-width:180px;pointer-events:none;z-index:12;backdrop-filter:blur(10px)}
#rb.show{animation:rpop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rpop{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg)}70%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
#rb .rem{font-size:48px;line-height:1.1}
#rb .rn{font-weight:900;font-size:15px;margin:6px 0 3px}
#rb .rv{font-size:12px;font-weight:700;color:var(--gold)}
#rb .rr{font-size:11px;margin-top:3px}
#wb{position:absolute;bottom:0;left:0;right:0;height:4px;pointer-events:none;z-index:5}
#wbf{height:100%;width:100%;box-shadow:0 0 8px rgba(0,212,255,.5)}
#players-overlay{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:8;pointer-events:none;max-width:155px}
.po{display:flex;align-items:center;gap:5px;background:rgba(4,12,28,.78);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 8px;backdrop-filter:blur(4px)}
.po img{width:18px;height:18px;border-radius:50%}
.po .pn{font-size:9px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.po .ps{font-size:8px;margin-left:2px}
.ps-idle{color:#5a7a9a}.ps-casting{color:#f39c12}.ps-waiting{color:#00d4ff}
.ps-biting{color:#e74c3c;animation:blink .4s infinite}.ps-reeling{color:#2ecc71}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#notifs{position:absolute;top:50px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:9;pointer-events:none}
.notif{background:rgba(4,12,28,.88);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  padding:6px 10px;font-size:10px;font-weight:800;animation:slideIn .3s ease, fadeOut .4s 3.6s forwards;backdrop-filter:blur(4px)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}
#chatbox{position:absolute;bottom:42px;left:8px;width:210px;z-index:8}
#chatlog{display:flex;flex-direction:column;gap:3px;max-height:85px;overflow:hidden;justify-content:flex-end}
.chatmsg{background:rgba(4,12,28,.75);border-radius:8px;padding:4px 8px;font-size:9px;animation:fadeMsg 9s forwards}
.chatmsg strong{color:var(--accent)}
@keyframes fadeMsg{0%,80%{opacity:1}100%{opacity:0}}
#chatinput-row{display:flex;gap:4px;margin-top:4px}
#chatinput{flex:1;background:rgba(8,20,36,.9);border:1px solid var(--border);border-radius:8px;
  padding:4px 8px;font-size:9px;font-weight:700;color:var(--text);outline:none;font-family:'Nunito',sans-serif}
#chatinput:focus{border-color:var(--accent)}
#chatsend{padding:4px 8px;background:rgba(0,212,255,.2);border:1px solid var(--accent);
  border-radius:8px;font-size:9px;font-weight:800;color:var(--accent);cursor:pointer}
#act{display:flex;gap:7px;padding:8px;background:rgba(6,16,31,.98);border-top:1px solid var(--border)}
#cb{flex:1;padding:13px;font-family:'Press Start 2P',monospace;font-size:9px;
  background:linear-gradient(135deg,#0058b0,#00c0f0);border:none;border-radius:var(--rad);
  color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 3px 18px rgba(0,180,255,.35);min-height:50px}
#cb:hover:not(:disabled){transform:translateY(-1px)}
#cb:disabled{opacity:.4;cursor:not-allowed;transform:none}
#cb.bite{background:linear-gradient(135deg,#8a0000,#dd0000);animation:bp .22s infinite;box-shadow:0 3px 22px rgba(200,0,0,.7)}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
#ri{padding:8px 12px;background:rgba(10,25,45,.9);border:1px solid var(--border);border-radius:var(--rad);
  font-size:10px;color:var(--sub);text-align:center;min-width:78px;display:flex;flex-direction:column;justify-content:center}
#ri .us{font-weight:900;font-size:22px;color:var(--accent);display:block;line-height:1.2}
#tabs{display:flex;background:rgba(8,20,36,.98);border-top:1px solid var(--border)}
.tb{flex:1;padding:11px 5px;background:none;border:none;border-right:1px solid var(--border);
  color:var(--sub);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;transition:all .2s;min-height:44px}
.tb:last-child{border-right:none}.tb.on{background:rgba(0,212,255,.09);color:var(--accent)}
#cp{background:rgba(8,20,36,.98);border-top:1px solid var(--border);padding:11px;min-height:155px}
.stl{font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px}
.ii{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.ii .fe{font-size:28px}.ii .fn{font-size:12px;font-weight:800;margin:3px 0 2px}.ii .fc{font-size:10px;color:var(--sub)}.ii .fv{font-size:10px;margin-top:2px}
.shoprow{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.shoprow .si{flex:1}.shoprow .sn{font-weight:900;font-size:13px}.shoprow .sd{font-size:11px;color:var(--sub);margin-top:3px}.shoprow .sp{font-size:13px;font-weight:800;color:var(--gold);margin-top:4px}
.buybtn{padding:10px 16px;background:linear-gradient(135deg,#1a8f4a,#00e676);border:none;border-radius:var(--rsm);color:#000;font-weight:900;font-size:12px;cursor:pointer;min-height:44px;white-space:nowrap}
.buybtn.dis{background:#223;color:var(--sub);cursor:not-allowed}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:8px}
.si2{background:rgba(15,32,53,.8);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center}
.sb{width:100%;margin-top:5px;padding:7px 0;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:5px;color:#fff;font-weight:800;font-size:11px;cursor:pointer;min-height:36px}
#sab{width:100%;padding:11px;background:linear-gradient(135deg,#a01818,#cc2828);border:none;border-radius:var(--rsm);color:#fff;font-weight:900;font-size:13px;cursor:pointer;min-height:44px}
.rt{width:100%;border-collapse:collapse;font-size:11px}
.rt td{padding:6px 7px;border-bottom:1px solid var(--border)}
.rt tr:last-child td{border-bottom:none}.rt tr:nth-child(odd){background:rgba(255,255,255,.02)}
.es{text-align:center;padding:26px 20px;color:var(--sub)}.es .ei{font-size:36px;margin-bottom:9px}.es p{font-size:12px;line-height:1.6}
.r1{color:#88aacc}.r2{color:#a29bfe}.r3{color:#fdcb6e}.r4{color:#e17055}.r5{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6)}
#loading{position:fixed;inset:0;background:#020c18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:18px}
#loading h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent)}
#loadbar{width:240px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#loadfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;width:0;transition:width .4s ease}
#loadtxt{font-size:11px;color:var(--sub);font-weight:700}
#autherr{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;padding:24px}
#autherr h2{font-family:'Press Start 2P',monospace;font-size:11px;color:#e74c3c;text-align:center}
#autherr .ae-reason{font-size:14px;font-weight:900;color:var(--gold);text-align:center}
#autherr p{font-size:12px;color:var(--sub);text-align:center;max-width:340px;line-height:1.6}
#ae-detail{font-family:monospace;font-size:10px;color:#7a90a8;background:rgba(15,32,53,.7);
  border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-width:360px;
  word-break:break-all;line-height:1.5;text-align:left;white-space:pre-wrap}
#autherr .ae-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ae-btn{padding:11px 18px;border:none;border-radius:var(--rsm);font-weight:900;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif}
.ae-btn.demo{background:linear-gradient(135deg,#1a8f4a,#00e676);color:#000}
.ae-btn.retry{background:rgba(0,212,255,.18);border:1px solid var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(10,28,50,.96);border:1px solid var(--accent);border-radius:18px;
  padding:9px 18px;font-size:12px;font-weight:800;color:var(--text);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:200;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#demo-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.2);
  border:1px solid var(--online);border-radius:14px;padding:2px 10px;font-size:9px;font-weight:800;
  color:var(--online);z-index:7;display:none}
@media(max-width:520px){#hdr h1{font-size:8px}#cd{font-size:13px}.mb{font-size:10px;padding:5px 10px}#cb{font-size:7px}#chatbox{width:155px}}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

<body>

  <div style="font-size:52px">🎣</div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyA9Iv98Bcurd6bqXo79BbgEz58a3xrPH8o",
  authDomain:        "fishing-bot-e8d42.firebaseapp.com",
  databaseURL:       "https://fishing-bot-e8d42-default-rtdb.firebaseio.com",
  projectId:         "fishing-bot-e8d42",
  storageBucket:     "fishing-bot-e8d42.firebasestorage.app",
  messagingSenderId: "404799504673",
  appId:             "1:404799504673:web:6128427eae7b29729cbe60"
};
const GAME_SECRET = 'datBatKyChuan123';

let db = null;   // sẽ được gán trong bootFirebase()

const FISH_LIST = [
  { id:'moi',  name:'Cá Mồi',       emoji:'🐟', value:10_000,      rate:35,   rar:'Thường',       rc:'r1', color:0x74b9ff },
  { id:'tram', name:'Cá Trắm',       emoji:'🐠', value:100_000,     rate:20,   rar:'Không Thường', rc:'r2', color:0xa29bfe },
  { id:'chep', name:'Cá Chép Vàng',  emoji:'🐡', value:500_000,     rate:10,   rar:'Quý Hiếm',     rc:'r3', color:0xfdcb6e },
  { id:'hoi',  name:'Cá Hồi',        emoji:'🦑', value:5_000_000,   rate:4.99, rar:'Huyền Thoại',  rc:'r4', color:0xe17055 },
  { id:'rong', name:'Cá Rồng',       emoji:'🐲', value:100_000_000, rate:0.01, rar:'Thần Thoại',   rc:'r5', color:0xffd700 },
];
const ROD_PRICE = 10_000;
const ROD_USES  = 10;

let userData   = { userId:'', username:'', avatar:'', coins:0, rodUses:0, inventory:{} };
let gstate     = 'idle', curMap = 0, activeTab = 'bag';
let wt, bt, resultFish = null, waitStart = 0, waitDur = 5000;
let yaw = 0, pitch = 0;
let DEMO = false;          // <— chế độ demo (không ghi Firebase)

// ── Firebase Auth — HIỂN THỊ ĐÚNG LÝ DO LỖI ──────────────
const URL_TOKEN = new URLSearchParams(window.location.search).get('t');

async function readSessionWithRetry(token, maxRetry = 5) {
  let lastErr = null;
  for (let i = 0; i < maxRetry; i++) {
    try {
      console.log(`[Auth] Đọc session lần ${i+1}/${maxRetry}...`);
      const snap = await db.ref(`sessions/${token}`).once('value');
      const session = snap.val();
      if (session) {
        console.log('[Auth] Đọc session thành công:', session);
        return { session, error:null };
      }
      console.warn(`[Auth] Session null lần ${i+1}, thử lại sau 1s...`);
      await new Promise(r => setTimeout(r, 1000));
    } catch(e) {
      lastErr = e;
      console.error(`[Auth] Lỗi đọc lần ${i+1}:`, e);
      await new Promise(r => setTimeout(r, 1000));
    }
  }
  return { session:null, error:lastErr };
}

async function initAuth() {
  setLoad('Xác thực tài khoản...', 20);

  if (!db) {
    showAuthError('Lỗi Firebase', 'Không khởi tạo được Firebase. Kiểm tra firebaseConfig và mạng.', 'firebase init failed');
    return;
  }

  if (!URL_TOKEN) {
    showAuthError('Thiếu token', 'URL không có ?t=... Bot chưa tạo link đúng định dạng: yourhost/?t=TOKEN', 'window.location.search = "' + window.location.search + '"');
    return;
  }

  console.log('[Auth] Token:', URL_TOKEN);

  try {
    await new Promise(r => setTimeout(r, 600)); // đợi SDK sẵn sàng

    const res = await readSessionWithRetry(URL_TOKEN, 5);

    // 1) Lỗi đọc (thường do Firebase Rules chặn .read)
    if (res.error) {
      showAuthError(
        'Lỗi đọc Firebase',
        'Không đọc được "sessions/". Khả năng cao do Database Rules chặn .read (set ".read": true cho sessions), hoặc sai databaseURL.',
        'sessions/' + URL_TOKEN + '\n' + (res.error.code || '') + ' ' + (res.error.message || res.error)
      );
      return;
    }

    const session = res.session;

    // 2) Không có session
    if (!session) {
      showAuthError(
        'Không tìm thấy session',
        'sessions/' + URL_TOKEN + ' = null. Bot chưa ghi session, ghi sai đường dẫn, hoặc Rules chặn đọc.',
        'Kiểm tra: bot có gọi db.ref("sessions/" + token).set({...}) trước khi gửi link không?'
      );
      return;
    }

    // 3) Hết hạn (hay sai đơn vị ms)
    if (!session.expiresAt || Date.now() > session.expiresAt) {
      const exp = session.expiresAt;
      showAuthError(
        'Session đã hết hạn',
        'Kiểm tra expiresAt phải là milliseconds, ví dụ: Date.now() + 10*60*1000',
        'expiresAt = ' + exp + (exp ? '  (' + new Date(exp).toLocaleString('vi-VN') + ')' : ' (THIẾU)') +
        '\nnow       = ' + Date.now() + '  (' + new Date().toLocaleString('vi-VN') + ')'
      );
      return;
    }

    // 4) Secret sai
    if (session.secret !== GAME_SECRET) {
      showAuthError(
        'Secret không khớp',
        'Bot phải ghi secret giống hệt web.',
        'Bot ghi : "' + session.secret + '"\nWeb cần : "' + GAME_SECRET + '"'
      );
      return;
    }

    console.log('[Auth] Xác thực thành công! User:', session.username);

    // ── Lấy dữ liệu người chơi ──
    setLoad('Tải dữ liệu người chơi...', 40);
    let playerData = {};
    try {
      const playerSnap = await db.ref(`players/${session.userId}`).once('value');
      playerData = playerSnap.val() || {};
    } catch(e) { console.warn('[Auth] Đọc players lỗi (bỏ qua):', e); }

    userData.userId    = session.userId;
    userData.username  = session.username;
    userData.avatar    = session.avatar || '';
    userData.coins     = playerData.coins    ?? session.coins    ?? 0;
    userData.rodUses   = playerData.rodUses  ?? session.rodUses  ?? 0;
    userData.inventory = playerData.inventory ?? session.inventory ?? {};

    console.log('[Auth] userData:', userData);

    // KHÔNG xóa session ngay — để nó sống đủ 10 phút (link dùng lại được,
    // tốt cho điện thoại khi trình duyệt tự reload). Web vẫn chặn bằng expiresAt,
    // và bot tự dọn session sau 10 phút.

    startGame(true);

  } catch(e) {
    console.error('[Auth] Lỗi nghiêm trọng:', e);
    showAuthError('Lỗi nghiêm trọng', 'Có lỗi không xác định khi xác thực.', String(e && e.message || e));
  }
}

// ── Firebase: Đồng bộ dữ liệu ────────────────────────────
async function syncToFirebase(delta = {}) {
  if (DEMO || !db) return;
  try {
    await db.ref(`players/${userData.userId}`).set({
      coins:      userData.coins,
      rodUses:    userData.rodUses,
      inventory:  userData.inventory,
      updatedAt:  Date.now(),
      totalCaught: (delta.totalCaught || 0),
      totalEarned: (delta.totalEarned || 0),
    });
  } catch(e) { console.warn('Firebase sync error:', e); }
}

function watchPlayerData() {
  if (DEMO || !db) return;
  db.ref(`players/${userData.userId}`).on('value', snap => {
    const d = snap.val();
    if (!d) return;
    if (d.updatedAt && Math.abs(d.coins - userData.coins) > 100) {
      userData.coins    = d.coins;
      userData.rodUses  = d.rodUses;
      userData.inventory = d.inventory || {};
      updateUI();
      renderContent();
    }
  });
}

// ── Firebase: Multiplayer presence ───────────────────────
const STATE_LABEL = { idle:'💤', casting:'🎣', waiting:'⏳', biting:'🐟!', reeling:'⚡', result:'✅' };

function initMultiplayer() {
  if (DEMO || !db) return;
  const presenceRef = db.ref(`presence/${userData.userId}`);
  presenceRef.set({
    username: userData.username,
    avatar:   userData.avatar,
    state:    'idle',
    mapIndex: curMap,
    yaw:      0,
    online:   true,
    lastSeen: Date.now(),
  });
  presenceRef.onDisconnect().remove();

  db.ref('presence').on('value', snap => {
    const all = snap.val() || {};
    const others = Object.entries(all).filter(([id]) => id !== userData.userId);
    document.getElementById('online-count').textContent = others.length + 1;
    renderOtherPlayers(others);
    updatePlayerSprites(others);
  });

  db.ref('fishCatches').limitToLast(1).on('child_added', snap => {
    const d = snap.val();
    if (!d || d.userId === userData.userId) return;
    if (Date.now() - d.timestamp < 5000) {
      addNotif(`${d.fish.emoji} <strong>${d.username}</strong> câu được <strong>${d.fish.name}</strong>!`);
    }
  });

  db.ref('chat').limitToLast(1).on('child_added', snap => {
    const d = snap.val();
    if (!d) return;
    if (Date.now() - d.timestamp < 3000) {
      addChatMsg(d.username, d.text, d.userId === userData.userId);
    }
  });

  watchPlayerData();
}

function updatePresence(state) {
  if (DEMO || !db || !userData.userId) return;
  db.ref(`presence/${userData.userId}`).update({
    state, mapIndex: curMap, yaw, lastSeen: Date.now()
  }).catch(()=>{});
}

function broadcastCatch(fish) {
  if (DEMO || !db) return;
  const key = db.ref('fishCatches').push().key;
  db.ref(`fishCatches/${key}`).set({
    userId:    userData.userId,
    username:  userData.username,
    fish:      { id:fish.id, name:fish.name, emoji:fish.emoji, value:fish.value },
    timestamp: Date.now(),
  }).catch(()=>{});
  setTimeout(() => db.ref(`fishCatches/${key}`).remove().catch(()=>{}), 10000);
}

function sendChat() {
  const inp = document.getElementById('chatinput');
  const txt = inp.value.trim();
  if (!txt) return;
  addChatMsg(userData.username, txt, true);
  inp.value = '';
  if (DEMO || !db || !userData.userId) return;
  const key = db.ref('chat').push().key;
  db.ref(`chat/${key}`).set({
    userId:    userData.userId,
    username:  userData.username,
    text:      txt,
    timestamp: Date.now(),
  });
  setTimeout(() => db.ref(`chat/${key}`).remove().catch(()=>{}), 30000);
}

function updatePlayerSprites(others){
  const seen=new Set();
  for(const[id,p] of others){
    seen.add(id);
    if(p.mapIndex!==curMap){if(playerSprites.has(id))playerSprites.get(id).grp.visible=false;continue;}
    const s=getOrCreateSprite(id,p.username);
    s.grp.visible=true;
    const angle=(parseInt(id.slice(-4),16)/65535)*Math.PI*2;
    const dist=1.8+(parseInt(id.slice(-2),16)/255)*1.2;
    s.grp.position.set(Math.cos(angle)*dist,0,Math.sin(angle)*dist-1.2);
    if(p.yaw!==undefined) s.grp.rotation.y=p.yaw;
    const stateColor={idle:0x3388ff,casting:0xf39c12,waiting:0x00d4ff,biting:0xe74c3c,reeling:0x2ecc71,result:0x3388ff};
    s.bMat.color.set(stateColor[p.state]||0x3388ff);

function initThree(){
  applyMap(0);
  let lineProgress=0,fishAnimT=0,fishAnimating=false,curRot=-.22;
  const RANG={idle:-.22,casting:-.94,waiting:-.52,biting:-.46,reeling:.34,result:-.22};
  const tipWP=new THREE.Vector3();
  function waveY(x,z,t){return Math.sin(x*3.2+t*1.6)*.16+Math.sin(z*2.5-t*1.2)*.12+Math.sin((x+z)*1.8+t*.9)*.08+Math.sin(x*1.1-z*.8+t*2.2)*.045;}
  function animate(ts){
    requestAnimationFrame(animate);
    const t=ts*.001;
    waterMat.uniforms.uT.value=t; skySph.rotation.y=t*.006;
    curRot+=((RANG[gstate]??RANG.idle)-curRot)*.09; fpRod.rotation.x=curRot;
    if(gstate==='casting') lineProgress=Math.min(lineProgress+.055,1);
    else if(gstate==='idle'||gstate==='result') lineProgress=Math.max(lineProgress-.09,0);
    if(gstate==='waiting'||gstate==='biting'){
      const wy=waveY(bobGrp.position.x,bobGrp.position.z,t);
      const dip=gstate==='biting'?Math.abs(Math.sin(t*5.5))*.32+.22:0;
      bobGrp.position.y=wy-dip;
      if(gstate==='biting'){bobLight.position.copy(bobGrp.position);bobLight.position.y+=.4;bobLight.intensity=.6+Math.sin(t*8.5)*.24;bobGrp.children[0].material.color.set(0xff1111);}
      else{bobLight.intensity=0;bobGrp.children[0].material.color.set(0xe74c3c);}
      const rp=(t*.65)%1; ripMesh.scale.set(1+rp*3.8,1+rp*3.8,1); ripMesh.material.opacity=(1-rp)*.40;
    } else bobLight.intensity=0;
    bobGrp.visible=lineProgress>.8&&(gstate==='waiting'||gstate==='biting'||gstate==='reeling');
    lineMesh.visible=lineProgress>.05;
    if(lineMesh.visible){
      tipObj.getWorldPosition(tipWP);
      const pos=lineMesh.geometry.attributes.position.array;
      for(let i=0;i<LPTS;i++){const ft=i/(LPTS-1);pos[i*3]=tipWP.x+(bobGrp.position.x-tipWP.x)*ft;pos[i*3+1]=tipWP.y+(bobGrp.position.y-tipWP.y)*ft+Math.sin(ft*Math.PI)*(-.52)*lineProgress;pos[i*3+2]=tipWP.z+(bobGrp.position.z-tipWP.z)*ft;}
      lineMesh.geometry.attributes.position.needsUpdate=true;
    }
    if(fishAnimating&&resultFish){
      fishAnimT=Math.min(fishAnimT+.02,1);
      fishGrp.position.x=bobGrp.position.x+camera.position.x*fishAnimT*.38;
      fishGrp.position.y=bobGrp.position.y+Math.sin(fishAnimT*Math.PI)*3.;
      fishGrp.position.z=bobGrp.position.z+camera.position.z*fishAnimT*.30;
      fishGrp.rotation.y=fishAnimT*Math.PI*.9; fishGrp.rotation.z=Math.sin(fishAnimT*Math.PI*3)*.30;
      if(fishAnimT>=1){fishGrp.visible=false;fishAnimating=false;}
    }
    window._fishAnimating=fishAnimating; window._setFishAnimating=v=>fishAnimating=v; window._setFishAnimT=v=>fishAnimT=v;
    window._lineProgress=lineProgress;
    if(gstate==='waiting'&&waitStart>0){
      const frac=Math.min((performance.now()-waitStart)/waitDur,1);
      const wbf=document.getElementById('wbf');
      wbf.style.width=(100-frac*100)+'%'; wbf.style.background=frac>.7?'#ff5252':frac>.4?'#ffd660':'#00d4ff';
    } else document.getElementById('wbf').style.width='100%';
    renderer.render(scene,camera);
  }
  window._applyMap=applyMap; window._bobGrp=bobGrp; window._fbM=fbM; window._ftM=ftM;
  window._fishGrp=fishGrp; window._lineProgress=0;
  window._setLineProgress=v=>lineProgress=v;
  window._setFishAnimating=v=>fishAnimating=v; window._setFishAnimT=v=>fishAnimT=v;
  requestAnimationFrame(animate);
}

function rollFish(){const r=Math.random()*100;let c=30;if(r<c)return null;for(const f of FISH_LIST){c+=f.rate;if(r<c)return f;}return null;}

function handleCast(){
  if(gstate==='biting'){clearTimeout(bt);doReelIn();return;}
  if(gstate!=='idle'||!userData.userId) return;
  if(userData.rodUses<=0){showToast('❌ Mua cần câu ở Shop!');swTab('shop');return;}
  resultFish=null; hideBanner(); gstate='casting';
  setStatus('🎣 Đang thả câu...');
  document.getElementById('cb').disabled=true;
  const fwd2=new THREE.Vector3(); camera.getWorldDirection(fwd2); fwd2.y=0; fwd2.normalize();
  window._bobGrp.position.set(camera.position.x+fwd2.x*12,.05,camera.position.z+fwd2.z*12);
  updatePresence('casting');
  setTimeout(()=>{
    gstate='waiting'; setStatus('⏳ Đang chờ cá cắn...');
    waitDur=3000+Math.random()*8000; waitStart=performance.now();
    updatePresence('waiting');
    wt=setTimeout(startBite,waitDur);

}
function startBite(){

  document.getElementById('bf').classList.add('on');

}
async function doReelIn(){
  gstate='reeling'; setStatus('');
  const b=document.getElementById('cb'); b.textContent='🎣 THẢ CÂU'; b.classList.remove('bite'); b.disabled=true;
  document.getElementById('bf').classList.remove('on');
  userData.rodUses--; updateUI(); resultFish=rollFish();
  updatePresence('reeling');
  if(resultFish){
    window._fbM.material.color.set(resultFish.color); window._ftM.material.color.set(resultFish.color);
    window._fishGrp.position.copy(window._bobGrp.position); window._fishGrp.visible=true;
    window._setFishAnimT(0); window._setFishAnimating(true);
    broadcastCatch(resultFish);
  }
  setTimeout(async()=>{
    gstate='result'; showBanner(resultFish);
    if(resultFish){userData.inventory[resultFish.id]=(userData.inventory[resultFish.id]||0)+1;showToast(`🎉 ${resultFish.emoji} ${resultFish.name}!`);}
    else showToast('😅 Không câu được gì...');
    await syncToFirebase(resultFish?{totalCaught:1}:{});
    updateUI();
    setTimeout(()=>{
      gstate='idle'; hideBanner(); updatePresence('idle');
      const noRod=userData.rodUses<=0;
      setStatus(noRod?'🏪 Hết cần! Mua thêm.':'🎣 Nhấn THẢ CÂU để tiếp tục!');
      const btn=document.getElementById('cb'); btn.disabled=false;
      btn.textContent=noRod?'🏪 MUA CẦN':'🎣 THẢ CÂU';
      renderContent();
    },2600);
  },1400);
}

async function buyRod(){

  userData.coins-=ROD_PRICE; userData.rodUses+=ROD_USES;
  await syncToFirebase(); updateUI(); renderContent();
  showToast(`✅ Mua cần! +${ROD_USES} lần câu`);
  if(gstate==='idle'){document.getElementById('cb').textContent='🎣 THẢ CÂU';setStatus('🎣 Nhấn THẢ CÂU!');}

async function sellFish(id){
  const cnt=userData.inventory[id]||0; if(!cnt)return;
  const f=FISH_LIST.find(x=>x.id===id),got=f.value*cnt;
  userData.coins+=got; delete userData.inventory[id];
  await syncToFirebase({totalEarned:got}); renderContent();
  showToast(`💰 Bán ${cnt} ${f.emoji} → +${fmt(got)} 🪙`);
}
async function sellAll(){
  let total=0; for(const[id,cnt] of Object.entries(userData.inventory)){const f=FISH_LIST.find(x=>x.id===id);total+=f.value*cnt;}
  if(!total){showToast('❌ Túi cá trống!');return;}
  userData.coins+=total; const earned=total; userData.inventory={};
  await syncToFirebase({totalEarned:earned}); renderContent();

function loadScript(src){

    const s=document.createElement('script');
    s.src=src; s.async=false;               // giữ đúng thứ tự thực thi
    s.onload=()=>resolve(src);
    s.onerror=()=>reject(new Error('Không tải được '+src));

}

async function bootFirebase(){
  setLoad('Tải thư viện Firebase...', 8);
  const CDNS=[
    'https://www.gstatic.com/firebasejs/10.11.0/',
    'https://cdn.jsdelivr.net/npm/firebase@10.11.0/',
    'https://unpkg.com/firebase@10.11.0/'
  ];
  if(typeof firebase==='undefined'){
    let ok=false,lastErr=null;
    for(const base of CDNS){
      try{
        console.log('[Firebase] Thử tải từ',base);
        await loadFromCDN(base);
        if(typeof firebase!=='undefined'){ok=true;console.log('[Firebase] Đã tải từ',base);break;}
      }catch(e){lastErr=e;console.warn('[Firebase] CDN lỗi:',base,e.message);}
    }
    if(!ok){
      showAuthError(
        'Không tải được Firebase',
        'Cả 3 CDN đều bị chặn. Mạng hoặc host của bạn đang chặn gstatic.com, jsdelivr.net và unpkg.com — hãy đổi host hoặc bỏ chặn các domain này.',
        String(lastErr && lastErr.message || lastErr)
      );
      return;
    }
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
  }catch(e){
    console.error('[Firebase] initializeApp lỗi:',e);
    showAuthError('Lỗi khởi tạo Firebase','Kiểm tra lại firebaseConfig.',String(e&&e.message||e));
    return;
  }
  initAuth();
}

bootFirebase();
</script>
